<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Rébus Chogan — Limitless Team</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#FAFAFA;font-family:'Montserrat',sans-serif;color:#1a1a1a}
    input,textarea,select,button{font-family:'Montserrat',sans-serif}
    input::placeholder,textarea::placeholder{color:#bbb}
    ::-webkit-scrollbar{width:5px}
    ::-webkit-scrollbar-track{background:#f0f0f0}
    ::-webkit-scrollbar-thumb{background:linear-gradient(180deg,#C9952A,#8B6010);border-radius:10px}

    /* Gold gradient reusable */
    .gold-text{background:linear-gradient(135deg,#D4A017 0%,#F5C842 40%,#B8860B 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}

    @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
    @keyframes fadeUp{from{opacity:0;transform:translateY(32px)}to{opacity:1;transform:translateY(0)}}
    @keyframes flash{0%,100%{transform:scale(1);box-shadow:0 4px 16px rgba(0,0,0,0.08)}50%{transform:scale(1.03);box-shadow:0 8px 32px rgba(212,160,23,0.35)}}
    @keyframes shimmer{0%{background-position:200% center}100%{background-position:-200% center}}
    @keyframes pulse{0%,100%{opacity:.5}50%{opacity:1}}
    @keyframes glow{0%,100%{box-shadow:0 0 12px rgba(212,160,23,0.3)}50%{box-shadow:0 0 28px rgba(212,160,23,0.6)}}
    @keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
    @keyframes reveal{from{filter:grayscale(1) blur(28px) brightness(.5)}to{filter:grayscale(0) blur(0px) brightness(1)}}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef,useCallback}=React;

/* ─── PALETTE LUXE ─── */
const G={
  pearl:"#FAFAFA",       // fond principal
  white:"#FFFFFF",
  goldA:"#D4A017",       // or foncé
  goldB:"#F5C842",       // or clair
  goldC:"#B8860B",       // bronze
  goldGrad:"linear-gradient(135deg,#D4A017 0%,#F5C842 45%,#B8860B 100%)",
  goldGradH:"linear-gradient(135deg,#E6B420 0%,#FFD84D 45%,#C9952A 100%)",
  dark:"#1a1a1a",
  mid:"#555555",
  light:"#888888",
  border:"rgba(212,160,23,0.2)",
  borderStrong:"rgba(212,160,23,0.5)",
  shadow:"0 4px 24px rgba(0,0,0,0.07)",
  shadowGold:"0 4px 24px rgba(212,160,23,0.25)",
  shadowLg:"0 12px 48px rgba(0,0,0,0.12)",
  red:"#E05050",
  green:"#3A9960",
};

/* Blur progressif : grayscale + blur → net + couleur */
const BLUR_MAP={
  0:"grayscale(1) blur(28px) brightness(.45) contrast(0.8)",
  1:"grayscale(0.9) blur(22px) brightness(.52) contrast(0.85)",
  2:"grayscale(0.65) blur(15px) brightness(.65) saturate(0.6)",
  3:"grayscale(0.35) blur(9px) brightness(.78) saturate(0.8)",
  4:"grayscale(0.1) blur(3px) brightness(.92) saturate(0.95)",
  5:"grayscale(0) blur(0px) brightness(1) saturate(1)",
};

const POINTS={1:50,2:40,3:30,4:20,5:10};
const COLORS=["#C9952A","#3A9960","#E05050","#3A7CC9","#9B59B6","#E67E22","#27AE60","#2980B9","#C0392B","#8E44AD"];
const STORAGE_KEY="rebus_chogan_v2";

const DEFAULT_Q=[
  {id:1,categorie:"PARFUMERIE",indices:["Je suis une fragrance classée « Extrait de Parfum ».","Ma composition contient 0% d'eau ajoutée.","Je possède une concentration de 30% d'essence de parfum.","Mon flacon est sobre, élégant et identifié par un numéro.","Je suis une création inspirée d'une grande marque mondiale, sans fixateur chimique."],reponse:"Parfum Chogan (Traditionnel ou Luxury)",image:""},
  {id:2,categorie:"SOINS VISAGE",indices:["Je suis un soin cosmétique naturel de la gamme Aurodhea.","Je suis efficace contre les taches cutanées et les cicatrices.","Ma formule est riche en collagène, élastine et acide glycolique.","Je suis l'allié numéro 1 contre le vieillissement prématuré.","Mon ingrédient principal est extrait d'un petit animal à coquille."],reponse:"Crème à la bave d'escargot",image:""},
  {id:3,categorie:"HYGIÈNE",indices:["Je suis un produit de la routine d'hygiène quotidienne.","Je n'utilise aucun agent de blanchiment chimique agressif.","J'élimine les taches de café et de nicotine en douceur.","Ma couleur est surprenante et totalement opposée au blanc habituel.","Je tire mes bienfaits purifiants du charbon actif."],reponse:"Dentifrice Black Power",image:""},
  {id:4,categorie:"ENTRETIEN",indices:["Je fais partie de la gamme de nettoyage écologique et puissante.","Je suis efficace sur bois, acier, textile et même moteurs.","Je suis la solution radicale contre les graisses les plus tenaces.","Ma formule est hautement concentrée pour une utilisation professionnelle.","On m'appelle le « Degreaser Plus »."],reponse:"Dégraissant Chogan Plus",image:""},
  {id:5,categorie:"BIEN-ÊTRE",indices:["Allié quotidien pour booster l'organisme de l'intérieur.","Utilisé lors des cures de changement de saison.","Je purifie le sang et aide à la détoxification du foie.","Ma saveur est naturellement amère mais mes bienfaits sont immenses.","Je suis le jus de plante le plus célèbre, souvent consommé pur ou dilué."],reponse:"Jus d'Aloe Vera à boire",image:""},
  {id:6,categorie:"HUILES ESSENTIELLES",indices:["Extrait liquide hautement concentré et 100% pur.","Peut être diffusé dans l'air ou mélangé à une huile végétale.","Je suis connue pour mes propriétés relaxantes.","Mon odeur rappelle les champs du sud de la France.","Je suis l'huile essentielle de Lavande Officinale."],reponse:"Huile Essentielle de Lavande",image:""},
];

/* ─── HELPERS UI ─── */
const card=(extra={})=>({background:G.white,borderRadius:18,boxShadow:G.shadow,border:`1px solid ${G.border}`,...extra});
const pill=(primary=true,extra={})=>({
  padding:"10px 24px",borderRadius:999,border:"none",cursor:"pointer",
  fontFamily:"'Montserrat',sans-serif",fontWeight:700,fontSize:13,
  letterSpacing:.5,transition:"all 0.2s",
  background:primary?G.goldGrad:"rgba(0,0,0,0.06)",
  color:primary?G.white:G.dark,
  boxShadow:primary?G.shadowGold:"none",
  ...extra
});
const inp=(extra={})=>({
  background:"rgba(0,0,0,0.03)",border:`1.5px solid ${G.border}`,
  borderRadius:12,padding:"9px 14px",color:G.dark,outline:"none",
  width:"100%",fontSize:13,fontFamily:"'Montserrat',sans-serif",
  transition:"border 0.2s",...extra
});

/* ─── SYNC : BroadcastChannel + localStorage fallback ─── */
const BC = typeof BroadcastChannel !== "undefined" ? new BroadcastChannel("rebus_chogan_bc") : null;

const saveState = s => {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(s)); } catch(e) {}
  try { if(BC) BC.postMessage(s); } catch(e) {}
};
const loadState = () => {
  try { const r=localStorage.getItem(STORAGE_KEY); return r?JSON.parse(r):null; } catch(e) { return null; }
};
const makeState = (cons,qs) => ({
  phase:"play", idx:0, hintShown:0, results:{}, revealed:[],
  consultants:cons.map(c=>({...c,score:0})), questions:qs, flash:null, _selC:null
});

/* Hook de synchronisation temps réel */
function useGameSync() {
  const [gs, setGs] = useState(()=>loadState());

  useEffect(()=>{
    // 1. BroadcastChannel — instantané entre fenêtres
    const onBC = e => { if(e.data) setGs(e.data); };
    if(BC) BC.addEventListener("message", onBC);

    // 2. Storage event — entre onglets du même navigateur
    const onStorage = e => {
      if(e.key === STORAGE_KEY && e.newValue) {
        try { setGs(JSON.parse(e.newValue)); } catch(er) {}
      }
    };
    window.addEventListener("storage", onStorage);

    // 3. Polling — filet de sécurité toutes les 300ms
    const t = setInterval(()=>{
      const s = loadState();
      if(s) setGs(s);
    }, 300);

    return () => {
      if(BC) BC.removeEventListener("message", onBC);
      window.removeEventListener("storage", onStorage);
      clearInterval(t);
    };
  }, []);

  return [gs, setGs];
}

/* ══════════════════════════════════════
   LOGO LUXE
══════════════════════════════════════ */
const Logo=({dark=false,size=24})=>(
  <div style={{display:"flex",alignItems:"center",gap:12}}>
    <div style={{width:44,height:44,borderRadius:"50%",background:G.goldGrad,display:"flex",alignItems:"center",justifyContent:"center",boxShadow:G.shadowGold,flexShrink:0}}>
      <span style={{fontSize:20,color:"white",fontFamily:"Georgia,serif"}}>✿</span>
    </div>
    <div>
      <div style={{fontFamily:"'Playfair Display',serif",fontSize:size,fontWeight:900,letterSpacing:5,lineHeight:1,background:G.goldGrad,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",backgroundClip:"text"}}>CHOGAN</div>
      <div style={{fontSize:8,color:dark?"#999":"rgba(212,160,23,0.8)",letterSpacing:4,fontWeight:600,textTransform:"uppercase",marginTop:1}}>Limitless Team</div>
    </div>
  </div>
);

/* ══════════════════════════════════════
   GOLD BADGE
══════════════════════════════════════ */
const GoldBadge=({label,value,sub})=>(
  <div style={{background:G.goldGrad,borderRadius:16,padding:"12px 20px",textAlign:"center",boxShadow:G.shadowGold,animation:"glow 3s infinite"}}>
    <div style={{color:"white",fontFamily:"'Playfair Display',serif",fontSize:28,fontWeight:900,lineHeight:1}}>{value}</div>
    {sub&&<div style={{color:"rgba(255,255,255,0.8)",fontSize:9,letterSpacing:3,marginTop:3,fontWeight:600}}>{sub}</div>}
  </div>
);

/* ══════════════════════════════════════
   SETUP
══════════════════════════════════════ */
function Setup({onStart}){
  const [cons,setCons]=useState([{id:1,name:"Marie",color:COLORS[0]},{id:2,name:"Sophie",color:COLORS[1]},{id:3,name:"Léa",color:COLORS[2]}]);
  const [qs,setQs]=useState(DEFAULT_Q);
  const [name,setName]=useState("");
  const [tab,setTab]=useState("c");
  const [editQ,setEditQ]=useState(null);
  const fileRefs=useRef({});

  const addC=()=>{if(!name.trim())return;setCons(p=>[...p,{id:Date.now(),name:name.trim(),color:COLORS[p.length%COLORS.length]}]);setName("");};
  const addQ=()=>{const id=Date.now();setQs(p=>[...p,{id,categorie:"",indices:["","","","",""],reponse:"",image:""}]);setEditQ(id);};
  const handleImg=(qid,e)=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>setQs(p=>p.map(q=>q.id===qid?{...q,image:ev.target.result}:q));r.readAsDataURL(f);};
  const upInd=(qid,i,v)=>setQs(p=>p.map(q=>q.id===qid?{...q,indices:q.indices.map((x,j)=>j===i?v:x)}:q));

  const tabS=(t)=>({
    flex:1,padding:"14px 8px",border:"none",cursor:"pointer",
    fontFamily:"'Montserrat',sans-serif",fontSize:11,fontWeight:700,letterSpacing:2,textTransform:"uppercase",
    background:"transparent",
    color:tab===t?G.goldA:G.light,
    borderBottom:tab===t?`2.5px solid ${G.goldA}`:"2.5px solid transparent",
    transition:"all 0.2s"
  });

  return(
    <div style={{minHeight:"100vh",background:G.pearl,display:"flex",flexDirection:"column",alignItems:"center",padding:"36px 16px",overflowY:"auto"}}>
      <div style={{marginBottom:32,textAlign:"center"}}>
        <Logo dark size={26}/>
        <h1 style={{fontFamily:"'Playfair Display',serif",fontSize:32,fontWeight:900,margin:"16px 0 4px",background:G.goldGrad,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",backgroundClip:"text",letterSpacing:6}}>RÉBUS</h1>
        <p style={{color:G.light,fontSize:11,letterSpacing:3,fontWeight:500}}>CONFIGURATION — FORMATRICE NADA</p>
      </div>

      <div style={{width:"100%",maxWidth:680,...card(),overflow:"hidden"}}>
        <div style={{display:"flex",borderBottom:`1px solid ${G.border}`}}>
          <button style={tabS("c")} onClick={()=>setTab("c")}>👥 Participants ({cons.length})</button>
          <button style={tabS("q")} onClick={()=>setTab("q")}>📋 Questions ({qs.length})</button>
        </div>

        <div style={{padding:22,maxHeight:460,overflowY:"auto"}}>
          {tab==="c"&&(
            <div>
              <div style={{display:"flex",gap:8,marginBottom:16}}>
                <input value={name} onChange={e=>setName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addC()} placeholder="Prénom du participant..." style={inp()}/>
                <button onClick={addC} style={pill(true,{whiteSpace:"nowrap",padding:"9px 20px"})}>+ Ajouter</button>
              </div>
              <div style={{display:"grid",gap:8}}>
                {cons.map(c=>(
                  <div key={c.id} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 14px",background:G.pearl,borderRadius:14,border:`1px solid ${G.border}`}}>
                    <div style={{width:36,height:36,borderRadius:"50%",background:c.color,display:"flex",alignItems:"center",justifyContent:"center",color:"white",fontWeight:800,fontSize:14,flexShrink:0}}>{c.name[0]?.toUpperCase()}</div>
                    <input value={c.name} onChange={e=>setCons(p=>p.map(x=>x.id===c.id?{...x,name:e.target.value}:x))} style={{...inp(),flex:1,width:"auto",background:"white"}}/>
                    <select value={c.color} onChange={e=>setCons(p=>p.map(x=>x.id===c.id?{...x,color:e.target.value}:x))} style={{background:"white",border:`1px solid ${G.border}`,borderRadius:8,color:G.dark,padding:"7px 6px",cursor:"pointer",fontSize:12}}>
                      {COLORS.map(col=><option key={col} value={col}>■ {col}</option>)}
                    </select>
                    <button onClick={()=>setCons(p=>p.filter(x=>x.id!==c.id))} style={{background:"rgba(224,80,80,0.1)",border:"none",color:G.red,cursor:"pointer",borderRadius:999,padding:"7px 11px",fontSize:13,fontWeight:700}}>✕</button>
                  </div>
                ))}
              </div>
            </div>
          )}

          {tab==="q"&&(
            <div>
              {qs.map((q,i)=>(
                <div key={q.id} style={{background:editQ===q.id?"white":G.pearl,borderRadius:14,padding:14,marginBottom:10,border:`1.5px solid ${editQ===q.id?G.goldA:G.border}`,transition:"all 0.2s"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:editQ===q.id?14:0}}>
                    <div style={{display:"flex",gap:10,alignItems:"center"}}>
                      <div style={{width:26,height:26,borderRadius:"50%",background:G.goldGrad,display:"flex",alignItems:"center",justifyContent:"center",color:"white",fontWeight:800,fontSize:11}}>{i+1}</div>
                      <span style={{color:G.mid,fontSize:12,fontWeight:500}}>{q.reponse||"—"}</span>
                    </div>
                    <div style={{display:"flex",gap:6}}>
                      <button onClick={()=>setEditQ(editQ===q.id?null:q.id)} style={pill(false,{padding:"5px 12px",fontSize:10,borderRadius:999})}>{editQ===q.id?"▲ Fermer":"✏ Éditer"}</button>
                      <button onClick={()=>setQs(p=>p.filter(x=>x.id!==q.id))} style={{background:"rgba(224,80,80,0.1)",border:"none",color:G.red,cursor:"pointer",borderRadius:999,padding:"5px 10px",fontWeight:700,fontSize:12}}>✕</button>
                    </div>
                  </div>
                  {editQ===q.id&&(
                    <div style={{display:"grid",gap:11,animation:"fadeIn 0.2s ease"}}>
                      <div>
                        <label style={{color:G.light,fontSize:10,letterSpacing:1.5,display:"block",marginBottom:4,fontWeight:600,textTransform:"uppercase"}}>Catégorie (privé)</label>
                        <input value={q.categorie} onChange={e=>setQs(p=>p.map(x=>x.id===q.id?{...x,categorie:e.target.value}:x))} placeholder="ex: PARFUMERIE" style={inp({background:"white"})}/>
                      </div>
                      <div>
                        <label style={{color:G.light,fontSize:10,letterSpacing:1.5,display:"block",marginBottom:8,fontWeight:600,textTransform:"uppercase"}}>5 indices — script de lecture</label>
                        {q.indices.map((ind,j)=>(
                          <div key={j} style={{display:"flex",gap:8,marginBottom:7,alignItems:"center"}}>
                            <div style={{width:22,height:22,borderRadius:"50%",background:G.goldGrad,display:"flex",alignItems:"center",justifyContent:"center",color:"white",fontWeight:800,fontSize:9,flexShrink:0}}>{j+1}</div>
                            <input value={ind} onChange={e=>upInd(q.id,j,e.target.value)} placeholder={`Indice ${j+1}…`} style={inp({background:"white"})}/>
                          </div>
                        ))}
                      </div>
                      <div>
                        <label style={{color:G.light,fontSize:10,letterSpacing:1.5,display:"block",marginBottom:4,fontWeight:600,textTransform:"uppercase"}}>Réponse correcte</label>
                        <input value={q.reponse} onChange={e=>setQs(p=>p.map(x=>x.id===q.id?{...x,reponse:e.target.value}:x))} placeholder="Réponse attendue…" style={inp({background:"white"})}/>
                      </div>
                      <div>
                        <label style={{color:G.light,fontSize:10,letterSpacing:1.5,display:"block",marginBottom:6,fontWeight:600,textTransform:"uppercase"}}>Image produit</label>
                        <input ref={el=>fileRefs.current[q.id]=el} type="file" accept="image/*" onChange={e=>handleImg(q.id,e)} style={{display:"none"}}/>
                        <button onClick={()=>fileRefs.current[q.id]?.click()} style={pill(false,{padding:"8px 16px",fontSize:11})}>📷 Choisir une image</button>
                        {q.image&&<div style={{marginTop:8,borderRadius:10,overflow:"hidden",height:72,background:G.pearl,display:"flex",alignItems:"center",justifyContent:"center"}}>
                          <img src={q.image} style={{maxHeight:72,maxWidth:"100%",objectFit:"contain"}} alt="ap"/>
                        </div>}
                      </div>
                    </div>
                  )}
                </div>
              ))}
              <button onClick={addQ} style={pill(false,{width:"100%",padding:"12px",borderRadius:14})}>+ Nouvelle question</button>
            </div>
          )}
        </div>

        <div style={{padding:"16px 22px",borderTop:`1px solid ${G.border}`,display:"flex",justifyContent:"space-between",alignItems:"center",background:G.pearl}}>
          <span style={{color:G.light,fontSize:11,fontWeight:500}}>{cons.length} participant(s) · {qs.length} question(s)</span>
          <button onClick={()=>onStart(cons,qs)} disabled={cons.length===0||qs.length===0}
            style={pill(true,{padding:"12px 32px",fontSize:13,letterSpacing:1,opacity:cons.length===0||qs.length===0?.4:1})}>
            🎮 Lancer le jeu
          </button>
        </div>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════
   ÉCRAN PUBLIC LUXE
══════════════════════════════════════ */
function PublicScreen({onBack}){
  const [gs,setGs]=useGameSync();

  if(!gs) return(
    <div style={{height:"100vh",background:G.pearl,display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:24}}>
      <Logo dark size={26}/>
      <div style={{textAlign:"center"}}>
        <div style={{color:G.light,fontSize:13,letterSpacing:3,fontWeight:600,animation:"pulse 2s infinite"}}>EN ATTENTE DU DÉMARRAGE…</div>
        <div style={{color:"#ccc",fontSize:11,marginTop:8,marginBottom:20}}>Configurez le jeu depuis l'accueil</div>{onBack&&<button onClick={onBack} style={{padding:"10px 24px",borderRadius:999,border:"none",cursor:"pointer",fontWeight:700,background:"linear-gradient(135deg,#D4A017,#F5C842,#B8860B)",color:"white",fontSize:13}}>← Retour à l'accueil</button>}
      </div>
    </div>
  );

  if(gs.phase==="final") return <FinalPublic gs={gs}/>;

  const q=gs.questions[gs.idx];
  const imgSrc=q?.image||"";
  const blurFilter=gs.phase==="validate"?BLUR_MAP[5]:BLUR_MAP[gs.hintShown];
  const currentPts=POINTS[Math.max(1,gs.hintShown)]||10;
  const res=gs.results[gs.idx];
  const cons=gs.consultants;
  const maxScore=Math.max(1,...cons.map(x=>x.score));

  return(
    <div style={{height:"100vh",background:G.pearl,display:"flex",flexDirection:"column",overflow:"hidden"}}>

      {/* ── HEADER ── */}
      <div style={{background:G.white,borderBottom:`1px solid ${G.border}`,padding:"12px 32px",display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0,boxShadow:"0 2px 16px rgba(0,0,0,0.06)"}}>
        <Logo dark size={20}/>
        <h1 style={{fontFamily:"'Playfair Display',serif",fontSize:30,fontWeight:900,letterSpacing:12,background:G.goldGrad,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",backgroundClip:"text"}}>RÉBUS</h1>
        <div style={{textAlign:"right"}}>
          <div style={{color:G.light,fontSize:9,letterSpacing:3,fontWeight:700,textTransform:"uppercase"}}>Question</div>
          <div style={{fontFamily:"'Playfair Display',serif",fontSize:22,fontWeight:900,background:G.goldGrad,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",backgroundClip:"text"}}>{gs.idx+1}<span style={{fontSize:13,fontWeight:400,WebkitTextFillColor:"#bbb"}}>/{gs.questions.length}</span></div>
        </div>
      </div>

      {/* ── BODY ── */}
      <div style={{flex:1,display:"flex",gap:0,overflow:"hidden"}}>

        {/* SCORES */}
        <div style={{width:210,padding:"16px 12px",borderRight:`1px solid ${G.border}`,background:G.white,display:"flex",flexDirection:"column",gap:8,overflowY:"auto",flexShrink:0}}>
          <div style={{fontSize:9,letterSpacing:3,color:G.light,fontWeight:700,textAlign:"center",textTransform:"uppercase",marginBottom:4}}>Classement</div>

          {[...cons].sort((a,b)=>b.score-a.score).map((c,i)=>(
            <div key={c.id} style={{...card({borderRadius:14,padding:"11px 13px"}),animation:gs.flash===c.id?"flash 1s ease":"none",border:i===0&&c.score>0?`1.5px solid ${G.goldB}`:`1px solid ${G.border}`,transition:"all 0.4s"}}>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <span style={{fontSize:18,flexShrink:0}}>{i===0&&c.score>0?"👑":i===1?"🥈":i===2?"🥉":"·"}</span>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontWeight:700,fontSize:13,color:G.dark,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{c.name}</div>
                </div>
                <div style={{fontFamily:"'Playfair Display',serif",fontSize:20,fontWeight:900,background:G.goldGrad,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",backgroundClip:"text"}}>{c.score}</div>
              </div>
              <div style={{marginTop:7,height:4,background:"#f0f0f0",borderRadius:99}}>
                <div style={{height:"100%",borderRadius:99,width:`${Math.max(4,(c.score/maxScore)*100)}%`,background:G.goldGrad,transition:"width 0.7s ease"}}/>
              </div>
            </div>
          ))}

          {/* Barème */}
          <div style={{marginTop:"auto",...card({borderRadius:14,padding:"11px 13px"})}}>
            <div style={{fontSize:9,letterSpacing:3,color:G.light,fontWeight:700,textAlign:"center",textTransform:"uppercase",marginBottom:8}}>Barème</div>
            {Object.entries(POINTS).map(([k,v])=>(
              <div key={k} style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4,padding:"3px 0",borderBottom:Number(k)===gs.hintShown?"none":"none"}}>
                <div style={{display:"flex",alignItems:"center",gap:6}}>
                  <div style={{width:18,height:18,borderRadius:"50%",background:Number(k)<=gs.hintShown?G.goldGrad:"#f0f0f0",display:"flex",alignItems:"center",justifyContent:"center",fontSize:8,color:Number(k)<=gs.hintShown?"white":G.light,fontWeight:700}}>{k}</div>
                  <span style={{fontSize:10,color:G.light}}>Indice {k}</span>
                </div>
                <span style={{fontSize:11,fontWeight:800,color:Number(k)===gs.hintShown?G.goldA:Number(k)<gs.hintShown?"#bbb":G.mid}}>{v} pts</span>
              </div>
            ))}
          </div>
        </div>

        {/* CENTRE */}
        <div style={{flex:1,padding:"20px 24px",display:"flex",flexDirection:"column",gap:16,overflowY:"auto"}}>

          {/* Image card */}
          <div style={{flex:1,...card({borderRadius:22,overflow:"hidden",position:"relative",minHeight:230,display:"flex",alignItems:"center",justifyContent:"center"})}}>
            {imgSrc?(
              <>
                <img src={imgSrc} style={{maxHeight:"100%",maxWidth:"100%",objectFit:"contain",filter:blurFilter,transition:"filter 1.4s ease",width:"100%",height:"100%"}} alt="produit"/>

                {/* Indicateur points en jeu */}
                {gs.phase==="play"&&gs.hintShown>0&&(
                  <div style={{position:"absolute",top:14,right:14,background:G.goldGrad,borderRadius:14,padding:"10px 16px",textAlign:"center",boxShadow:G.shadowGold,animation:"glow 2.5s infinite"}}>
                    <div style={{color:"white",fontFamily:"'Playfair Display',serif",fontSize:26,fontWeight:900,lineHeight:1}}>{currentPts}</div>
                    <div style={{color:"rgba(255,255,255,0.8)",fontSize:8,letterSpacing:3,fontWeight:700}}>POINTS</div>
                  </div>
                )}

                {/* Dots indicateur flou */}
                <div style={{position:"absolute",bottom:14,left:"50%",transform:"translateX(-50%)",display:"flex",gap:6,background:"rgba(255,255,255,0.85)",borderRadius:99,padding:"6px 12px",boxShadow:"0 2px 12px rgba(0,0,0,0.1)"}}>
                  {[1,2,3,4,5].map(n=>(
                    <div key={n} style={{width:9,height:9,borderRadius:"50%",background:n<=gs.hintShown?G.goldGrad:"#ddd",boxShadow:n<=gs.hintShown?G.shadowGold:undefined,transition:"all 0.4s"}}/>
                  ))}
                </div>
              </>
            ):(
              <div style={{textAlign:"center",opacity:.35}}>
                <div style={{fontSize:68,marginBottom:10}}>🧴</div>
                <div style={{color:G.light,fontSize:13,fontWeight:500}}>Image à venir…</div>
              </div>
            )}
          </div>

          {/* Indices — SANS catégorie */}
          {gs.hintShown===0&&gs.phase==="play"&&(
            <div style={{textAlign:"center",padding:"12px 0"}}>
              <div style={{color:"#ccc",fontSize:13,letterSpacing:4,fontWeight:600,textTransform:"uppercase",animation:"pulse 2s infinite"}}>En attente du premier indice…</div>
            </div>
          )}

          {gs.hintShown>0&&(
            <div style={{display:"flex",flexDirection:"column",gap:10}}>
              {q.indices.slice(0,gs.hintShown).map((ind,i)=>(
                <div key={i} style={{...card({borderRadius:16,padding:"14px 18px",border:i===gs.hintShown-1?`1.5px solid ${G.goldB}`:`1px solid ${G.border}`}),display:"flex",gap:14,alignItems:"flex-start",animation:i===gs.hintShown-1?"fadeIn 0.5s ease":"none"}}>
                  <div style={{width:28,height:28,borderRadius:"50%",background:G.goldGrad,display:"flex",alignItems:"center",justifyContent:"center",color:"white",fontWeight:800,fontSize:12,flexShrink:0,boxShadow:G.shadowGold}}>{i+1}</div>
                  <div style={{color:G.dark,fontSize:15,lineHeight:1.6,fontWeight:i===gs.hintShown-1?600:400}}>{ind}</div>
                </div>
              ))}
            </div>
          )}

          {/* Message résultat */}
          {gs.phase==="validate"&&(
            <div style={{...card({borderRadius:18,padding:"18px 24px",border:`1.5px solid ${res&&!res.skipped?G.goldB:"#fcc"}`,background:res&&!res.skipped?"linear-gradient(135deg,#FFFBF0,#FFF8E7)":"#FFF5F5"}),textAlign:"center",animation:"fadeIn 0.5s ease"}}>
              {res&&!res.skipped?(
                <div style={{fontFamily:"'Playfair Display',serif",fontSize:22,fontWeight:700,background:G.goldGrad,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",backgroundClip:"text"}}>
                  🎉 Bravo {cons.find(c=>c.id===res.cid)?.name} ! +{res.pts} points
                </div>
              ):(
                <div style={{color:G.mid,fontSize:16}}>La réponse était : <strong style={{color:G.dark,fontFamily:"'Playfair Display',serif"}}>{q.reponse}</strong></div>
              )}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════
   PANNEAU NADA — onglet privé (fond sombre conservé)
══════════════════════════════════════ */
function NadaPanel(){
  const [gs,setGs]=useGameSync();

  const update=(patch)=>{const next={...gs,...patch};setGs(next);saveState(next);};

  if(!gs) return(
    <div style={{height:"100vh",background:"#111",display:"flex",alignItems:"center",justifyContent:"center",color:"white",flexDirection:"column",gap:14}}>
      <div style={{fontSize:36}}>🔐</div>
      <div style={{fontSize:13,color:"#888",fontFamily:"'Montserrat',sans-serif"}}>En attente du démarrage du jeu…</div>
    </div>
  );

  const q=gs.questions[gs.idx];
  const isLast=gs.idx===gs.questions.length-1;
  const currentPts=POINTS[Math.max(1,gs.hintShown)]||10;
  const cons=gs.consultants;
  const res=gs.results[gs.idx];

  const revealHint=()=>{if(gs.hintShown<q.indices.length)update({hintShown:gs.hintShown+1});};

  const award=(cid)=>{
    const pts=currentPts;
    const newCons=cons.map(c=>c.id===cid?{...c,score:c.score+pts}:c);
    const newResults={...gs.results,[gs.idx]:{cid,pts}};
    const newRevealed=[...new Set([...gs.revealed,gs.idx])];
    const next={...gs,consultants:newCons,results:newResults,revealed:newRevealed,phase:"validate",flash:cid,_selC:null};
    setGs(next);saveState(next);
    setTimeout(()=>{const s=loadState();if(s){const n={...s,flash:null};setGs(n);saveState(n);}},1200);
  };

  const skip=()=>update({results:{...gs.results,[gs.idx]:{skipped:true}},revealed:[...new Set([...gs.revealed,gs.idx])],phase:"validate"});
  const next=()=>{if(isLast){update({phase:"final"});return;}update({idx:gs.idx+1,hintShown:0,phase:"play",flash:null,_selC:null});};
  const goTo=(i)=>update({idx:i,hintShown:0,phase:gs.revealed.includes(i)?"validate":"play",flash:null,_selC:null});
  const reset=()=>{localStorage.removeItem(STORAGE_KEY);setGs(null);};

  /* couleurs nada panel */
  const NG={bg:"#0d0d0d",card:"rgba(255,255,255,0.06)",border:"rgba(212,160,23,0.25)",gold:"#D4A017",goldL:"#F5C842",cream:"#F0EDE8",light:"#888"};
  const nc=e=>({background:NG.card,borderRadius:12,border:`1px solid ${NG.border}`,padding:"11px 14px",...e});
  const npill=(p=true,e={})=>({padding:"8px 18px",borderRadius:999,border:"none",cursor:"pointer",fontFamily:"'Montserrat',sans-serif",fontWeight:700,fontSize:12,background:p?G.goldGrad:"rgba(255,255,255,0.07)",color:p?"white":NG.cream,...e});

  return(
    <div style={{height:"100vh",background:NG.bg,display:"flex",flexDirection:"column",overflow:"hidden",color:NG.cream}}>
      <div style={{padding:"10px 16px",borderBottom:`1px solid ${NG.border}`,background:"rgba(0,0,0,0.5)",display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0}}>
        <div>
          <div style={{background:G.goldGrad,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",fontWeight:800,fontSize:13,letterSpacing:2}}>🔐 PANNEAU NADA</div>
          <div style={{color:NG.light,fontSize:9,letterSpacing:1,marginTop:1}}>Contrôles privés — non partagé sur Zoom</div>
        </div>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          <span style={{color:NG.light,fontSize:11}}>Q{gs.idx+1}/{gs.questions.length}</span>
          <button onClick={reset} style={npill(false,{padding:"5px 12px",fontSize:10})}>⚙ Reconfig</button>
        </div>
      </div>

      <div style={{flex:1,display:"flex",overflow:"hidden"}}>
        {/* Navigation */}
        <div style={{width:130,padding:10,borderRight:`1px solid ${NG.border}`,overflowY:"auto",flexShrink:0}}>
          <div style={{fontSize:9,letterSpacing:2,color:NG.light,fontWeight:700,textAlign:"center",marginBottom:8,textTransform:"uppercase"}}>Questions</div>
          {gs.questions.map((qu,i)=>(
            <div key={qu.id} onClick={()=>goTo(i)} style={{padding:"7px 9px",borderRadius:9,cursor:"pointer",marginBottom:5,background:i===gs.idx?`${NG.gold}22`:"rgba(255,255,255,0.03)",border:`1px solid ${i===gs.idx?NG.gold+"66":"transparent"}`,transition:"all 0.2s"}}>
              <div style={{color:i===gs.idx?NG.gold:NG.cream,fontSize:10,fontWeight:700}}>{gs.revealed.includes(i)?"✓ ":""}Q{i+1}</div>
              <div style={{color:NG.light,fontSize:9,marginTop:2,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{qu.reponse}</div>
            </div>
          ))}
        </div>

        {/* Contenu */}
        <div style={{flex:1,padding:14,overflowY:"auto",display:"flex",flexDirection:"column",gap:11}}>
          {/* Catégorie + réponse */}
          <div style={nc({display:"flex",gap:16,flexWrap:"wrap"})}>
            <div style={{flex:1}}><div style={{color:NG.light,fontSize:9,letterSpacing:2,marginBottom:4,textTransform:"uppercase",fontWeight:700}}>Catégorie (privé)</div><div style={{color:NG.goldL,fontWeight:700,fontSize:13}}>{q.categorie||"—"}</div></div>
            <div style={{flex:1}}><div style={{color:NG.light,fontSize:9,letterSpacing:2,marginBottom:4,textTransform:"uppercase",fontWeight:700}}>Réponse correcte</div><div style={{color:"#7ecba1",fontWeight:800,fontSize:14,fontFamily:"'Playfair Display',serif"}}>{q.reponse}</div></div>
          </div>

          {/* Script */}
          <div style={nc()}>
            <div style={{color:NG.light,fontSize:9,letterSpacing:2,marginBottom:10,textTransform:"uppercase",fontWeight:700}}>Script — Indices à lire</div>
            {q.indices.map((ind,i)=>(
              <div key={i} style={{display:"flex",gap:9,marginBottom:7,padding:"8px 10px",borderRadius:9,background:i<gs.hintShown?"rgba(212,160,23,0.08)":i===gs.hintShown?"rgba(255,255,255,0.04)":"rgba(0,0,0,0.2)",border:`1px solid ${i<gs.hintShown?NG.gold+"33":"transparent"}`,opacity:i>gs.hintShown?.4:1,transition:"all 0.3s"}}>
                <div style={{width:20,height:20,borderRadius:"50%",background:i<gs.hintShown?G.goldGrad:"rgba(255,255,255,0.1)",display:"flex",alignItems:"center",justifyContent:"center",color:i<gs.hintShown?"white":NG.cream,fontWeight:900,fontSize:9,flexShrink:0}}>{i+1}</div>
                <div style={{flex:1}}><div style={{color:i<gs.hintShown?NG.cream:i===gs.hintShown?NG.goldL:`${NG.cream}66`,fontSize:12,lineHeight:1.4}}>{ind||"—"}</div><div style={{color:`${NG.gold}55`,fontSize:9,marginTop:2}}>{POINTS[i+1]} pts</div></div>
                {i<gs.hintShown&&<div style={{color:"#7ecba1",fontSize:9,alignSelf:"center",fontWeight:700}}>✓</div>}
                {i===gs.hintShown&&gs.phase==="play"&&<div style={{color:NG.gold,fontSize:8,alignSelf:"center",animation:"pulse 1s infinite",fontWeight:700}}>→ SUIVANT</div>}
              </div>
            ))}
          </div>

          {/* Contrôles */}
          {gs.phase==="play"&&(
            <div style={nc()}>
              <div style={{color:NG.light,fontSize:9,letterSpacing:2,marginBottom:10,textTransform:"uppercase",fontWeight:700}}>Contrôles</div>
              <div style={{marginBottom:10}}>
                <div style={{color:NG.light,fontSize:10,marginBottom:7,fontWeight:500}}>Qui a trouvé ?</div>
                <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                  {cons.map(c=>(
                    <button key={c.id} onClick={()=>update({_selC:c.id===gs._selC?null:c.id})}
                      style={{padding:"6px 14px",borderRadius:999,border:`2px solid ${c.id===gs._selC?c.color:c.color+"44"}`,background:c.id===gs._selC?c.color+"22":"transparent",color:c.id===gs._selC?c.color:`${c.color}77`,cursor:"pointer",fontFamily:"inherit",fontSize:12,fontWeight:700}}>
                      {c.name}
                    </button>
                  ))}
                </div>
              </div>
              <div style={{display:"grid",gap:7}}>
                {gs.hintShown<q.indices.length&&(
                  <button onClick={revealHint} style={npill(false,{width:"100%",padding:"9px",background:"rgba(212,160,23,0.12)",border:`1px solid ${NG.gold}44`,color:NG.gold})}>
                    💡 Révéler indice {gs.hintShown+1} → {POINTS[gs.hintShown+1]} pts
                  </button>
                )}
                <button onClick={()=>gs._selC&&award(gs._selC)} disabled={!gs._selC} style={npill(true,{width:"100%",padding:"10px",opacity:gs._selC?1:.4})}>
                  ✓ Valider bonne réponse ({currentPts} pts)
                </button>
                <button onClick={skip} style={npill(false,{width:"100%",padding:"8px",background:"rgba(224,80,80,0.12)",border:"1px solid rgba(224,80,80,0.3)",color:"#e87a7a"})}>
                  ✗ Passer cette question
                </button>
              </div>
              {gs.hintShown>0&&<div style={{textAlign:"center",marginTop:8,color:NG.light,fontSize:10}}>{gs.hintShown} indice(s) · Valeur : <strong style={{color:NG.gold}}>{currentPts} pts</strong></div>}
            </div>
          )}

          {gs.phase==="validate"&&(
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              <div style={nc({textAlign:"center"})}>
                {res&&!res.skipped?<div style={{color:NG.gold,fontWeight:700,fontSize:13}}>✅ {cons.find(c=>c.id===res.cid)?.name} · +{res.pts} pts</div>:<div style={{color:`${NG.cream}66`,fontSize:12}}>❌ Réponse : {q.reponse}</div>}
              </div>
              <button onClick={next} style={npill(true,{width:"100%",padding:"12px",letterSpacing:1,textTransform:"uppercase"})}>
                {isLast?"🏆 Résultats finaux":"Question suivante →"}
              </button>
            </div>
          )}

          {/* Scores */}
          <div style={nc()}>
            <div style={{color:NG.light,fontSize:9,letterSpacing:2,marginBottom:8,textTransform:"uppercase",fontWeight:700}}>Scores</div>
            {[...cons].sort((a,b)=>b.score-a.score).map((c,i)=>(
              <div key={c.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6,padding:"5px 8px",borderRadius:7,background:"rgba(0,0,0,0.2)"}}>
                <div style={{display:"flex",alignItems:"center",gap:7}}><span style={{fontSize:12}}>{i===0?"👑":i===1?"🥈":"🥉"}</span><span style={{color:c.color,fontWeight:700,fontSize:12}}>{c.name}</span></div>
                <span style={{background:G.goldGrad,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",fontWeight:900,fontSize:14}}>{c.score} pts</span>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

            <div>
              <div style={{fontWeight:800,fontSize:15,color:hasGame?G.dark:"#aaa"}}>🔐 Panneau Nada — Privé</div>
              <div style={{color:G.light,fontSize:11,fontWeight:400,marginTop:2}}>Nouvel onglet — ne PAS partager sur Zoom</div>
            </div>
          </div>
          {hasGame&&<button onClick={()=>window.open(window.location.href.split("?")[0]+"?nada","_blank")} style={{...pill(false,{width:"100%",padding:"11px",fontSize:13,border:`1px solid ${G.border}`})}}>
            Ouvrir le panneau Nada →
          </button>}
        </div>

        {!hasGame&&(
          <p style={{textAlign:"center",color:G.light,fontSize:11,fontWeight:500,marginTop:4}}>
            ☝️ Commencez par configurer le jeu pour débloquer les étapes 2 et 3
          </p>
        )}
      </div>
    </div>
  );
}

/* ══════════════════════════════════════
   APP ROOT
══════════════════════════════════════ */
function App(){
  const isNada=window.location.search.includes("nada");
  const [mode,setMode]=useState(()=>isNada?"nada":"welcome");

  if(mode==="setup"){
    const start=(cons,qs)=>{saveState(makeState(cons,qs));setMode("welcome");};
    return <Setup onStart={start}/>;
  }

  if(mode==="nada"||isNada) return <NadaPanel/>;
  if(mode==="public") return <PublicScreen onBack={()=>setMode("welcome")}/>;
  return <Welcome setMode={setMode}/>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
