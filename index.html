<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Rébus Chogan — Mode Présentateur</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#FAFAFA;font-family:'Montserrat',sans-serif;color:#1a1a1a}
    
    /* Styles spécifiques au Mode Présentateur */
    .presenter-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 250px 1fr 200px;
      height: 100vh;
      gap: 15px;
      padding: 15px;
      background: #111;
    }
    .preview-box {
      background: #222;
      border: 1px solid #333;
      border-radius: 12px;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .preview-label {
      position: absolute;
      top: 10px;
      left: 10px;
      background: rgba(0,0,0,0.7);
      color: #D4A017;
      padding: 4px 10px;
      font-size: 10px;
      font-weight: 700;
      border-radius: 4px;
      z-index: 10;
    }
    .notes-area {
      grid-column: span 2;
      background: #1a1a1a;
      border: 2px solid #D4A017;
      border-radius: 12px;
      padding: 30px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .script-text {
      font-size: 32px;
      line-height: 1.4;
      color: #D4A017;
      font-weight: 600;
      text-align: center;
    }
    .controls-area {
      grid-column: span 2;
      background: #222;
      border-radius: 12px;
      padding: 20px;
      display: flex;
      gap: 20px;
      align-items: center;
    }
    
    /* Écran Public */
    .public-screen { height: 100vh; display: flex; flex-direction: column; background: #FAFAFA; }
    
    /* Animations */
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef,useCallback}=React;

const G={gold:"#D4A017", goldGrad:"linear-gradient(135deg,#D4A017 0%,#F5C842 45%,#B8860B 100%)"};
const POINTS={1:50,2:40,3:30,4:20,5:10};
const STORAGE_KEY="rebus_chogan_v2";

const DEFAULT_Q=[
  {id:1,categorie:"PARFUMERIE",indices:["Je suis une fragrance classée « Extrait de Parfum ».","Ma composition contient 0% d'eau ajoutée.","30% d'essence de parfum.","Flacon sobre, identifié par un numéro.","Inspiration grande marque, sans fixateur chimique."],reponse:"Parfum Chogan Luxury",image:""},
  {id:2,categorie:"SOINS VISAGE",indices:["Soin naturel de la gamme Aurodhea.","Efficace contre les taches et cicatrices.","Riche en collagène et acide glycolique.","Allié n°1 contre le vieillissement.","Extrait d'un petit animal à coquille."],reponse:"Crème à la bave d'escargot",image:""}
];

const loadState=()=>{ try{const r=localStorage.getItem(STORAGE_KEY); return r?JSON.parse(r):null;}catch(e){return null;}};
const saveState=s=>{ try{localStorage.setItem(STORAGE_KEY,JSON.stringify(s));}catch(e){}};

/* ─── VUE PRÉSENTATEUR (VOTRE ÉCRAN) ─── */
function PresenterMode(){
  const [gs,setGs]=useState(null);
  useEffect(()=>{
    const sync=()=>setGs(loadState()); sync();
    window.addEventListener("storage",sync); const t=setInterval(sync,300);
    return()=>{window.removeEventListener("storage",sync);clearInterval(t);};
  },[]);

  if(!gs) return <div style={{background:"#111",color:"#FFF",height:"100vh",display:"flex",alignItems:"center",justifyContent:"center"}}>Lancement du mode Présentateur...</div>;

  const q=gs.questions[gs.idx];
  const nextIdx = gs.hintShown < 5 ? gs.hintShown : "MAX";
  const currentNote = q.indices[gs.hintShown] || "Attente de validation ou fin de question.";

  const update=(patch)=>{ const next={...gs,...patch}; setGs(next); saveState(next); };
  
  const award=(cid)=>{
    const pts = POINTS[gs.hintShown] || 10;
    const newCons = gs.consultants.map(c=>c.id===cid?{...c,score:c.score+pts}:c);
    update({consultants:newCons, phase:"validate", results:{...gs.results,[gs.idx]:{cid,pts}}});
  };

  return (
    <div className="presenter-grid">
      {/* 1. Aperçu Écran Public */}
      <div className="preview-box">
        <div className="preview-label">DIRECT (ZOOM)</div>
        <img src={q.image} style={{maxHeight:"150px", opacity:0.5, filter: gs.hintShown === 0 ? "blur(10px)" : "none"}}/>
        <div style={{color:"white", fontSize:"12px", marginTop:10}}>Indice {gs.hintShown} révélé</div>
      </div>

      {/* 2. Aperçu Prochain Indice */}
      <div className="preview-box" style={{borderColor:G.gold}}>
        <div className="preview-label">PROCHAIN ÉLÉMENT</div>
        <div style={{color:G.gold, fontSize:"14px", textAlign:"center", padding:20}}>
          {gs.hintShown < 5 ? `L'indice ${gs.hintShown + 1} va apparaître.` : "Prêt pour la réponse finale."}
        </div>
      </div>

      {/* 3. Zone de Script GÉANTE */}
      <div className="notes-area">
        <div style={{color:"#888", fontSize:12, letterSpacing:2, marginBottom:15, textAlign:"center"}}>SCRIPT À LIRE À HAUTE VOIX :</div>
        <div className="script-text">"{currentNote}"</div>
      </div>

      {/* 4. Contrôles */}
      <div className="controls-area">
        <button onClick={()=>gs.hintShown < 5 && update({hintShown:gs.hintShown+1})} 
          style={{padding:"15px 30px", background:G.gold, color:"white", border:"none", borderRadius:8, fontWeight:700, cursor:"pointer"}}>
          RÉVÉLER L'INDICE {gs.hintShown + 1}
        </button>
        
        <div style={{flex:1, display:"flex", gap:10}}>
          {gs.consultants.map(c=>(
            <button key={c.id} onClick={()=>award(c.id)} 
              style={{padding:"10px", background:"#333", border:`1px solid ${c.color}`, color:c.color, borderRadius:8, fontSize:11, cursor:"pointer"}}>
              {c.name}
            </button>
          ))}
        </div>

        <button onClick={()=>{
           if(gs.idx < gs.questions.length-1) update({idx:gs.idx+1, hintShown:0, phase:"play"});
           else update({phase:"final"});
        }} style={{padding:"15px 25px", background:"#FFF", color:"#111", border:"none", borderRadius:8, fontWeight:700, cursor:"pointer"}}>
          SUIVANT ➔
        </button>
      </div>
    </div>
  );
}

/* ─── VUE PUBLIC (L'ÉCRAN ZOOM) ─── */
function PublicScreen(){
  const [gs,setGs]=useState(null);
  useEffect(()=>{
    const sync=()=>setGs(loadState()); sync();
    window.addEventListener("storage",sync); const t=setInterval(sync,300);
    return()=>{window.removeEventListener("storage",sync);clearInterval(t);};
  },[]);

  if(!gs) return <div style={{height:"100vh", background:"#FAFAFA"}}></div>;
  if(gs.phase==="final") return <div style={{height:"100vh", display:"flex", alignItems:"center", justifyContent:"center", fontSize:40}}>🏆</div>;

  const q=gs.questions[gs.idx];
  return (
    <div className="public-screen">
       <div style={{flex:1, display:"flex", alignItems:"center", justifyItems:"center", padding:40}}>
         <img src={q.image} style={{maxHeight:"80vh", margin:"0 auto", filter: gs.phase==="play" ? `blur(${30 - gs.hintShown*6}px)` : "none", transition:"all 1s"}} />
       </div>
       <div style={{padding:40}}>
          {q.indices.slice(0, gs.hintShown).map((ind, i)=>(
            <div key={i} style={{padding:15, background:"white", marginBottom:10, borderRadius:12, boxShadow:"0 4px 10px rgba(0,0,0,0.05)", borderLeft:`4px solid ${G.gold}`}}>
              {ind}
            </div>
          ))}
       </div>
    </div>
  );
}

function App(){
  const isNada=window.location.search.includes("nada");
  if(isNada) return <PresenterMode/>;
  return <PublicScreen/>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
