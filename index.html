<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Rébus Chogan - Limitless</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet"/>
  <style>
    /* Reset & Base Luxe */
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#FAFAFA;font-family:'Montserrat',sans-serif;color:#2C2C2C;overflow-x:hidden}
    
    /* Animations Fluides */
    @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
    @keyframes goldGlow{0%,100%{box-shadow:0 0 10px rgba(212,175,55,0.2)}50%{box-shadow:0 0 25px rgba(212,175,55,0.5)}}
    @keyframes slideInRight{from{transform:translateX(30px);opacity:0}to{transform:translateX(0);opacity:1}}

    /* Scrollbar élégante */
    ::-webkit-scrollbar{width:6px}
    ::-webkit-scrollbar-thumb{background:#D4AF37;border-radius:10px}
    
    .gold-text {
      background: linear-gradient(135deg, #D4AF37 0%, #B8860B 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      font-family: 'Playfair Display', serif;
    }

    input, textarea {
      background: #FFFFFF !important;
      border: 1px solid #E0E0E0 !important;
      color: #2C2C2C !important;
      transition: all 0.3s;
    }
    input:focus {
      border-color: #D4AF37 !important;
      box-shadow: 0 0 8px rgba(212,175,55,0.2);
    }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef,useCallback}=React;

/* ─── NOUVELLE CHARTE GRAPHIQUE (BLANC & OR) ─── */
const G = {
  bg: "#FAFAFA",      // Fond principal (Blanc Perle)
  card: "#FFFFFF",    // Fond des cartes
  gold: "#D4AF37",    // Or Classique
  goldL: "#F2D482",   // Or Lumineux
  dark: "#2C2C2C",    // Texte Anthracite
  accent: "#B8860B",  // Or Profond
  grey: "#9E9E9E"     // Texte secondaire
};

const POINTS={1:50,2:40,3:30,4:20,5:10};
const BLUR={0:"blur(30px) grayscale(1)",1:"blur(20px) grayscale(0.8)",2:"blur(12px) grayscale(0.5)",3:"blur(7px)",4:"blur(3px)",5:"blur(0px)"};
const COLORS=["#D4AF37","#C5A028","#E5C05B","#A67C00"]; // Nuances d'or pour les participants
const STORAGE_KEY="rebus_chogan_state";

const DEFAULT_Q=[
  {id:1,categorie:"PARFUMERIE",indices:["Je suis une fragrance classée « Extrait de Parfum ».","Ma composition contient 0% d'eau ajoutée.","Je possède une concentration de 30% d'essence de parfum.","Mon flacon est sobre, élégant et identifié par un numéro.","Inspiration grande marque, sans fixateur chimique."],reponse:"Parfum Chogan Luxury",image:""},
  {id:2,categorie:"SOINS VISAGE",indices:["Soin naturel de la gamme Aurodhea.","Efficace contre les taches et cicatrices.","Riche en collagène et acide glycolique.","Allié numéro 1 contre le vieillissement.","Mon ingrédient principal vient d'un petit animal à coquille."],reponse:"Crème à la bave d'escargot",image:""}
];

/* ─── COMPOSANTS UI RÉUTILISABLES ─── */
const Btn = (primary=true, extra={}) => ({
  padding: "12px 24px",
  borderRadius: "50px",
  border: primary ? "none" : `1px solid ${G.gold}`,
  cursor: "pointer",
  fontFamily: "'Montserrat', sans-serif",
  fontWeight: "700",
  fontSize: "13px",
  letterSpacing: "1px",
  background: primary ? `linear-gradient(135deg, ${G.gold}, ${G.accent})` : "transparent",
  color: primary ? "#FFF" : G.gold,
  boxShadow: primary ? "0 4px 15px rgba(212,175,55,0.3)" : "none",
  transition: "all 0.3s ease",
  ...extra
});

const Logo = ({size=24}) => (
  <div style={{display:"flex",alignItems:"center",gap:12}}>
    <div style={{width:40,height:40,background:`linear-gradient(135deg,${G.gold},${G.accent})`,borderRadius:"10px",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,color:"#FFF",fontWeight:900,boxShadow:"0 4px 10px rgba(0,0,0,0.1)"}}>C</div>
    <div>
      <div className="gold-text" style={{fontSize:size,fontWeight:900,letterSpacing:3,lineHeight:1}}>CHOGAN</div>
      <div style={{fontSize:9,color:G.grey,letterSpacing:4,fontWeight:700,marginTop:2}}>LIMITLESS TEAM</div>
    </div>
  </div>
);

/* ─── LOGIQUE DE JEU ─── */
const makeState=(cons,qs)=>({
  phase:"play", idx:0, hintShown:0, results:{}, revealed:[], consultants:cons.map(c=>({...c,score:0})), questions:qs, flash:null
});

function saveState(s){ try{localStorage.setItem(STORAGE_KEY,JSON.stringify(s));}catch(e){} }
function loadState(){ try{const r=localStorage.getItem(STORAGE_KEY);return r?JSON.parse(r):null;}catch(e){return null;} }

/* ══════════════════════════════════════
   PUBLIC SCREEN (ZOOM) - LA VITRINE
══════════════════════════════════════ */
function PublicScreen(){
  const [gs,setGs]=useState(null);

  useEffect(()=>{
    const sync=()=>{const s=loadState();if(s)setGs(s);};
    sync();
    window.addEventListener("storage",sync);
    const t=setInterval(sync,400);
    return()=>{window.removeEventListener("storage",sync);clearInterval(t);};
  },[]);

  if(!gs) return (
    <div style={{height:"100vh",background:G.bg,display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:20}}>
      <Logo size={32}/>
      <div style={{color:G.gold,letterSpacing:3,animation:"fadeIn 2s infinite"}}>PRÉPARATION DU LIVE...</div>
    </div>
  );

  if(gs.phase==="final") return <FinalPublic gs={gs}/>;

  const q = gs.questions[gs.idx];
  const currentPts = POINTS[Math.max(1,gs.hintShown)]||10;
  const res = gs.results[gs.idx];

  return(
    <div style={{height:"100vh",background:G.bg,display:"flex",flexDirection:"column",overflow:"hidden"}}>
      {/* Header Chic */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"20px 40px",background:G.card,boxShadow:"0 2px 20px rgba(0,0,0,0.05)",zIndex:10}}>
        <Logo size={24}/>
        <div style={{textAlign:"center"}}>
           <span style={{fontSize:10,letterSpacing:4,color:G.grey,display:"block"}}>SESSION INTERACTIVE</span>
           <h1 className="gold-text" style={{fontSize:36}}>LE RÉBUS</h1>
        </div>
        <div style={{background:`linear-gradient(135deg,${G.gold},${G.accent})`,padding:"8px 20px",borderRadius:"50px",color:"#FFF",fontWeight:700}}>
          Q {gs.idx+1} <span style={{opacity:0.7,fontSize:11}}>/ {gs.questions.length}</span>
        </div>
      </div>

      <div style={{flex:1,display:"flex",padding:30,gap:30}}>
        {/* Colonne Leaderboard */}
        <div style={{width:260,display:"flex",flexDirection:"column",gap:15}}>
          <h3 style={{fontSize:11,letterSpacing:3,color:G.grey,textAlign:"center"}}>CLASSEMENT ACTUEL</h3>
          {[...gs.consultants].sort((a,b)=>b.score-a.score).map((c,i)=>(
            <div key={c.id} style={{
              background: G.card, padding:15, borderRadius:15, 
              display:"flex", alignItems:"center", justifyContent:"space-between",
              boxShadow: i===0 ? "0 10px 20px rgba(212,175,55,0.15)" : "0 4px 10px rgba(0,0,0,0.03)",
              borderLeft: `5px solid ${c.color}`,
              animation: "slideInRight 0.5s ease"
            }}>
              <div style={{minWidth:0}}>
                <div style={{fontSize:10,color:G.grey,fontWeight:700}}>{i===0?"👑 LEADER":`RANG #${i+1}`}</div>
                <div style={{fontWeight:700,fontSize:14,color:G.dark,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{c.name}</div>
              </div>
              <div style={{fontSize:22,fontWeight:900,color:G.gold,fontFamily:"'Playfair Display'"}}>{c.score}</div>
            </div>
          ))}
        </div>

        {/* Zone de Jeu Centrale */}
        <div style={{flex:1,display:"flex",flexDirection:"column",gap:20}}>
          <div style={{
            flex:1, background:G.card, borderRadius:30, position:"relative",
            display:"flex", alignItems:"center", justifyContent:"center",
            boxShadow: "0 20px 40px rgba(0,0,0,0.05)", border: "1px solid rgba(212,175,55,0.1)",
            overflow:"hidden"
          }}>
            {q?.image ? (
               <img src={q.image} style={{maxHeight:"85%",maxWidth:"85%",objectFit:"contain",filter:gs.phase==="validate" ? "none" : BLUR[gs.hintShown],transition:"all 1.5s cubic-bezier(0.4, 0, 0.2, 1)"}}/>
            ) : (
               <div style={{fontSize:100,opacity:0.1}}>🧴</div>
            )}
            
            {/* Badge Points flottant */}
            <div style={{
              position:"absolute", top:30, right:30, 
              background: `linear-gradient(135deg, ${G.gold}, ${G.accent})`,
              color:"#FFF", padding: "15px 25px", borderRadius: "20px", textAlign:"center",
              animation: "goldGlow 3s infinite"
            }}>
              <div style={{fontSize:10,fontWeight:700,letterSpacing:2}}>À GAGNER</div>
              <div style={{fontSize:32,fontWeight:900,fontFamily:"'Playfair Display'"}}>{currentPts}</div>
              <div style={{fontSize:10,fontWeight:700}}>POINTS</div>
            </div>
          </div>

          {/* Indices */}
          <div style={{display:"grid",gap:10}}>
             {q.indices.slice(0,gs.hintShown).map((ind,i)=>(
               <div key={i} style={{
                 background:G.card, padding:"15px 25px", borderRadius:"15px",
                 borderLeft: `4px solid ${G.gold}`, boxShadow: "0 5px 15px rgba(0,0,0,0.02)",
                 animation: "fadeIn 0.5s ease", color:G.dark, fontSize:16, fontWeight:500
               }}>
                 <span style={{color:G.gold,fontWeight:900,marginRight:15}}>0{i+1}.</span> {ind}
               </div>
             ))}
          </div>

          {/* Révélation de la réponse */}
          {gs.phase==="validate" && (
            <div style={{
              padding:20, borderRadius:20, background: res?.skipped ? "#FFF1F1" : "#F9F5E8",
              border: `1px solid ${G.gold}`, textAlign:"center", animation: "fadeIn 0.5s ease"
            }}>
               <div style={{fontSize:12,color:G.grey,letterSpacing:3}}>LA RÉPONSE ÉTAIT :</div>
               <div style={{fontSize:28,fontWeight:900,fontFamily:"'Playfair Display'",color:G.dark}}>{q.reponse}</div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════
   PANNEAU NADA - L'ADMINISTRATION
══════════════════════════════════════ */
function NadaPanel(){
  const [gs,setGs]=useState(null);
  const sync=useCallback(()=>{const s=loadState();if(s)setGs(s);},[]);
  useEffect(()=>{
    sync();
    window.addEventListener("storage",sync);
    const t=setInterval(sync,300);
    return()=>{window.removeEventListener("storage",sync);clearInterval(t);};
  },[sync]);

  const update=(p)=>{ const n={...gs,...p}; setGs(n); saveState(n); };

  if(!gs) return <div style={{padding:50,textAlign:"center"}}>🔐 Accès sécurisé Nada...</div>;

  const q = gs.questions[gs.idx];
  const currentPts = POINTS[Math.max(1,gs.hintShown)]||10;

  return (
    <div style={{padding:20,background:"#F0F0F0",minHeight:"100vh",fontFamily:"sans-serif"}}>
      <div style={{maxWidth:600,margin:"0 auto",background:"#FFF",borderRadius:20,padding:25,boxShadow:"0 10px 30px rgba(0,0,0,0.1)"}}>
        <h2 style={{color:G.gold,marginBottom:20,borderBottom:`1px solid ${G.gold}33`,paddingBottom:10}}>ADMINISTRATION LIVE</h2>
        
        <div style={{background:"#f9f9f9",padding:15,borderRadius:10,marginBottom:20}}>
          <div style={{fontSize:12,color:G.grey}}>RÉPONSE À FAIRE DEVINER :</div>
          <div style={{fontSize:20,fontWeight:900,color:G.dark}}>{q.reponse}</div>
        </div>

        <div style={{display:"grid",gap:10,marginBottom:30}}>
          {q.indices.map((ind,i)=>(
            <button key={i} 
              onClick={()=>update({hintShown:i+1})}
              style={{
                textAlign:"left",padding:12,borderRadius:10,border:"1px solid #EEE",
                background: i < gs.hintShown ? "#E8F5E9" : "#FFF",
                cursor:"pointer", opacity: i === gs.hintShown ? 1 : 0.6
              }}>
              <span style={{fontWeight:700,color:G.gold}}>INDICE {i+1} :</span> {ind}
            </button>
          ))}
        </div>

        <div style={{borderTop:"1px solid #EEE",paddingTop:20}}>
          <p style={{fontSize:12,marginBottom:10}}>QUI A TROUVÉ ? (Clique sur un nom)</p>
          <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:20}}>
            {gs.consultants.map(c=>(
              <button key={c.id} 
                onClick={()=>{
                  const nc = gs.consultants.map(x=>x.id===c.id?{...x,score:x.score+currentPts}:x);
                  update({consultants:nc,phase:"validate",results:{...gs.results,[gs.idx]:{cid:c.id,pts:currentPts}}});
                }}
                style={Btn(false,{borderColor:c.color,color:c.color})}>
                {c.name}
              </button>
            ))}
          </div>
          
          <button onClick={()=>{
             if(gs.idx < gs.questions.length-1) update({idx:gs.idx+1,hintShown:0,phase:"play"});
             else update({phase:"final"});
          }} style={Btn(true,{width:"100%"})}>QUESTION SUIVANTE ➔</button>
        </div>
      </div>
    </div>
  );
}

/* ─── Écran Final ─── */
function FinalPublic({gs}){
  const win = [...gs.consultants].sort((a,b)=>b.score-a.score)[0];
  return (
    <div style={{height:"100vh",background:G.bg,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",textAlign:"center"}}>
      <Logo size={40}/>
      <h1 className="gold-text" style={{fontSize:60,marginTop:40}}>FÉLICITATIONS !</h1>
      <div style={{margin:"40px 0",background:G.card,padding:40,borderRadius:30,boxShadow:"0 20px 50px rgba(212,175,55,0.2)",border:`2px solid ${G.gold}`}}>
         <div style={{fontSize:80}}>👑</div>
         <div style={{fontSize:42,fontWeight:900,color:G.dark}}>{win.name}</div>
         <div style={{fontSize:20,color:G.gold,fontWeight:700,letterSpacing:5}}>GAGNANT(E) - {win.score} PTS</div>
      </div>
    </div>
  );
}

/* ─── Setup & App Root ─── */
function App(){
  const isNada=window.location.search.includes("nada");
  const [mode,setMode]=useState(isNada?"nada":"welcome");

  if(mode==="welcome"){
    return (
      <div style={{height:"100vh",background:G.bg,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:20}}>
        <Logo size={40}/>
        <button onClick={()=>{
           saveState(makeState([{id:1,name:"Participant 1",color:"#D4AF37"}],DEFAULT_Q));
           setMode("public");
        }} style={Btn(true)}>DÉMARRER LA SESSION</button>
        <p style={{fontSize:11,color:G.grey}}>Clique ici pour initialiser le jeu</p>
      </div>
    );
  }
  if(mode==="nada"||isNada) return <NadaPanel/>;
  return <PublicScreen/>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
