<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Rébus Chogan</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Lato:wght@300;400;700&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    /* CHANGEMENT : Fond clair et lumineux */
    body{background:#FAFAFA;font-family:'Lato',sans-serif;color:#2c2c2c}
    input,textarea,select{font-family:'Lato',sans-serif}
    input::placeholder{color:rgba(44,44,44,0.35)}
    ::-webkit-scrollbar{width:4px}
    ::-webkit-scrollbar-thumb{background:#c9a84c;border-radius:4px}
    @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    @keyframes fadeUp{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:translateY(0)}}
    @keyframes flash{0%,100%{transform:scale(1)}50%{transform:scale(1.07)}}
    @keyframes pulse{0%,100%{opacity:.7}50%{opacity:1}}
    @keyframes glow{0%,100%{box-shadow:0 0 8px #c9a84c33}50%{box-shadow:0 0 22px #c9a84c66}}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef,useCallback}=React;

/* ─── CONSTANTES COULEURS MODIFIÉES (OR & BLANC) ─── */
const G={
  dark:"#FFFFFF",      // Fond des cartes (Blanc)
  green:"#F5F5F5",     // Fond secondaire (Gris très clair)
  gold:"#c9a84c",      // Or Chogan
  goldL:"#e8c97a",     // Or Lumineux
  cream:"#2c2c2c",     // Texte principal (Anthracite pour lisibilité sur blanc)
  red:"#e87a7a"        // Rouge alertes
};

const POINTS={1:50,2:40,3:30,4:20,5:10};
/* CHANGEMENT : Blur + Grayscale pour le côté luxe */
const BLUR={0:"blur(28px) brightness(0.9) grayscale(1)",1:"blur(22px) brightness(0.95) grayscale(0.8)",2:"blur(15px) grayscale(0.5)",3:"blur(9px)",4:"blur(3px)",5:"blur(0px)"};
const COLORS=["#c9a84c","#B8860B","#D4AF37","#DAA520","#C5A028","#e8c97a","#E5C05B","#A67C00","#8B6508","#B89B3C"];
const STORAGE_KEY="rebus_chogan_state";

const DEFAULT_Q=[
  {id:1,categorie:"PARFUMERIE",indices:["Je suis une fragrance classée « Extrait de Parfum ».","Ma composition contient 0% d'eau ajoutée.","Je possède une concentration de 30% d'essence de parfum.","Mon flacon est sobre, élégant et identifié par un numéro.","Je suis une création inspirée d'une grande marque mondiale, sans fixateur chimique."],reponse:"Parfum Chogan (Traditionnel ou Luxury)",image:""},
  {id:2,categorie:"SOINS VISAGE",indices:["Je suis un soin cosmétique naturel de la gamme Aurodhea.","Je suis efficace contre les taches cutanées et les cicatrices.","Ma formule est riche en collagène, élastine et acide glycolique.","Je suis l'allié numéro 1 contre le vieillissement prématuré.","Mon ingrédient principal est extrait d'un petit animal à coquille."],reponse:"Crème à la bave d'escargot",image:""}
];

/* CHANGEMENT : Inputs et Boutons aux couleurs Marie */
const inp=(e={})=>({background:"#FFFFFF",border:`1px solid ${G.gold}66`,borderRadius:8,padding:"8px 11px",color:"#2c2c2c",outline:"none",width:"100%",fontSize:13,...e});
const Btn=(p=true,e={})=>({padding:"9px 18px",borderRadius:8,border:p?"none":`1px solid ${G.gold}`,cursor:"pointer",fontFamily:"inherit",fontWeight:700,background:p?`linear-gradient(135deg,${G.gold},${G.goldL})`:"#FFFFFF",color:p?"#FFFFFF":G.gold,fontSize:13,boxShadow:p?"0 4px 10px rgba(201,168,76,0.3)":"none",transition:"all 0.2s",...e});

/* ─── INITIAL GAME STATE ─── */
const makeState=(cons,qs)=>({
  phase:"play",idx:0,hintShown:0,results:{},revealed:[],consultants:cons.map(c=>({...c,score:0})),questions:qs,flash:null,
});

function saveState(s){ try{localStorage.setItem(STORAGE_KEY,JSON.stringify(s));}catch(e){} }
function loadState(){ try{const r=localStorage.getItem(STORAGE_KEY);return r?JSON.parse(r):null;}catch(e){return null;} }

const Logo=({size=22})=>(
  <div style={{display:"flex",alignItems:"center",gap:10}}>
    <div style={{width:38,height:38,background:`linear-gradient(135deg,${G.gold},${G.goldL})`,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,color:"#FFF",fontWeight:900}}>✿</div>
    <div>
      <div style={{fontFamily:"'Playfair Display',serif",fontSize:size,fontWeight:700,letterSpacing:4,color:G.gold,lineHeight:1}}>CHOGAN</div>
      <div style={{fontSize:9,color:`#2c2c2c77`,letterSpacing:3}}>LIMITLESS TEAM</div>
    </div>
  </div>
);

/* ══════════════════════════════════════
   SETUP SCREEN
══════════════════════════════════════ */
function Setup({onStart}){
  const [cons,setCons]=useState([{id:1,name:"Marie",color:COLORS[0]},{id:2,name:"Sophie",color:COLORS[1]},{id:3,name:"Léa",color:COLORS[2]}]);
  const [qs,setQs]=useState(DEFAULT_Q);
  const [name,setName]=useState("");
  const [tab,setTab]=useState("c");
  const [editQ,setEditQ]=useState(null);
  const fileRefs=useRef({});

  const addC=()=>{if(!name.trim())return;setCons(p=>[...p,{id:Date.now(),name:name.trim(),color:COLORS[p.length%COLORS.length]}]);setName("");};
  const addQ=()=>{const id=Date.now();setQs(p=>[...p,{id,categorie:"",indices:["","","","",""],reponse:"",image:""}]);setEditQ(id);};
  const handleImg=(qid,e)=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>setQs(p=>p.map(q=>q.id===qid?{...q,image:ev.target.result}:q));r.readAsDataURL(f);};
  const upInd=(qid,i,v)=>setQs(p=>p.map(q=>q.id===qid?{...q,indices:q.indices.map((x,j)=>j===i?v:x)}:q));
  const tabS=(t)=>({flex:1,padding:"13px 6px",border:"none",cursor:"pointer",fontFamily:"inherit",fontSize:11,fontWeight:700,letterSpacing:2,textTransform:"uppercase",background:tab===t?`${G.gold}18`:"transparent",color:tab===t?G.gold:`#2c2c2c55`,borderBottom:tab===t?`2px solid ${G.gold}`:"2px solid transparent"});

  return(
    <div style={{minHeight:"100vh",background:`#FAFAFA`,display:"flex",flexDirection:"column",alignItems:"center",padding:"28px 16px",overflowY:"auto"}}>
      <div style={{marginBottom:24,textAlign:"center"}}>
        <Logo size={26}/>
        <h1 style={{color:"#2c2c2c",fontFamily:"'Playfair Display',serif",fontSize:30,margin:"12px 0 4px",letterSpacing:6}}>RÉBUS</h1>
        <p style={{color:`${G.gold}`,fontSize:11,letterSpacing:3}}>CONFIGURATION — FORMATRICE NADA</p>
      </div>

      <div style={{width:"100%",maxWidth:680,background:"#FFFFFF",borderRadius:16,border:`1px solid ${G.gold}22`,overflow:"hidden",boxShadow:"0 10px 30px rgba(0,0,0,0.05)"}}>
        <div style={{display:"flex",borderBottom:`1px solid ${G.gold}22`}}>
          <button style={tabS("c")} onClick={()=>setTab("c")}>👥 Participants ({cons.length})</button>
          <button style={tabS("q")} onClick={()=>setTab("q")}>📋 Questions ({qs.length})</button>
        </div>
        <div style={{padding:18,maxHeight:460,overflowY:"auto"}}>
          {tab==="c"&&(
            <div>
              <div style={{display:"flex",gap:8,marginBottom:14}}>
                <input value={name} onChange={e=>setName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addC()} placeholder="Nom du participant..." style={inp()}/>
                <button onClick={addC} style={Btn(true,{whiteSpace:"nowrap",padding:"8px 14px"})}>+ Ajouter</button>
              </div>
              <div style={{display:"grid",gap:7}}>
                {cons.map(c=>(
                  <div key={c.id} style={{display:"flex",alignItems:"center",gap:9,padding:"9px 12px",background:"#F9F9F9",borderRadius:9,border:`1px solid ${c.color}22`}}>
                    <div style={{width:32,height:32,borderRadius:"50%",background:c.color,display:"flex",alignItems:"center",justifyContent:"center",color:"#FFF",fontWeight:900,fontSize:14,flexShrink:0}}>{c.name[0]?.toUpperCase()}</div>
                    <input value={c.name} onChange={e=>setCons(p=>p.map(x=>x.id===c.id?{...x,name:e.target.value}:x))} style={{...inp(),flex:1,width:"auto"}}/>
                    <button onClick={()=>setCons(p=>p.filter(x=>x.id!==c.id))} style={{background:"rgba(255,80,80,0.1)",border:"none",color:G.red,cursor:"pointer",borderRadius:6,padding:"6px 9px"}}>✕</button>
                  </div>
                ))}
              </div>
            </div>
          )}
          {tab==="q"&&(
            <div>
              {qs.map((q,i)=>(
                <div key={q.id} style={{background:"#F9F9F9",borderRadius:11,padding:13,marginBottom:10,border:`1px solid ${editQ===q.id?G.gold+"55":G.gold+"18"}`}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:editQ===q.id?12:0}}>
                    <div><span style={{color:G.gold,fontWeight:700,fontSize:11,letterSpacing:2}}>Q{i+1}</span><span style={{color:`#2c2c2c55`,fontSize:11,marginLeft:8}}>{q.reponse||"—"}</span></div>
                    <div style={{display:"flex",gap:5}}>
                      <button onClick={()=>setEditQ(editQ===q.id?null:q.id)} style={Btn(false,{padding:"4px 9px",fontSize:10})}>{editQ===q.id?"▲":"✏"}</button>
                      <button onClick={()=>setQs(p=>p.filter(x=>x.id!==q.id))} style={{background:"rgba(255,80,80,0.1)",border:"none",color:G.red,cursor:"pointer",borderRadius:6,padding:"4px 7px",fontSize:11}}>✕</button>
                    </div>
                  </div>
                  {editQ===q.id&&(
                    <div style={{display:"grid",gap:9,animation:"fadeIn 0.2s ease"}}>
                      <input value={q.categorie} onChange={e=>setQs(p=>p.map(x=>x.id===q.id?{...x,categorie:e.target.value}:x))} placeholder="CATÉGORIE" style={inp()}/>
                      {q.indices.map((ind,j)=>(
                        <div key={j} style={{display:"flex",gap:6,alignItems:"center"}}>
                          <input value={ind} onChange={e=>upInd(q.id,j,e.target.value)} placeholder={`Indice ${j+1}...`} style={inp()}/>
                        </div>
                      ))}
                      <input value={q.reponse} onChange={e=>setQs(p=>p.map(x=>x.id===q.id?{...x,reponse:e.target.value}:x))} placeholder="RÉPONSE" style={inp()}/>
                      <input ref={el=>fileRefs.current[q.id]=el} type="file" accept="image/*" onChange={e=>handleImg(q.id,e)} style={{display:"none"}}/>
                      <button onClick={()=>fileRefs.current[q.id]?.click()} style={Btn(false,{fontSize:11})}>📷 Image</button>
                    </div>
                  )}
                </div>
              ))}
              <button onClick={addQ} style={Btn(false,{width:"100%"})}>+ Nouvelle question</button>
            </div>
          )}
        </div>
        <div style={{padding:"14px 18px",borderTop:`1px solid ${G.gold}22`,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <button onClick={()=>onStart(cons,qs)} disabled={cons.length===0} style={Btn(true,{padding:"12px 32px",fontSize:13,letterSpacing:3})}>🎮 LANCER LE JEU</button>
        </div>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════
   ÉCRAN PUBLIC (IDENTIQUE - COULEURS MAJ)
══════════════════════════════════════ */
function PublicScreen(){
  const [gs,setGs]=useState(null);
  useEffect(()=>{
    const sync=()=>{const s=loadState();if(s)setGs(s);}; sync();
    window.addEventListener("storage",sync); const t=setInterval(sync,300);
    return()=>{window.removeEventListener("storage",sync);clearInterval(t);};
  },[]);

  if(!gs) return <div style={{height:"100vh",background:"#FAFAFA",display:"flex",alignItems:"center",justifyContent:"center"}}><Logo size={28}/></div>;
  if(gs.phase==="final") return <FinalPublic gs={gs}/>;

  const q=gs.questions[gs.idx];
  const currentPts=POINTS[Math.max(1,gs.hintShown)]||10;
  const res=gs.results[gs.idx];

  return(
    <div style={{height:"100vh",background:"#FAFAFA",display:"flex",flexDirection:"column"}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"14px 32px",background:"#FFF",borderBottom:`1px solid ${G.gold}22`}}>
        <Logo size={20}/>
        <h1 style={{fontFamily:"'Playfair Display',serif",fontSize:34,color:G.gold,letterSpacing:10}}>RÉBUS</h1>
        <div style={{fontFamily:"'Playfair Display',serif",fontSize:22,color:G.gold}}>{gs.idx+1}/{gs.questions.length}</div>
      </div>

      <div style={{flex:1,display:"flex",padding:20,gap:20}}>
        <div style={{width:200,display:"flex",flexDirection:"column",gap:7}}>
          {gs.consultants.sort((a,b)=>b.score-a.score).map((c,i)=>(
            <div key={c.id} style={{padding:12,background:"#FFF",borderRadius:10,boxShadow:"0 4px 10px rgba(0,0,0,0.03)",borderLeft:`4px solid ${c.color}`}}>
              <div style={{fontSize:10,color:"#999"}}>{i===0?"👑 LEADER":"PARTICIPANT"}</div>
              <div style={{fontWeight:700,color:"#2c2c2c"}}>{c.name}</div>
              <div style={{fontSize:20,fontWeight:900,color:G.gold,fontFamily:"'Playfair Display'"}}>{c.score}</div>
            </div>
          ))}
        </div>

        <div style={{flex:1,display:"flex",flexDirection:"column",gap:15}}>
          <div style={{flex:1,background:"#FFF",borderRadius:18,border:`1px solid ${G.gold}18`,display:"flex",alignItems:"center",justifyContent:"center",position:"relative",overflow:"hidden",boxShadow:"0 10px 30px rgba(0,0,0,0.03)"}}>
            {q?.image && <img src={q.image} style={{maxHeight:"90%",maxWidth:"90%",objectFit:"contain",filter:gs.phase==="validate"?BLUR[5]:BLUR[gs.hintShown],transition:"all 1s ease"}}/>}
            {gs.hintShown>0 && gs.phase==="play" && (
              <div style={{position:"absolute",top:20,right:20,background:G.gold,color:"#FFF",padding:"10px 20px",borderRadius:50,textAlign:"center",boxShadow:"0 5px 15px rgba(201,168,76,0.4)"}}>
                <div style={{fontSize:24,fontWeight:900}}>{currentPts} PTS</div>
              </div>
            )}
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {q.indices.slice(0,gs.hintShown).map((ind,i)=>(
              <div key={i} style={{padding:"12px 18px",background:"#FFF",borderRadius:10,border:`1px solid ${G.gold}22`,animation:"fadeIn 0.5s ease"}}>
                <span style={{color:G.gold,fontWeight:900,marginRight:10}}>{i+1}.</span> {ind}
              </div>
            ))}
          </div>
          {gs.phase==="validate" && (
            <div style={{padding:20,background:res?.skipped?"#FFF":"#F9F5E8",borderRadius:12,border:`2px solid ${G.gold}`,textAlign:"center"}}>
              <div style={{fontSize:12,color:G.gold}}>RÉPONSE :</div>
              <div style={{fontSize:24,fontWeight:900,fontFamily:"'Playfair Display'"}}>{q.reponse}</div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════
   PANNEAU NADA (IDENTIQUE - COULEURS MAJ)
══════════════════════════════════════ */
function NadaPanel(){
  const [gs,setGs]=useState(null);
  const sync=useCallback(()=>{const s=loadState();if(s)setGs(s);},[]);
  useEffect(()=>{
    sync(); window.addEventListener("storage",sync); const t=setInterval(sync,200);
    return()=>{window.removeEventListener("storage",sync);clearInterval(t);};
  },[sync]);

  const update=(p)=>{const n={...gs,...p};setGs(n);saveState(n);};

  if(!gs) return <div style={{padding:20}}>Chargement...</div>;
  const q=gs.questions[gs.idx];

  return(
    <div style={{height:"100vh",background:"#F0F0F0",padding:20,overflowY:"auto"}}>
      <div style={{maxWidth:600,margin:"0 auto",background:"#FFF",padding:25,borderRadius:16,boxShadow:"0 10px 40px rgba(0,0,0,0.1)"}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:20}}>
          <Logo size={20}/>
          <button onClick={()=>{localStorage.removeItem(STORAGE_KEY);window.location.reload();}} style={{border:"none",background:"none",color:G.red,cursor:"pointer",fontSize:11}}>Réinitialiser</button>
        </div>
        <div style={{background:"#F9F9F9",padding:15,borderRadius:10,marginBottom:20,borderLeft:`4px solid ${G.gold}`}}>
          <div style={{fontSize:10,color:G.gold}}>RÉPONSE À FAIRE DEVINER</div>
          <div style={{fontSize:18,fontWeight:900}}>{q.reponse}</div>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:25}}>
          {q.indices.map((ind,i)=>(
            <button key={i} onClick={()=>update({hintShown:i+1})} style={Btn(i<gs.hintShown,{textAlign:"left",width:"100%",opacity:i===gs.hintShown?1:0.7})}>
              {i+1}. {ind}
            </button>
          ))}
        </div>
        {gs.phase==="play" && (
          <div style={{display:"grid",gap:10}}>
            <p style={{fontSize:11,color:"#666"}}>VALIDER POUR :</p>
            <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
              {gs.consultants.map(c=>(
                <button key={c.id} onClick={()=>{
                  const nc=gs.consultants.map(x=>x.id===c.id?{...x,score:x.score+(POINTS[gs.hintShown]||10)}:x);
                  update({consultants:nc,phase:"validate",results:{...gs.results,[gs.idx]:{cid:c.id,pts:POINTS[gs.hintShown]||10}}});
                }} style={Btn(false,{borderColor:c.color,color:c.color})}>{c.name}</button>
              ))}
            </div>
            <button onClick={()=>update({phase:"validate",results:{...gs.results,[gs.idx]:{skipped:true}}})} style={{marginTop:10,background:"none",border:"none",color:"#999",cursor:"pointer"}}>Passer sans points</button>
          </div>
        )}
        {gs.phase==="validate" && (
          <button onClick={()=>{
            if(gs.idx<gs.questions.length-1) update({idx:gs.idx+1,hintShown:0,phase:"play"});
            else update({phase:"final"});
          }} style={Btn(true,{width:"100%",padding:15})}>QUESTION SUIVANTE ➔</button>
        )}
      </div>
    </div>
  );
}

/* ── FINAL & ROOT ── */
function FinalPublic({gs}){
  const w=gs.consultants.sort((a,b)=>b.score-a.score)[0];
  return(
    <div style={{height:"100vh",background:"#FAFAFA",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",textAlign:"center"}}>
      <Logo size={40}/>
      <h1 style={{fontFamily:"'Playfair Display',serif",color:G.gold,fontSize:48,margin:"30px 0"}}>FIN DU JEU</h1>
      <div style={{background:"#FFF",padding:40,borderRadius:25,boxShadow:"0 20px 50px rgba(0,0,0,0.1)",border:`2px solid ${G.gold}`}}>
        <div style={{fontSize:60}}>👑</div>
        <div style={{fontSize:32,fontWeight:900}}>{w.name}</div>
        <div style={{color:G.gold,fontWeight:700}}>{w.score} POINTS</div>
      </div>
    </div>
  );
}

function App(){
  const isNada=window.location.search.includes("nada");
  const [mode,setMode]=useState(isNada?"nada":"welcome");
  if(mode==="welcome"&&!isNada) return (
    <div style={{height:"100vh",background:"#FAFAFA",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:20}}>
      <Logo size={32}/><button onClick={()=>setMode("setup")} style={Btn(true)}>CONFIGURER LE JEU</button>
      <button onClick={()=>setMode("public")} style={Btn(false)}>ÉCRAN PUBLIC (ZOOM)</button>
    </div>
  );
  if(mode==="setup") return <Setup onStart={(c,q)=>{saveState(makeState(c,q));setMode("public");}}/>;
  if(mode==="nada"||isNada) return <NadaPanel/>;
  return <PublicScreen/>;
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
