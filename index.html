<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Rébus Chogan - Limitless Team</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Lato:wght@300;400;700&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#FAFAFA;font-family:'Lato',sans-serif;color:#2C2C2C;overflow-x:hidden}
    .gold-text{color:#D4AF37}
    .gold-bg{background:linear-gradient(135deg, #D4AF37 0%, #F2D482 100%)}
    ::-webkit-scrollbar{width:6px}
    ::-webkit-scrollbar-thumb{background:#D4AF37;border-radius:10px}
    @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef,useCallback}=React;

const G={gold:"#D4AF37",goldL:"#F2D482",text:"#2C2C2C",gray:"#7F8C8D",white:"#FFFFFF"};
const POINTS={1:50,2:40,3:30,4:20,5:10};
const BLUR_STEPS={0:"blur(30px) grayscale(1)",1:"blur(20px)",2:"blur(12px)",3:"blur(7px)",4:"blur(3px)",5:"blur(0px)"};
const COLORS=["#D4AF37","#C5A028","#B8860B","#966F33","#E5C05B"];
const STORAGE_KEY="chogan_rebus_full_v2";

const DEFAULT_Q=[
  {id:1,categorie:"PARFUMERIE",indices:["Je suis une fragrance classée « Extrait de Parfum ».","Ma composition contient 0% d'eau ajoutée.","Je possède une concentration de 30% d'essence de parfum.","Mon flacon est sobre, élégant et identifié par un numéro.","Je suis une création inspirée d'une grande marque mondiale."],reponse:"Parfum Chogan",image:""},
  {id:2,categorie:"SOINS VISAGE",indices:["Je suis un soin cosmétique naturel de la gamme Aurodhea.","Je suis efficace contre les taches cutanées et les cicatrices.","Ma formule est riche en collagène, élastine et acide glycolique.","Je suis l'allié numéro 1 contre le vieillissement prématuré.","Mon ingrédient principal est extrait d'un petit animal à coquille."],reponse:"Crème à la bave d'escargot",image:""},
  {id:3,categorie:"HYGIÈNE",indices:["Je suis un produit de la routine d'hygiène quotidienne.","Je n'utilise aucun agent de blanchiment chimique agressif.","J'élimine les taches de café et de nicotine en douceur.","Ma couleur est surprenante et totalement opposée au blanc habituel.","Je tire mes bienfaits purifiants du charbon actif."],reponse:"Dentifrice Black Power",image:""},
  {id:4,categorie:"ENTRETIEN",indices:["Je fais partie de la gamme de nettoyage puissante.","Je suis efficace sur bois, acier, textile et même moteurs.","Je suis la solution radicale contre les graisses les plus tenaces.","Ma formule est hautement concentrée.","On m'appelle le « Degreaser Plus »."],reponse:"Dégraissant Chogan Plus",image:""},
  {id:5,categorie:"BIEN-ÊTRE",indices:["Allié quotidien pour booster l'organisme de l'intérieur.","Utilisé lors des cures de changement de saison.","Je purifie le sang et aide à la détoxification du foie.","Ma saveur est naturellement amère mais mes bienfaits sont immenses.","Je suis le jus de plante le plus célèbre."],reponse:"Jus d'Aloe Vera à boire",image:""},
  {id:6,categorie:"HUILES ESSENTIELLES",indices:["Extrait liquide hautement concentré et 100% pur.","Peut être diffusé ou mélangé à une huile végétale.","Je suis connue pour mes propriétés relaxantes.","Mon odeur rappelle les champs du sud de la France.","Je suis l'huile essentielle de Lavande Officinale."],reponse:"Huile Essentielle de Lavande",image:""}
];

const save=(s)=>localStorage.setItem(STORAGE_KEY,JSON.stringify(s));
const load=()=>{const r=localStorage.getItem(STORAGE_KEY);return r?JSON.parse(r):null;};

const Logo=({s=24})=>(
  <div style={{display:"flex",alignItems:"center",gap:10}}>
    <div style={{width:40,height:40,background:G.gold,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",color:"#FFF",fontWeight:900}}>C</div>
    <div style={{textAlign:"left"}}>
      <div style={{fontFamily:"'Playfair Display'",fontSize:s,fontWeight:900,letterSpacing:3,color:G.gold,lineHeight:1}}>CHOGAN</div>
      <div style={{fontSize:9,letterSpacing:2,color:G.gray,fontWeight:700}}>LIMITLESS TEAM</div>
    </div>
  </div>
);

/* --- ECRAN CONFIGURATION --- */
function Setup({onStart}){
  const [cons,setCons]=useState([{id:1,name:"Marie",color:COLORS[0]}]);
  const [qs,setQs]=useState(DEFAULT_Q);
  const [name,setName]=useState("");
  const [editIdx,setEditIdx]=useState(null);
  const fileRef = useRef(null);

  const handleImage = (id, e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      setQs(qs.map(q => q.id === id ? {...q, image: ev.target.result} : q));
    };
    reader.readAsDataURL(file);
  };

  return(
    <div style={{padding:40,maxWidth:900,margin:"0 auto"}}>
      <center><Logo s={30}/></center>
      
      <div style={{background:"#FFF",padding:30,borderRadius:20,marginTop:30,boxShadow:"0 10px 40px rgba(0,0,0,0.05)"}}>
        <h2 style={{fontFamily:"'Playfair Display'",marginBottom:20}}>1. Participants</h2>
        <div style={{display:"flex",gap:10,marginBottom:20}}>
          <input value={name} onChange={e=>setName(e.target.value)} placeholder="Nom du consultant..." style={{flex:1,padding:12,borderRadius:8,border:`1px solid ${G.gold}44`}}/>
          <button onClick={()=>{setCons([...cons,{id:Date.now(),name,color:COLORS[cons.length%5]}]);setName("")}} style={{padding:"0 20px",background:G.gold,color:"#FFF",border:"none",borderRadius:8}}>Ajouter</button>
        </div>
        <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
          {cons.map(c=><div key={c.id} style={{padding:"5px 15px",background:`${c.color}22`,borderRadius:20,border:`1px solid ${c.color}`,color:c.color,fontWeight:700}}>{c.name}</div>)}
        </div>

        <h2 style={{fontFamily:"'Playfair Display'",marginTop:40,marginBottom:20}}>2. Questions & Images</h2>
        {qs.map((q,i)=>(
          <div key={q.id} style={{background:"#F9F9F9",padding:15,borderRadius:12,marginBottom:10,border:`1px solid ${editIdx===i?G.gold:'transparent'}`}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <span style={{fontWeight:900}}>{i+1}. {q.reponse}</span>
              <button onClick={()=>setEditIdx(editIdx===i?null:i)} style={{background:"none",border:`1px solid ${G.gold}`,color:G.gold,padding:"5px 15px",borderRadius:5,cursor:"pointer"}}>
                {editIdx===i?"Fermer":"Modifier / Image"}
              </button>
            </div>
            {editIdx===i && (
              <div style={{marginTop:15,display:"grid",gap:10,animation:"fadeIn 0.3s"}}>
                <input type="file" accept="image/*" onChange={(e)=>handleImage(q.id, e)} style={{fontSize:12}}/>
                {q.image && <img src={q.image} style={{height:100,width:100,objectFit:"cover",borderRadius:8}}/>}
                <input value={q.reponse} onChange={e=>setQs(qs.map(x=>x.id===q.id?{...x,reponse:e.target.value}:x))} style={{padding:10,borderRadius:5,border:"1px solid #ddd"}} placeholder="Réponse"/>
                {q.indices.map((ind,idx)=>(
                  <input key={idx} value={ind} onChange={e=>{
                    const newIndices=[...q.indices];newIndices[idx]=e.target.value;
                    setQs(qs.map(x=>x.id===q.id?{...x,indices:newIndices}:x));
                  }} style={{padding:10,borderRadius:5,border:"1px solid #eee"}}/>
                ))}
              </div>
            )}
          </div>
        ))}
        <button onClick={()=>onStart(cons,qs)} style={{width:"100%",marginTop:30,padding:18,background:G.gold,color:"#FFF",border:"none",borderRadius:10,fontWeight:900,fontSize:18,cursor:"pointer",boxShadow:"0 10px 20px rgba(212,175,55,0.3)"}}>DÉMARRER LA SESSION</button>
      </div>
    </div>
  );
}

/* --- ECRAN PUBLIC (ZOOM) --- */
function PublicScreen(){
  const [s,setS]=useState(null);
  useEffect(()=>{const t=setInterval(()=>setS(load()),500);return()=>clearInterval(t)},[]);
  if(!s) return <div style={{height:"100vh",display:"flex",alignItems:"center",justifyContent:"center"}}><Logo s={40}/></div>;
  if(s.phase==="final") return <FinalView s={s}/>;
  const q=s.questions[s.idx];
  return(
    <div style={{height:"100vh",display:"flex",flexDirection:"column",background:"#FAFAFA"}}>
      <div style={{padding:20,background:"#FFF",display:"flex",justifyContent:"space-between",alignItems:"center",borderBottom:`1px solid ${G.gold}22`}}>
        <Logo/><div style={{fontFamily:"'Playfair Display'",fontSize:24,color:G.gold}}>Question {s.idx+1}/{s.questions.length}</div>
      </div>
      <div style={{flex:1,display:"flex",padding:30,gap:30}}>
        <div style={{width:250,display:"flex",flexDirection:"column",gap:15}}>
          {s.consultants.sort((a,b)=>b.score-a.score).map((c,i)=>(
            <div key={c.id} style={{background:"#FFF",padding:15,borderRadius:12,borderLeft:`5px solid ${c.color}`,boxShadow:"0 4px 15px rgba(0,0,0,0.05)"}}>
              <div style={{fontSize:10,color:G.gray}}>{i===0?"🏆 LEADER":"CONSULTANT"}</div>
              <div style={{fontWeight:900,fontSize:18}}>{c.name}</div>
              <div style={{color:G.gold,fontSize:22,fontWeight:900}}>{c.score} PTS</div>
            </div>
          ))}
        </div>
        <div style={{flex:1,display:"flex",flexDirection:"column",gap:20}}>
          <div style={{flex:1,background:"#FFF",borderRadius:25,display:"flex",alignItems:"center",justifyContent:"center",position:"relative",boxShadow:"0 15px 50px rgba(0,0,0,0.05)",overflow:"hidden"}}>
            {q.image ? <img src={q.image} style={{maxWidth:"85%",maxHeight:"85%",filter:s.phase==="revealed"?"none":BLUR_STEPS[s.hintShown],transition:"all 1s ease"}}/> : <div style={{fontSize:100,opacity:0.05,fontWeight:900}}>CHOGAN</div>}
            {s.phase==="play" && s.hintShown>0 && <div style={{position:"absolute",top:30,right:30,background:G.gold,color:"#FFF",padding:"10px 25px",borderRadius:50,fontWeight:900}}>{POINTS[s.hintShown]} PTS</div>}
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            {q.indices.slice(0, s.hintShown).map((ind, i)=>(
              <div key={i} style={{padding:18,background:"#FFF",borderRadius:12,borderLeft:`4px solid ${G.gold}`,boxShadow:"0 5px 15px rgba(0,0,0,0.02)",animation:"fadeIn 0.5s"}}><span style={{fontWeight:900,color:G.gold}}>{i+1}.</span> {ind}</div>
            ))}
          </div>
          {s.phase==="revealed" && <div style={{padding:25,background:G.gold,color:"#FFF",borderRadius:15,textAlign:"center",fontSize:30,fontWeight:900}}>{q.reponse}</div>}
        </div>
      </div>
    </div>
  );
}

/* --- PANNEAU DE CONTROLE (NADA) --- */
function ControlPanel(){
  const [s,setS]=useState(null);
  useEffect(()=>{const t=setInterval(()=>setS(load()),500);return()=>clearInterval(t)},[]);
  if(!s) return <div style={{padding:20,color:"white"}}>En attente...</div>;
  const q=s.questions[s.idx];
  const update=(p)=>{const ns={...s,...p};setS(ns);save(ns)};
  return(
    <div style={{minHeight:"100vh",background:"#1a1a1a",color:"#FFF",padding:20}}>
      <div style={{maxWidth:500,margin:"0 auto"}}>
        <h2 style={{color:G.gold,marginBottom:20}}>PANNEAU NADA</h2>
        <div style={{background:"#333",padding:20,borderRadius:10,marginBottom:20}}>
          <p style={{fontSize:12,color:G.gold}}>RÉPONSE À DEVINER :</p>
          <h3 style={{fontSize:24}}>{q.reponse}</h3>
        </div>
        <div style={{display:"grid",gap:10,marginBottom:30}}>
          {q.indices.map((ind,i)=>(
            <button key={i} onClick={()=>update({hintShown:i+1})} style={{padding:15,textAlign:"left",background:s.hintShown>i?G.gold:"#444",color:"#FFF",border:"none",borderRadius:8,cursor:"pointer"}}>Indice {i+1}</button>
          ))}
        </div>
        {s.phase==="play" ? (
          <div style={{background:"#FFF",padding:20,borderRadius:15,color:"#333"}}>
            <h4 style={{marginBottom:15}}>Valider pour :</h4>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
              {s.consultants.map(c=>(
                <button key={c.id} onClick={()=>{
                  const nc=s.consultants.map(x=>x.id===c.id?{...x,score:x.score+POINTS[s.hintShown]}:x);
                  update({consultants:nc, phase:"revealed"});
                }} style={{padding:12,border:`2px solid ${c.color}`,background:"none",borderRadius:8,fontWeight:700}}>{c.name}</button>
              ))}
              <button onClick={()=>update({phase:"revealed"})} style={{gridColumn:"span 2",padding:10,background:"#ddd",border:"none",borderRadius:5}}>Personne n'a trouvé</button>
            </div>
          </div>
        ) : (
          <button onClick={()=>{
            if(s.idx<s.questions.length-1) update({idx:s.idx+1,hintShown:0,phase:"play"});
            else update({phase:"final"});
          }} style={{width:"100%",padding:20,background:"#27AE60",color:"#FFF",border:"none",borderRadius:10,fontWeight:900,fontSize:18}}>QUESTION SUIVANTE ➔</button>
        )}
      </div>
    </div>
  );
}

function FinalView({s}){
  const w = [...s.consultants].sort((a,b)=>b.score-a.score)[0];
  return(
    <div style={{height:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",background:"#FFF"}}>
      <Logo s={50}/><div style={{marginTop:50,textAlign:"center",animation:"fadeIn 1s"}}>
        <h1 style={{fontFamily:"'Playfair Display'",fontSize:50,color:G.gold}}>Félicitations !</h1>
        <div style={{fontSize:100}}>👑</div>
        <div style={{fontSize:60,fontWeight:900}}>{w.name}</div>
        <div style={{fontSize:30,color:G.gray}}>{w.score} POINTS</div>
      </div>
    </div>
  );
}

function App(){
  const isNada = window.location.search.includes("nada");
  const [mode,setMode]=useState(isNada?"nada":"welcome");
  if(mode==="welcome") return(
    <div style={{height:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:20}}>
      <Logo s={40}/>
      <button onClick={()=>setMode("setup")} style={{padding:"15px 40px",background:G.gold,color:"#FFF",border:"none",borderRadius:50,fontWeight:900,cursor:"pointer"}}>CRÉER LA SESSION</button>
      <button onClick={()=>setMode("public")} style={{padding:"15px 40px",background:"#FFF",color:G.gold,border:`2px solid ${G.gold}`,borderRadius:50,fontWeight:900,cursor:"pointer"}}>ÉCRAN ZOOM</button>
    </div>
  );
  if(mode==="setup") return <Setup onStart={(c,q)=>{save({idx:0,phase:"play",hintShown:0,consultants:c,questions:q});setMode("public")}}/>;
  if(mode==="nada"||isNada) return <ControlPanel/>;
  return <PublicScreen/>;
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
