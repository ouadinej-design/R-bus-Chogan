<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Rébus Chogan — Limitless Team</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Lato:wght@300;400;700&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#0d3826;font-family:'Lato',sans-serif}
    input,textarea{font-family:'Lato',sans-serif}
    input::placeholder,textarea::placeholder{color:rgba(245,236,215,0.35)}
    ::-webkit-scrollbar{width:4px}
    ::-webkit-scrollbar-thumb{background:#c9a84c44;border-radius:4px}
    @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
    @keyframes fadeUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
    @keyframes flash{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
    @keyframes pulse{0%,100%{box-shadow:0 0 0 0 #c9a84c44}50%{box-shadow:0 0 0 8px #c9a84c00}}
    @keyframes blurReveal{from{filter:blur(20px)}to{filter:blur(0px)}}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useRef,useEffect} = React;

const G = {
  dark:"#0d3826", green:"#1a5c3a", gold:"#c9a84c",
  goldL:"#e8c97a", cream:"#f5ecd7", red:"#e87a7a"
};

// Points selon nombre d'indices utilisés
const POINTS_MAP = {1:50, 2:40, 3:30, 4:20, 5:10};
const BLUR_MAP   = {0:"blur(28px) brightness(0.5)", 1:"blur(22px) brightness(0.6)", 2:"blur(16px) brightness(0.7)", 3:"blur(10px) brightness(0.8)", 4:"blur(4px) brightness(0.9)", 5:"blur(0px) brightness(1)"};

const EMOJI_MAP = {
  "PARFUMERIE":"🌸", "SOINS VISAGE":"🧴", "HYGIÈNE":"🦷",
  "ENTRETIEN":"🧹", "BIEN-ÊTRE":"🌿", "HUILES ESSENTIELLES":"💧"
};

const DEFAULT_QUESTIONS = [
  {
    id:1, categorie:"PARFUMERIE",
    indices:[
      "Je suis une fragrance classée « Extrait de Parfum ».",
      "Ma composition contient 0% d'eau ajoutée.",
      "Je possède une concentration de 30% d'essence de parfum.",
      "Mon flacon est sobre, élégant et identifié par un numéro.",
      "Je suis une création inspirée d'une grande marque mondiale, sans fixateur chimique."
    ],
    reponse:"Parfum Chogan (Traditionnel ou Luxury)",
    image:"", imageUrl:""
  },
  {
    id:2, categorie:"SOINS VISAGE (AURODHEA)",
    indices:[
      "Je suis un soin cosmétique naturel de la gamme Aurodhea.",
      "Je suis efficace contre les taches cutanées et les cicatrices.",
      "Ma formule est riche en collagène, élastine et acide glycolique.",
      "Je suis l'allié numéro 1 contre le vieillissement prématuré.",
      "Mon ingrédient principal est extrait d'un petit animal à coquille."
    ],
    reponse:"Crème à la bave d'escargot",
    image:"", imageUrl:""
  },
  {
    id:3, categorie:"HYGIÈNE (BLACK POWER)",
    indices:[
      "Je suis un produit de la routine d'hygiène quotidienne.",
      "Je n'utilise aucun agent de blanchiment chimique agressif.",
      "J'élimine les taches de café et de nicotine en douceur.",
      "Ma couleur est surprenante et totalement opposée au blanc habituel.",
      "Je tire mes bienfaits purifiants du charbon actif."
    ],
    reponse:"Dentifrice Black Power",
    image:"", imageUrl:""
  },
  {
    id:4, categorie:"ENTRETIEN (NETTOYAGE)",
    indices:[
      "Je fais partie de la gamme de nettoyage écologique et puissante.",
      "Je suis efficace sur bois, acier, textile et même moteurs.",
      "Je suis la solution radicale contre les graisses les plus tenaces.",
      "Ma formule est hautement concentrée pour une utilisation professionnelle.",
      "On m'appelle le « Degreaser Plus »."
    ],
    reponse:"Dégraissant Chogan Plus",
    image:"", imageUrl:""
  },
  {
    id:5, categorie:"BIEN-ÊTRE & COMPLÉMENTS",
    indices:[
      "Allié quotidien pour booster l'organisme de l'intérieur.",
      "Utilisé lors des cures de changement de saison.",
      "Je purifie le sang et aide à la détoxification du foie.",
      "Ma saveur est naturellement amère mais mes bienfaits sont immenses.",
      "Je suis le jus de plante le plus célèbre, souvent consommé pur ou dilué."
    ],
    reponse:"Jus d'Aloe Vera à boire",
    image:"", imageUrl:""
  },
  {
    id:6, categorie:"HUILES ESSENTIELLES",
    indices:[
      "Extrait liquide hautement concentré et 100% pur.",
      "Peut être diffusé dans l'air ou mélangé à une huile végétale.",
      "Je suis connue pour mes propriétés relaxantes.",
      "Mon odeur rappelle les champs du sud de la France.",
      "Je suis l'huile essentielle de Lavande Officinale."
    ],
    reponse:"Huile Essentielle de Lavande",
    image:"", imageUrl:""
  }
];

const COLORS = ["#e8c97a","#7ecba1","#e87a7a","#87c8e8","#c87ae8","#f0a070","#a0d080","#80c8f0","#f080b0","#b0e0a0"];

// ─── STYLES COMMUNS ───
const inp = (extra={}) => ({
  background:"rgba(255,255,255,0.07)",
  border:`1px solid ${G.gold}44`,
  borderRadius:8, padding:"9px 12px",
  color:G.cream, outline:"none",
  width:"100%", fontSize:14, ...extra
});

const btn = (primary=true, extra={}) => ({
  padding:"10px 20px", borderRadius:8, border:"none",
  cursor:"pointer", fontFamily:"inherit", fontWeight:700,
  background: primary ? `linear-gradient(135deg,${G.gold},${G.goldL})` : "rgba(255,255,255,0.08)",
  color: primary ? G.dark : G.cream,
  fontSize:14, transition:"all 0.2s", ...extra
});

// ─── LOGO ───
const Logo = ({size=22}) => (
  <div style={{display:"flex",alignItems:"center",gap:10}}>
    <div style={{width:38,height:38,background:`linear-gradient(135deg,${G.gold},${G.goldL})`,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,color:G.dark,fontWeight:900}}>✿</div>
    <div>
      <div style={{fontFamily:"'Playfair Display',serif",fontSize:size,fontWeight:700,letterSpacing:4,color:G.gold,lineHeight:1}}>CHOGAN</div>
      <div style={{fontSize:9,color:`${G.gold}77`,letterSpacing:3}}>LIMITLESS TEAM</div>
    </div>
  </div>
);

// ─── SETUP SCREEN ───
function Setup({onStart}) {
  const [cons, setCons] = useState([
    {id:1,name:"Marie",color:COLORS[0]},
    {id:2,name:"Sophie",color:COLORS[1]},
    {id:3,name:"Léa",color:COLORS[2]},
  ]);
  const [qs, setQs] = useState(DEFAULT_QUESTIONS);
  const [name, setName] = useState("");
  const [tab, setTab] = useState("c");
  const [editQ, setEditQ] = useState(null);
  const fileRefs = useRef({});

  const addC = () => {
    if (!name.trim()) return;
    const id = Date.now();
    setCons(p=>[...p,{id,name:name.trim(),color:COLORS[p.length%COLORS.length]}]);
    setName("");
  };

  const updateIndice = (qid, idx, val) =>
    setQs(p=>p.map(q=>q.id===qid?{...q,indices:q.indices.map((ind,i)=>i===idx?val:ind)}:q));

  const addIndice = (qid) =>
    setQs(p=>p.map(q=>q.id===qid&&q.indices.length<5?{...q,indices:[...q.indices,""]}:q));

  const removeIndice = (qid, idx) =>
    setQs(p=>p.map(q=>q.id===qid?{...q,indices:q.indices.filter((_,i)=>i!==idx)}:q));

  const addQ = () => {
    const id = Date.now();
    setQs(p=>[...p,{id,categorie:"Nouvelle catégorie",indices:["","","","",""],reponse:"",image:"",imageUrl:""}]);
    setEditQ(id);
  };

  const removeQ = (id) => setQs(p=>p.filter(q=>q.id!==id));

  const handleImg = (qid,e) => {
    const f = e.target.files[0]; if(!f) return;
    const r = new FileReader();
    r.onload = ev => setQs(p=>p.map(q=>q.id===qid?{...q,image:ev.target.result}:q));
    r.readAsDataURL(f);
  };

  const tabStyle = (t) => ({
    flex:1,padding:"14px 8px",border:"none",cursor:"pointer",
    fontFamily:"inherit",fontSize:12,fontWeight:700,letterSpacing:2,
    textTransform:"uppercase",
    background:tab===t?`${G.gold}18`:"transparent",
    color:tab===t?G.gold:`${G.cream}55`,
    borderBottom:tab===t?`2px solid ${G.gold}`:"2px solid transparent"
  });

  return (
    <div style={{minHeight:"100vh",background:`linear-gradient(160deg,${G.dark},#071a10)`,display:"flex",flexDirection:"column",alignItems:"center",padding:"32px 16px"}}>
      <div style={{marginBottom:28,textAlign:"center"}}>
        <Logo size={28}/>
        <h1 style={{color:G.cream,fontFamily:"'Playfair Display',serif",fontSize:32,margin:"14px 0 4px",letterSpacing:6}}>RÉBUS</h1>
        <p style={{color:`${G.gold}99`,fontSize:12,letterSpacing:3}}>CONFIGURATION DU JEU</p>
      </div>

      <div style={{width:"100%",maxWidth:700,background:"rgba(255,255,255,0.035)",borderRadius:18,border:`1px solid ${G.gold}22`,overflow:"hidden"}}>
        <div style={{display:"flex",borderBottom:`1px solid ${G.gold}22`}}>
          <button style={tabStyle("c")} onClick={()=>setTab("c")}>👥 Participants ({cons.length})</button>
          <button style={tabStyle("q")} onClick={()=>setTab("q")}>📋 Questions ({qs.length})</button>
        </div>

        <div style={{padding:20,maxHeight:480,overflowY:"auto"}}>

          {/* ─ PARTICIPANTS ─ */}
          {tab==="c" && (
            <div>
              <div style={{display:"flex",gap:8,marginBottom:16}}>
                <input value={name} onChange={e=>setName(e.target.value)}
                  onKeyDown={e=>e.key==="Enter"&&addC()}
                  placeholder="Nom du participant..." style={inp()}/>
                <button onClick={addC} style={btn(true,{whiteSpace:"nowrap",padding:"9px 16px"})}>+ Ajouter</button>
              </div>
              <p style={{color:`${G.gold}66`,fontSize:11,marginBottom:12,letterSpacing:1}}>✓ Participants illimités</p>
              <div style={{display:"grid",gap:8}}>
                {cons.map(c=>(
                  <div key={c.id} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 14px",background:"rgba(255,255,255,0.04)",borderRadius:10,border:`1px solid ${c.color}22`}}>
                    <div style={{width:36,height:36,borderRadius:"50%",background:c.color,display:"flex",alignItems:"center",justifyContent:"center",color:"#111",fontWeight:900,fontSize:15,flexShrink:0}}>{c.name[0]?.toUpperCase()}</div>
                    <input value={c.name} onChange={e=>setCons(p=>p.map(x=>x.id===c.id?{...x,name:e.target.value}:x))} style={{...inp(),flex:1,width:"auto"}}/>
                    <select value={c.color} onChange={e=>setCons(p=>p.map(x=>x.id===c.id?{...x,color:e.target.value}:x))}
                      style={{background:"rgba(0,0,0,0.3)",border:`1px solid ${G.gold}33`,borderRadius:6,color:G.cream,padding:"6px 4px",cursor:"pointer"}}>
                      {COLORS.map(col=><option key={col} value={col} style={{background:"#0d3826"}}>■ {col}</option>)}
                    </select>
                    <button onClick={()=>setCons(p=>p.filter(x=>x.id!==c.id))} style={{background:"rgba(255,80,80,0.15)",border:"none",color:G.red,cursor:"pointer",borderRadius:6,padding:"6px 10px",fontSize:16}}>✕</button>
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* ─ QUESTIONS ─ */}
          {tab==="q" && (
            <div>
              {qs.map((q,i)=>(
                <div key={q.id} style={{background:"rgba(255,255,255,0.04)",borderRadius:12,padding:14,marginBottom:12,border:`1px solid ${editQ===q.id?G.gold+"55":G.gold+"18"}`}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                    <div style={{display:"flex",alignItems:"center",gap:8}}>
                      <span style={{color:G.gold,fontWeight:700,fontSize:12,letterSpacing:2}}>Q{i+1}</span>
                      <span style={{color:`${G.cream}66`,fontSize:12}}>{q.categorie}</span>
                    </div>
                    <div style={{display:"flex",gap:6}}>
                      <button onClick={()=>setEditQ(editQ===q.id?null:q.id)} style={{...btn(false,{padding:"4px 10px",fontSize:11})}}>
                        {editQ===q.id?"▲ Fermer":"✏ Éditer"}
                      </button>
                      <button onClick={()=>removeQ(q.id)} style={{background:"rgba(255,80,80,0.12)",border:"none",color:G.red,cursor:"pointer",borderRadius:6,padding:"4px 8px",fontSize:12}}>✕</button>
                    </div>
                  </div>

                  {editQ===q.id && (
                    <div style={{display:"grid",gap:10,animation:"fadeIn 0.2s ease"}}>
                      <div>
                        <label style={{color:`${G.gold}88`,fontSize:11,letterSpacing:1,display:"block",marginBottom:4}}>CATÉGORIE</label>
                        <input value={q.categorie} onChange={e=>setQs(p=>p.map(x=>x.id===q.id?{...x,categorie:e.target.value}:x))} style={inp()}/>
                      </div>

                      <div>
                        <label style={{color:`${G.gold}88`,fontSize:11,letterSpacing:1,display:"block",marginBottom:4}}>5 INDICES (script de lecture)</label>
                        {q.indices.map((ind,idx)=>(
                          <div key={idx} style={{display:"flex",gap:6,marginBottom:6,alignItems:"center"}}>
                            <div style={{width:20,height:20,borderRadius:"50%",background:`${G.gold}22`,border:`1px solid ${G.gold}44`,display:"flex",alignItems:"center",justifyContent:"center",color:G.gold,fontSize:10,fontWeight:700,flexShrink:0}}>{idx+1}</div>
                            <input value={ind} onChange={e=>updateIndice(q.id,idx,e.target.value)} placeholder={`Indice ${idx+1}...`} style={inp()}/>
                            {q.indices.length>1&&<button onClick={()=>removeIndice(q.id,idx)} style={{background:"none",border:"none",color:`${G.red}99`,cursor:"pointer",fontSize:14,padding:"0 4px"}}>✕</button>}
                          </div>
                        ))}
                        {q.indices.length<5&&<button onClick={()=>addIndice(q.id)} style={{...btn(false,{padding:"6px 12px",fontSize:12,marginTop:4})}}> + Ajouter un indice</button>}
                      </div>

                      <div>
                        <label style={{color:`${G.gold}88`,fontSize:11,letterSpacing:1,display:"block",marginBottom:4}}>RÉPONSE</label>
                        <input value={q.reponse} onChange={e=>setQs(p=>p.map(x=>x.id===q.id?{...x,reponse:e.target.value}:x))} placeholder="Réponse attendue..." style={inp()}/>
                      </div>

                      <div>
                        <label style={{color:`${G.gold}88`,fontSize:11,letterSpacing:1,display:"block",marginBottom:6}}>IMAGE PRODUIT</label>
                        <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
                          <input ref={el=>fileRefs.current[q.id]=el} type="file" accept="image/*" onChange={e=>handleImg(q.id,e)} style={{display:"none"}}/>
                          <button onClick={()=>fileRefs.current[q.id]?.click()} style={{...btn(false,{padding:"7px 14px",fontSize:12})}}>📷 Choisir image</button>
                          <span style={{color:`${G.cream}55`,fontSize:11}}>ou</span>
                          <input value={q.imageUrl||""} onChange={e=>setQs(p=>p.map(x=>x.id===q.id?{...x,imageUrl:e.target.value}:x))} placeholder="Coller une URL d'image..." style={{...inp(),flex:1,fontSize:12}}/>
                        </div>
                        {(q.image||q.imageUrl)&&<div style={{marginTop:8,borderRadius:8,overflow:"hidden",height:80,background:"rgba(0,0,0,0.3)",display:"flex",alignItems:"center",justifyContent:"center"}}>
                          <img src={q.image||q.imageUrl} style={{maxHeight:80,maxWidth:"100%",objectFit:"contain"}} alt="aperçu" onError={e=>e.target.style.display="none"}/>
                        </div>}
                      </div>
                    </div>
                  )}

                  {editQ!==q.id && (
                    <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                      {q.indices.map((_,idx)=>(
                        <div key={idx} style={{width:24,height:24,borderRadius:"50%",background:`${G.gold}22`,border:`1px solid ${G.gold}33`,display:"flex",alignItems:"center",justifyContent:"center",color:G.gold,fontSize:11,fontWeight:700}}>{idx+1}</div>
                      ))}
                      <span style={{color:`${G.cream}66`,fontSize:12,marginLeft:4,alignSelf:"center"}}>→ {q.reponse||"?"}</span>
                    </div>
                  )}
                </div>
              ))}
              <button onClick={addQ} style={{...btn(false,{width:"100%",padding:"12px"})}}>+ Ajouter une question</button>
            </div>
          )}
        </div>

        <div style={{padding:"16px 20px",borderTop:`1px solid ${G.gold}22`,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <span style={{color:`${G.cream}44`,fontSize:12}}>{cons.length} participant(s) · {qs.length} question(s)</span>
          <button onClick={()=>onStart(cons,qs)} disabled={cons.length===0||qs.length===0}
            style={{...btn(true,{padding:"13px 36px",fontSize:14,letterSpacing:3,textTransform:"uppercase",opacity:cons.length===0||qs.length===0?.4:1})}}>
            🎮 LANCER LE JEU
          </button>
        </div>
      </div>
    </div>
  );
}

// ─── GAME SCREEN ───
function Game({consultants:initC, questions, onReset}) {
  const [cons, setCons] = useState(initC.map(c=>({...c,score:0})));
  const [idx, setIdx] = useState(0);
  const [hintShown, setHintShown] = useState(0); // combien d'indices révélés
  const [results, setResults] = useState({}); // idx -> {cid, pts, skipped}
  const [revealed, setRevealed] = useState([]); // questions terminées
  const [phase, setPhase] = useState("play"); // play | validate | final
  const [selC, setSelC] = useState(null);
  const [flash, setFlash] = useState(null);
  const [view, setView] = useState("game"); // game | script
  const fileRef = useRef();
  const [imgOverride, setImgOverride] = useState({});

  const q = questions[idx];
  const isLast = idx === questions.length - 1;
  const imgSrc = imgOverride[q.id] || q.image || q.imageUrl || "";
  const blurFilter = BLUR_MAP[hintShown] || BLUR_MAP[0];
  const currentPts = POINTS_MAP[hintShown] || 10;

  const revealHint = () => {
    if (hintShown < q.indices.length) setHintShown(h=>h+1);
  };

  const award = (cid) => {
    const pts = currentPts;
    setCons(p=>p.map(c=>c.id===cid?{...c,score:c.score+pts}:c));
    setFlash(cid); setTimeout(()=>setFlash(null),1000);
    setResults(p=>({...p,[idx]:{cid,pts}}));
    setRevealed(p=>[...p,idx]);
    setPhase("validate");
  };

  const skip = () => {
    setResults(p=>({...p,[idx]:{skipped:true}}));
    setRevealed(p=>[...p,idx]);
    setPhase("validate");
  };

  const next = () => {
    if (isLast) { setPhase("final"); return; }
    setIdx(i=>i+1);
    setHintShown(0);
    setSelC(null);
    setPhase("play");
  };

  const goTo = (i) => {
    setIdx(i);
    setHintShown(0);
    setSelC(null);
    setPhase(revealed.includes(i)?"validate":"play");
  };

  const handleImg = (e) => {
    const f=e.target.files[0]; if(!f) return;
    const r=new FileReader();
    r.onload=ev=>setImgOverride(p=>({...p,[q.id]:ev.target.result}));
    r.readAsDataURL(f);
  };

  if (phase==="final") return <Final consultants={[...cons].sort((a,b)=>b.score-a.score)} onReset={onReset}/>;

  const emoji = EMOJI_MAP[q.categorie?.split(" ")[0]] || "📦";

  return (
    <div style={{minHeight:"100vh",background:`linear-gradient(160deg,${G.dark},#071a10)`,display:"flex",flexDirection:"column"}}>
      {/* HEADER */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"12px 20px",borderBottom:`1px solid ${G.gold}22`,background:"rgba(0,0,0,0.25)",flexWrap:"wrap",gap:8}}>
        <Logo size={18}/>
        <h1 style={{color:G.gold,fontFamily:"'Playfair Display',serif",fontSize:24,letterSpacing:6}}>RÉBUS</h1>
        <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
          <button onClick={()=>setView(v=>v==="game"?"script":"game")} style={{...btn(false,{padding:"6px 12px",fontSize:11,background:`${G.gold}18`,border:`1px solid ${G.gold}44`,color:G.gold})}}>
            {view==="game"?"📄 Script":"🎮 Jeu"}
          </button>
          <button onClick={onReset} style={{...btn(false,{padding:"6px 10px",fontSize:11})}}>⚙</button>
          <button onClick={()=>setPhase("final")} style={{...btn(false,{padding:"6px 10px",fontSize:11})}}>🏆</button>
        </div>
      </div>

      {view==="script" ? (
        /* ─── VUE SCRIPT ─── */
        <div style={{flex:1,display:"flex",gap:0}}>
          {/* liste questions */}
          <div style={{width:200,borderRight:`1px solid ${G.gold}18`,padding:12,overflowY:"auto",display:"flex",flexDirection:"column",gap:6}}>
            {questions.map((qu,i)=>(
              <div key={qu.id} onClick={()=>{setIdx(i);}} style={{padding:"8px 10px",borderRadius:8,cursor:"pointer",background:i===idx?`${G.gold}22`:"rgba(255,255,255,0.04)",border:`1px solid ${i===idx?G.gold+"66":"transparent"}`,animation:i===idx?"pulse 2s infinite":"none"}}>
                <div style={{color:i===idx?G.gold:G.cream,fontSize:11,fontWeight:700}}>Q{i+1} — {qu.categorie}</div>
                <div style={{color:`${G.cream}55`,fontSize:10,marginTop:2}}>{qu.reponse}</div>
              </div>
            ))}
          </div>
          {/* script actuel */}
          <div style={{flex:1,padding:28,overflowY:"auto"}}>
            <div style={{marginBottom:20}}>
              <div style={{color:`${G.gold}88`,fontSize:11,letterSpacing:3,textTransform:"uppercase",marginBottom:6}}>CATÉGORIE</div>
              <div style={{color:G.gold,fontFamily:"'Playfair Display',serif",fontSize:22,fontWeight:700}}>{q.categorie}</div>
            </div>
            <div style={{marginBottom:20}}>
              <div style={{color:`${G.gold}88`,fontSize:11,letterSpacing:3,textTransform:"uppercase",marginBottom:12}}>SCRIPT DE LECTURE</div>
              {q.indices.map((ind,i)=>(
                <div key={i} style={{display:"flex",gap:14,padding:"14px 16px",marginBottom:8,background:i<hintShown?`${G.gold}12`:"rgba(255,255,255,0.04)",borderRadius:10,border:`1px solid ${i<hintShown?G.gold+"44":G.gold+"15"}`,animation:i===hintShown-1?"fadeIn 0.3s ease":"none"}}>
                  <div style={{width:28,height:28,borderRadius:"50%",background:i<hintShown?`linear-gradient(135deg,${G.gold},${G.goldL})`:"rgba(255,255,255,0.08)",display:"flex",alignItems:"center",justifyContent:"center",color:i<hintShown?G.dark:G.cream,fontWeight:900,fontSize:12,flexShrink:0}}>{i+1}</div>
                  <div style={{flex:1}}>
                    <div style={{color:i<hintShown?G.cream:`${G.cream}55`,fontSize:14,lineHeight:1.5}}>{ind}</div>
                    <div style={{color:`${G.gold}77`,fontSize:11,marginTop:4}}>
                      → {POINTS_MAP[i+1]} points si réponse correcte à cet indice
                    </div>
                  </div>
                </div>
              ))}
            </div>
            <div style={{padding:"14px 18px",borderRadius:10,background:"rgba(0,0,0,0.3)",border:`1px solid ${G.gold}33`}}>
              <div style={{color:`${G.gold}88`,fontSize:11,letterSpacing:2,marginBottom:4}}>RÉPONSE</div>
              <div style={{color:G.gold,fontFamily:"'Playfair Display',serif",fontSize:18,fontWeight:700}}>{q.reponse}</div>
            </div>
          </div>
        </div>
      ) : (
        /* ─── VUE JEU ─── */
        <div style={{flex:1,display:"grid",gridTemplateColumns:"220px 1fr 230px",overflow:"hidden"}}>

          {/* LISTE QUESTIONS */}
          <div style={{padding:12,borderRight:`1px solid ${G.gold}18`,overflowY:"auto",display:"flex",flexDirection:"column",gap:6}}>
            {questions.map((qu,i)=>{
              const done=revealed.includes(i);
              const active=i===idx;
              const res=results[i];
              const wc=res&&!res.skipped?cons.find(c=>c.id===res.cid):null;
              return (
                <div key={qu.id} onClick={()=>goTo(i)} style={{padding:"9px 10px",borderRadius:9,cursor:"pointer",background:active?`${G.gold}18`:"rgba(255,255,255,0.04)",border:`1px solid ${active?G.gold+"55":"transparent"}`,opacity:done&&!active?.7:1,transition:"all 0.2s"}}>
                  <div style={{display:"flex",gap:7,alignItems:"flex-start"}}>
                    <div style={{width:22,height:22,borderRadius:"50%",background:active?`linear-gradient(135deg,${G.gold},${G.goldL})`:done?"rgba(100,200,100,0.2)":"rgba(255,255,255,0.08)",display:"flex",alignItems:"center",justifyContent:"center",color:active?G.dark:done?"#7ecba1":G.cream,fontWeight:900,fontSize:10,flexShrink:0}}>{done?"✓":i+1}</div>
                    <div style={{flex:1}}>
                      <div style={{color:active?G.gold:G.cream,fontSize:11,fontWeight:700,lineHeight:1.3}}>{qu.categorie}</div>
                      {done&&<div style={{fontSize:10,color:wc?wc.color:`${G.cream}44`,marginTop:2}}>{wc?`✓ ${wc.name} +${res.pts}pts`:"❌ Passée"}</div>}
                    </div>
                  </div>
                </div>
              );
            })}
          </div>

          {/* CENTRE */}
          <div style={{padding:20,display:"flex",flexDirection:"column",gap:14,overflowY:"auto"}}>
            {/* Header question */}
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:12}}>
              <div>
                <div style={{color:`${G.gold}88`,fontSize:10,letterSpacing:3,textTransform:"uppercase",marginBottom:4}}>Question {idx+1}/{questions.length}</div>
                <div style={{color:G.gold,fontFamily:"'Playfair Display',serif",fontSize:17,fontWeight:700}}>{q.categorie}</div>
                {phase==="validate"&&<div style={{color:G.cream,fontSize:13,marginTop:4}}>✅ {q.reponse}</div>}
              </div>
              <div style={{textAlign:"center",background:`${G.gold}18`,border:`1px solid ${G.gold}44`,borderRadius:10,padding:"8px 14px",flexShrink:0}}>
                <div style={{color:G.gold,fontSize:20,fontWeight:900,fontFamily:"'Playfair Display',serif"}}>{currentPts}</div>
                <div style={{color:`${G.gold}77`,fontSize:9,letterSpacing:2}}>POINTS</div>
              </div>
            </div>

            {/* IMAGE */}
            <div style={{background:"rgba(0,0,0,0.25)",borderRadius:14,border:`1px solid ${G.gold}18`,display:"flex",alignItems:"center",justifyContent:"center",position:"relative",overflow:"hidden",height:220}}>
              {imgSrc ? (
                <>
                  <img src={imgSrc} style={{maxHeight:"100%",maxWidth:"100%",objectFit:"contain",filter:phase==="validate"?BLUR_MAP[5]:blurFilter,transition:"filter 1s ease"}} alt="produit"/>
                  {phase==="play"&&hintShown===0&&<div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",background:"rgba(0,0,0,0.3)"}}>
                    <div style={{background:"rgba(13,56,38,0.85)",borderRadius:10,padding:"10px 20px",border:`1px solid ${G.gold}33`}}>
                      <div style={{color:G.gold,fontSize:12,fontWeight:700,letterSpacing:2}}>IMAGE MASQUÉE</div>
                    </div>
                  </div>}
                  <button onClick={()=>fileRef.current?.click()} style={{position:"absolute",bottom:8,right:8,background:"rgba(0,0,0,0.6)",border:`1px solid ${G.gold}33`,color:G.cream,cursor:"pointer",borderRadius:6,padding:"4px 8px",fontSize:10}}>🔄 Changer</button>
                </>
              ) : (
                <div style={{textAlign:"center",padding:20}}>
                  <div style={{fontSize:52,marginBottom:8,opacity:.35}}>{emoji}</div>
                  <button onClick={()=>fileRef.current?.click()} style={{...btn(false,{padding:"8px 16px",fontSize:12,border:`1px dashed ${G.gold}44`})}}>📷 Ajouter image</button>
                </div>
              )}
              <input ref={fileRef} type="file" accept="image/*" onChange={handleImg} style={{display:"none"}}/>

              {/* Blur level indicator */}
              <div style={{position:"absolute",top:8,left:8,display:"flex",gap:3}}>
                {[1,2,3,4,5].map(n=>(
                  <div key={n} style={{width:8,height:8,borderRadius:"50%",background:n<=hintShown?G.gold:"rgba(255,255,255,0.2)",transition:"background 0.3s"}}/>
                ))}
              </div>
            </div>

            {/* INDICES RÉVÉLÉS */}
            {hintShown>0&&(
              <div style={{display:"flex",flexDirection:"column",gap:6}}>
                {q.indices.slice(0,hintShown).map((ind,i)=>(
                  <div key={i} style={{display:"flex",gap:10,padding:"10px 13px",background:`${G.gold}0c`,borderRadius:9,border:`1px solid ${G.gold}22`,animation:"fadeIn 0.3s ease"}}>
                    <div style={{width:22,height:22,borderRadius:"50%",background:`linear-gradient(135deg,${G.gold},${G.goldL})`,display:"flex",alignItems:"center",justifyContent:"center",color:G.dark,fontWeight:900,fontSize:10,flexShrink:0}}>{i+1}</div>
                    <div style={{color:G.cream,fontSize:13,lineHeight:1.4}}>{ind}</div>
                  </div>
                ))}
              </div>
            )}

            {/* ACTIONS JEU */}
            {phase==="play"&&(
              <div style={{background:"rgba(255,255,255,0.04)",borderRadius:12,padding:16,border:`1px solid ${G.gold}1a`}}>
                {/* Sélection participant */}
                <div style={{marginBottom:12}}>
                  <div style={{color:`${G.gold}88`,fontSize:10,letterSpacing:2,textTransform:"uppercase",marginBottom:8}}>Qui a trouvé ?</div>
                  <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                    {cons.map(c=>(
                      <button key={c.id} onClick={()=>setSelC(c.id===selC?null:c.id)}
                        style={{padding:"6px 13px",borderRadius:20,border:`2px solid ${c.id===selC?c.color:c.color+"44"}`,background:c.id===selC?c.color+"22":"transparent",color:c.id===selC?c.color:`${c.color}77`,cursor:"pointer",fontFamily:"inherit",fontSize:12,fontWeight:700,transition:"all 0.15s"}}>
                        {c.name}
                      </button>
                    ))}
                  </div>
                </div>
                {/* Boutons action */}
                <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                  {hintShown<q.indices.length&&(
                    <button onClick={revealHint}
                      style={{...btn(false,{flex:1,padding:"10px",background:`${G.gold}14`,border:`1px solid ${G.gold}44`,color:G.gold,fontSize:13})}}>
                      💡 Indice {hintShown+1} ({POINTS_MAP[hintShown+1]}pts)
                    </button>
                  )}
                  <button onClick={()=>selC&&award(selC)} disabled={!selC}
                    style={{...btn(true,{flex:1,padding:"10px",opacity:selC?1:.4,fontSize:13})}}>
                    ✓ Bonne réponse !
                  </button>
                  <button onClick={skip}
                    style={{...btn(false,{padding:"10px 12px",background:"rgba(255,80,80,0.1)",border:"1px solid rgba(255,80,80,0.25)",color:G.red,fontSize:12})}}>
                    ✗ Passer
                  </button>
                </div>
                {hintShown>0&&<div style={{textAlign:"center",marginTop:8,color:`${G.gold}66`,fontSize:11}}>{hintShown} indice(s) utilisé(s) · Valeur actuelle : <strong style={{color:G.gold}}>{currentPts} pts</strong></div>}
              </div>
            )}

            {phase==="validate"&&(
              <div style={{display:"flex",flexDirection:"column",gap:10,alignItems:"center"}}>
                <div style={{padding:"12px 20px",borderRadius:10,background:`${G.gold}12`,border:`1px solid ${G.gold}33`,textAlign:"center",width:"100%"}}>
                  {results[idx]&&!results[idx].skipped ? (
                    <>
                      <div style={{fontSize:18,marginBottom:4}}>🎉</div>
                      <div style={{color:G.gold,fontWeight:700,fontSize:14}}>
                        {cons.find(c=>c.id===results[idx].cid)?.name} · +{results[idx].pts} points
                      </div>
                      <div style={{color:`${G.cream}77`,fontSize:12,marginTop:4}}>Trouvé à l'indice {q.indices.slice(0,hintShown).length}</div>
                    </>
                  ) : (
                    <div style={{color:`${G.cream}77`,fontSize:13}}>❌ Réponse : <strong style={{color:G.cream}}>{q.reponse}</strong></div>
                  )}
                </div>
                <button onClick={next} style={{...btn(true,{padding:"12px 32px",fontSize:13,letterSpacing:2,textTransform:"uppercase"})}}>
                  {isLast?"🏆 Résultats finaux":"Question suivante →"}
                </button>
              </div>
            )}
          </div>

          {/* SCORES */}
          <div style={{padding:14,borderLeft:`1px solid ${G.gold}18`,display:"flex",flexDirection:"column",gap:8,overflowY:"auto"}}>
            <div style={{color:`${G.gold}88`,fontSize:10,letterSpacing:3,textTransform:"uppercase",marginBottom:4}}>CLASSEMENT</div>
            {[...cons].sort((a,b)=>b.score-a.score).map((c,i)=>(
              <div key={c.id} style={{padding:"11px 13px",borderRadius:11,background:flash===c.id?`${c.color}25`:"rgba(255,255,255,0.04)",border:`1px solid ${i===0&&c.score>0?c.color+"55":G.gold+"15"}`,animation:flash===c.id?"flash 0.8s ease":"none",transition:"background 0.4s"}}>
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  <span style={{fontSize:14,flexShrink:0}}>{i===0&&c.score>0?"👑":i===1?"🥈":i===2?"🥉":"·"}</span>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{color:c.color,fontWeight:700,fontSize:13,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{c.name}</div>
                  </div>
                  <div style={{color:G.gold,fontFamily:"'Playfair Display',serif",fontSize:20,fontWeight:900}}>{c.score}</div>
                </div>
                <div style={{marginTop:7,height:3,background:"rgba(255,255,255,0.07)",borderRadius:2}}>
                  <div style={{height:"100%",borderRadius:2,width:`${Math.max(3,(c.score/Math.max(1,Math.max(...cons.map(x=>x.score))))*100)}%`,background:c.color,transition:"width 0.5s"}}/>
                </div>
              </div>
            ))}

            {/* Légende points */}
            <div style={{marginTop:"auto",padding:"11px 13px",borderRadius:10,background:"rgba(0,0,0,0.2)",border:`1px solid ${G.gold}15`}}>
              <div style={{color:`${G.gold}88`,fontSize:10,letterSpacing:2,marginBottom:8}}>BARÈME</div>
              {Object.entries(POINTS_MAP).map(([k,v])=>(
                <div key={k} style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
                  <span style={{color:`${G.cream}55`,fontSize:10}}>Indice {k}</span>
                  <span style={{color:G.gold,fontSize:10,fontWeight:700}}>{v} pts</span>
                </div>
              ))}
              <div style={{borderTop:`1px solid ${G.gold}22`,marginTop:8,paddingTop:8}}>
                <div style={{color:`${G.cream}55`,fontSize:10,marginBottom:2}}>Progression</div>
                <div style={{height:3,background:"rgba(255,255,255,0.07)",borderRadius:2}}>
                  <div style={{height:"100%",borderRadius:2,width:`${(revealed.length/questions.length)*100}%`,background:`linear-gradient(90deg,${G.gold},${G.goldL})`,transition:"width 0.4s"}}/>
                </div>
                <div style={{color:`${G.cream}44`,fontSize:10,marginTop:4,textAlign:"right"}}>{revealed.length}/{questions.length}</div>
              </div>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── FINAL SCREEN ───
function Final({consultants, onReset}) {
  const w = consultants[0];
  return (
    <div style={{minHeight:"100vh",background:`radial-gradient(ellipse at center,${G.green},${G.dark} 55%,#050f08)`,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:28,fontFamily:"'Lato',sans-serif"}}>
      <div style={{textAlign:"center",marginBottom:36,animation:"fadeUp 0.8s ease"}}>
        <div style={{fontSize:60,marginBottom:10}}>🏆</div>
        <h1 style={{color:G.gold,fontFamily:"'Playfair Display',serif",fontSize:40,margin:"0 0 6px"}}>FIN DU JEU</h1>
        <p style={{color:`${G.cream}66`,fontSize:12,letterSpacing:4}}>RÉBUS CHOGAN — LIMITLESS TEAM</p>
      </div>
      {w&&w.score>0&&(
        <div style={{textAlign:"center",marginBottom:28,animation:"fadeUp 0.8s ease 0.15s both"}}>
          <div style={{display:"inline-block",padding:"18px 36px",borderRadius:16,background:`${G.gold}14`,border:`2px solid ${G.gold}55`}}>
            <div style={{fontSize:28,marginBottom:6}}>👑</div>
            <div style={{color:G.gold,fontFamily:"'Playfair Display',serif",fontSize:26,fontWeight:900}}>{w.name}</div>
            <div style={{color:`${G.cream}77`,fontSize:12,marginTop:4}}>GAGNANT(E) — {w.score} POINTS</div>
          </div>
        </div>
      )}
      <div style={{display:"flex",gap:10,flexWrap:"wrap",justifyContent:"center",marginBottom:36,maxWidth:700}}>
        {consultants.map((c,i)=>(
          <div key={c.id} style={{padding:"14px 20px",borderRadius:12,background:i===0?`${c.color}14`:"rgba(255,255,255,0.04)",border:`1px solid ${i===0?c.color+"44":G.gold+"15"}`,textAlign:"center",minWidth:110,animation:`fadeUp 0.5s ease ${0.3+i*0.08}s both`}}>
            <div style={{fontSize:20,marginBottom:5}}>{i===0?"🥇":i===1?"🥈":i===2?"🥉":`${i+1}.`}</div>
            <div style={{color:c.color,fontWeight:700,fontSize:14,marginBottom:3}}>{c.name}</div>
            <div style={{color:G.gold,fontFamily:"'Playfair Display',serif",fontSize:26,fontWeight:900}}>{c.score}</div>
            <div style={{color:`${G.cream}44`,fontSize:10}}>pts</div>
          </div>
        ))}
      </div>
      <button onClick={onReset} style={{...btn(true,{padding:"13px 36px",fontSize:14,letterSpacing:3,textTransform:"uppercase"})}}>
        🔄 NOUVELLE PARTIE
      </button>
    </div>
  );
}

// ─── APP ───
function App() {
  const [phase, setPhase] = useState("setup");
  const [data, setData] = useState(null);
  const start = (c,q) => { setData({c,q}); setPhase("game"); };
  const reset = () => { setData(null); setPhase("setup"); };
  if (phase==="setup") return <Setup onStart={start}/>;
  return <Game consultants={data.c} questions={data.q} onReset={reset}/>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
