<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Rébus Chogan - Limitless Team</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Lato:wght@300;400;700&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#FAFAFA;font-family:'Lato',sans-serif;color:#2C2C2C;overflow-x:hidden}
    
    /* ANIMATIONS */
    @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
    @keyframes scaleIn{from{transform:scale(0.9);opacity:0}to{transform:scale(1);opacity:1}}
    
    /* SCROLLBAR LUXE */
    ::-webkit-scrollbar{width:6px}
    ::-webkit-scrollbar-thumb{background:#D4AF37;border-radius:10px}
    
    .gold-gradient{background:linear-gradient(135deg, #D4AF37 0%, #F2D482 100%)}
    .glass-card{background:rgba(255,255,255,0.9);backdrop-filter:blur(10px);border:1px solid rgba(212,175,55,0.2)}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef,useCallback}=React;

const G={
  white:"#FFFFFF",
  bg:"#FAFAFA",
  gold:"#D4AF37",
  goldLight:"#F2D482",
  text:"#2C2C2C",
  textLight:"#7F8C8D",
  red:"#E74C3C"
};

const POINTS={1:50,2:40,3:30,4:20,5:10};
const BLUR_STEPS={0:"blur(30px) grayscale(1)",1:"blur(20px) grayscale(0.8)",2:"blur(12px) grayscale(0.5)",3:"blur(7px)",4:"blur(3px)",5:"blur(0px)"};
const COLORS=["#D4AF37","#C5A028","#B8860B","#966F33","#E5C05B","#F2D482","#DAA520","#A67C00","#8B6508","#B89B3C"];
const STORAGE_KEY="chogan_rebus_master_v1";

const DEFAULT_QUESTIONS=[
  {id:1,categorie:"PARFUMERIE",indices:["Je suis une fragrance classée « Extrait de Parfum ».","Ma composition contient 0% d'eau ajoutée.","Je possède une concentration de 30% d'essence de parfum.","Mon flacon est sobre, élégant et identifié par un numéro.","Je suis une création inspirée d'une grande marque mondiale."],reponse:"Parfum Chogan (Traditionnel ou Luxury)",image:""},
  {id:2,categorie:"SOINS VISAGE",indices:["Je suis un soin cosmétique naturel de la gamme Aurodhea.","Je suis efficace contre les taches cutanées et les cicatrices.","Ma formule est riche en collagène, élastine et acide glycolique.","Je suis l'allié numéro 1 contre le vieillissement prématuré.","Mon ingrédient principal est extrait d'un petit animal à coquille."],reponse:"Crème à la bave d'escargot",image:""},
  {id:3,categorie:"HYGIÈNE",indices:["Je suis un produit de la routine d'hygiène quotidienne.","Je n'utilise aucun agent de blanchiment chimique agressif.","J'élimine les taches de café et de nicotine en douceur.","Ma couleur est surprenante et totalement opposée au blanc habituel.","Je tire mes bienfaits purifiants du charbon actif."],reponse:"Dentifrice Black Power",image:""},
  {id:4,categorie:"ENTRETIEN",indices:["Je fais partie de la gamme de nettoyage puissante.","Je suis efficace sur bois, acier, textile et même moteurs.","Je suis la solution radicale contre les graisses les plus tenaces.","Ma formule est hautement concentrée.","On m'appelle le « Degreaser Plus »."],reponse:"Dégraissant Chogan Plus",image:""},
  {id:5,categorie:"BIEN-ÊTRE",indices:["Allié quotidien pour booster l'organisme de l'intérieur.","Utilisé lors des cures de changement de saison.","Je purifie le sang et aide à la détoxification du foie.","Ma saveur est naturellement amère mais mes bienfaits sont immenses.","Je suis le jus de plante le plus célèbre."],reponse:"Jus d'Aloe Vera à boire",image:""},
  {id:6,categorie:"HUILES ESSENTIELLES",indices:["Extrait liquide hautement concentré et 100% pur.","Peut être diffusé ou mélangé à une huile végétale.","Je suis connue pour mes propriétés relaxantes.","Mon odeur rappelle les champs du sud de la France.","Je suis l'huile essentielle de Lavande Officinale."],reponse:"Huile Essentielle de Lavande",image:""}
];

/* UTILS */
const save=(s)=>localStorage.setItem(STORAGE_KEY,JSON.stringify(s));
const load=()=>{const r=localStorage.getItem(STORAGE_KEY);return r?JSON.parse(r):null;};

const Logo=({s=24})=>(
  <div style={{display:"flex",alignItems:"center",gap:12}}>
    <div style={{width:40,height:40,background:G.gold,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",color:"#FFF",fontWeight:900,boxShadow:"0 4px 10px rgba(212,175,55,0.3)"}}>C</div>
    <div style={{textAlign:"left"}}>
      <div style={{fontFamily:"'Playfair Display'",fontSize:s,fontWeight:900,letterSpacing:3,color:G.gold,lineHeight:1}}>CHOGAN</div>
      <div style={{fontSize:10,letterSpacing:2,color:G.textLight,fontWeight:700}}>LIMITLESS TEAM</div>
    </div>
  </div>
);

/* --- SETUP SCREEN --- */
function Setup({onStart}){
  const [cons,setCons]=useState([{id:1,name:"Marie",color:COLORS[0]},{id:2,name:"Sophie",color:COLORS[1]}]);
  const [qs,setQs]=useState(DEFAULT_QUESTIONS);
  const [name,setName]=useState("");
  
  const addC=()=>{if(!name)return;setCons([...cons,{id:Date.now(),name,color:COLORS[cons.length%COLORS.length]}]);setName("");};
  const upQ=(id,f,v)=>setQs(qs.map(q=>q.id===id?{...q,[f]:v}:q));

  return(
    <div style={{minHeight:"100vh",padding:40,display:"flex",flexDirection:"column",alignItems:"center"}}>
      <Logo s={30}/>
      <div style={{width:"100%",maxWidth:800,marginTop:40,background:"#FFF",padding:30,borderRadius:20,boxShadow:"0 10px 40px rgba(0,0,0,0.05)"}}>
        <h2 style={{fontFamily:"'Playfair Display'",marginBottom:20}}>Configuration de la session</h2>
        
        <div style={{marginBottom:30}}>
          <label style={{display:"block",marginBottom:10,fontWeight:700}}>Ajouter des participants :</label>
          <div style={{display:"flex",gap:10}}>
            <input value={name} onChange={e=>setName(e.target.value)} placeholder="Nom..." style={{flex:1,padding:12,borderRadius:8,border:`1px solid ${G.gold}44`}}/>
            <button onClick={addC} style={{background:G.gold,color:"#FFF",border:"none",padding:"0 20px",borderRadius:8,cursor:"pointer"}}>Ajouter</button>
          </div>
          <div style={{display:"flex",flexWrap:"wrap",gap:10,marginTop:15}}>
            {cons.map(c=>(
              <div key={c.id} style={{padding:"5px 15px",background:`${c.color}22`,borderRadius:20,border:`1px solid ${c.color}`,color:c.color,fontWeight:700}}>
                {c.name} <span style={{cursor:"pointer",marginLeft:10}} onClick={()=>setCons(cons.filter(x=>x.id!==c.id))}>×</span>
              </div>
            ))}
          </div>
        </div>

        <div style={{maxHeight:300,overflowY:"auto",borderTop:`1px solid ${G.bg}`,paddingTop:20}}>
          <h3 style={{fontSize:14,color:G.textLight,marginBottom:15}}>LISTE DES QUESTIONS ({qs.length})</h3>
          {qs.map((q,i)=>(
            <div key={q.id} style={{padding:10,background:G.bg,borderRadius:8,marginBottom:10,fontSize:13,display:"flex",justifyContent:"space-between"}}>
              <span>Question {i+1} : {q.reponse}</span>
              <span style={{color:G.gold}}>✓ Prête</span>
            </div>
          ))}
        </div>

        <button onClick={()=>onStart(cons,qs)} style={{width:"100%",marginTop:30,padding:15,background:G.gold,color:"#FFF",border:"none",borderRadius:8,fontWeight:900,fontSize:16,cursor:"pointer"}}>LANCER LA FORMATION</button>
      </div>
    </div>
  );
}

/* --- PUBLIC SCREEN (ZOOM) --- */
function PublicScreen(){
  const [s,setS]=useState(null);
  useEffect(()=>{
    const t=setInterval(()=>setS(load()),500);
    return()=>clearInterval(t);
  },[]);

  if(!s) return <div style={{height:"100vh",display:"flex",alignItems:"center",justifyContent:"center"}}><Logo s={40}/></div>;
  if(s.phase==="final") return <FinalView s={s}/>;

  const q=s.questions[s.idx];
  const points=POINTS[s.hintShown] || 0;

  return(
    <div style={{height:"100vh",display:"flex",flexDirection:"column",background:G.bg}}>
      <div style={{padding:20,background:"#FFF",display:"flex",justifyContent:"space-between",alignItems:"center",borderBottom:`1px solid ${G.gold}22`}}>
        <Logo/>
        <div style={{fontFamily:"'Playfair Display'",fontSize:24,color:G.gold}}>Question {s.idx+1} / {s.questions.length}</div>
      </div>

      <div style={{flex:1,display:"flex",padding:30,gap:30}}>
        {/* LEADERBOARD */}
        <div style={{width:250,display:"flex",flexDirection:"column",gap:15}}>
          {s.consultants.sort((a,b)=>b.score-a.score).map((c,i)=>(
            <div key={c.id} style={{background:"#FFF",padding:15,borderRadius:12,borderLeft:`5px solid ${c.color}`,boxShadow:"0 4px 15px rgba(0,0,0,0.05)",animation:"fadeIn 0.5s"}}>
              <div style={{fontSize:10,color:G.textLight}}>{i===0?"🏆 LEADER":"PARTICIPANT"}</div>
              <div style={{fontWeight:900,fontSize:18}}>{c.name}</div>
              <div style={{color:G.gold,fontSize:22,fontWeight:900}}>{c.score} <span style={{fontSize:12}}>PTS</span></div>
            </div>
          ))}
        </div>

        {/* JEU AREA */}
        <div style={{flex:1,display:"flex",flexDirection:"column",gap:20}}>
          <div style={{flex:1,background:"#FFF",borderRadius:25,display:"flex",alignItems:"center",justifyContent:"center",position:"relative",boxShadow:"0 15px 50px rgba(0,0,0,0.05)",overflow:"hidden",border:`1px solid ${G.gold}22`}}>
            {q.image ? (
              <img src={q.image} style={{maxWidth:"85%",maxHeight:"85%",filter:s.phase==="revealed"? "none":BLUR_STEPS[s.hintShown],transition:"all 1s ease"}}/>
            ) : (
              <div style={{color:G.gold,fontSize:80,opacity:0.1,fontWeight:900}}>CHOGAN</div>
            )}
            {s.phase==="play" && s.hintShown > 0 && (
              <div style={{position:"absolute",top:30,right:30,background:G.gold,color:"#FFF",padding:"15px 30px",borderRadius:50,fontSize:24,fontWeight:900,boxShadow:"0 10px 20px rgba(212,175,55,0.4)"}}>
                {points} PTS
              </div>
            )}
          </div>

          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            {q.indices.slice(0, s.hintShown).map((ind, i)=>(
              <div key={i} style={{padding:20,background:"#FFF",borderRadius:12,borderLeft:`4px solid ${G.gold}`,boxShadow:"0 5px 15px rgba(0,0,0,0.03)",animation:"scaleIn 0.3s forwards"}}>
                <span style={{fontWeight:900,color:G.gold,marginRight:10}}>{i+1}.</span> {ind}
              </div>
            ))}
          </div>

          {s.phase==="revealed" && (
            <div style={{padding:30,background:G.gold,color:"#FFF",borderRadius:15,textAlign:"center",fontSize:32,fontWeight:900,animation:"fadeIn 0.5s"}}>
              {q.reponse}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

/* --- CONTROL PANEL (NADA) --- */
function ControlPanel(){
  const [s,setS]=useState(null);
  useEffect(()=>{
    const t=setInterval(()=>setS(load()),500);
    return()=>clearInterval(t);
  },[]);

  if(!s) return <div style={{padding:20}}>En attente du démarrage...</div>;
  const q=s.questions[s.idx];

  const update=(patch)=>{
    const newState={...s,...patch};
    setS(newState);
    save(newState);
  };

  const validate=(cid)=>{
    const pts = POINTS[s.hintShown] || 0;
    const newCons = s.consultants.map(c=>c.id===cid ? {...c, score:c.score+pts}:c);
    update({consultants:newCons, phase:"revealed"});
  };

  return(
    <div style={{minHeight:"100vh",background:"#2C3E50",color:"#FFF",padding:20}}>
      <div style={{maxWidth:600,margin:"0 auto"}}>
        <div style={{background:"rgba(255,255,255,0.1)",padding:20,borderRadius:15,marginBottom:20}}>
          <h2 style={{color:G.gold}}>CONTRÔLE NADA</h2>
          <p>Question actuelle : <strong>{q.reponse}</strong></p>
        </div>

        <div style={{display:"grid",gap:10,marginBottom:30}}>
          {q.indices.map((ind,i)=>(
            <button key={i} onClick={()=>update({hintShown:i+1})} 
              style={{padding:15,borderRadius:8,border:"none",textAlign:"left",background:s.hintShown>i?G.gold:"#34495E",color:"#FFF",cursor:"pointer"}}>
              Indice {i+1} : {ind.substring(0,30)}...
            </button>
          ))}
        </div>

        {s.phase==="play" ? (
          <div style={{background:"#FFF",padding:20,borderRadius:15,color:G.text}}>
            <h3 style={{marginBottom:15}}>Qui a trouvé ?</h3>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
              {s.consultants.map(c=>(
                <button key={c.id} onClick={()=>validate(c.id)} style={{padding:12,border:`2px solid ${c.color}`,background:"none",borderRadius:8,fontWeight:700,cursor:"pointer"}}>
                  {c.name}
                </button>
              ))}
              <button onClick={()=>update({phase:"revealed"})} style={{gridColumn:"span 2",marginTop:10,padding:10,background:"#BDC3C7",border:"none",borderRadius:8}}>Personne / Passer</button>
            </div>
          </div>
        ) : (
          <button onClick={()=>{
            if(s.idx < s.questions.length-1) update({idx:s.idx+1, hintShown:0, phase:"play"});
            else update({phase:"final"});
          }} style={{width:"100%",padding:20,background:"#27AE60",color:"#FFF",border:"none",borderRadius:10,fontSize:18,fontWeight:900,cursor:"pointer"}}>
            QUESTION SUIVANTE ➔
          </button>
        )}
      </div>
    </div>
  );
}

function FinalView({s}){
  const winner = [...s.consultants].sort((a,b)=>b.score-a.score)[0];
  return(
    <div style={{height:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",background:G.bg}}>
      <Logo s={50}/>
      <div style={{marginTop:50,background:"#FFF",padding:60,borderRadius:30,boxShadow:"0 30px 60px rgba(0,0,0,0.1)",textAlign:"center",border:`2px solid ${G.gold}`}}>
        <h1 style={{fontFamily:"'Playfair Display'",fontSize:40,marginBottom:20}}>Félicitations !</h1>
        <div style={{fontSize:80,marginBottom:10}}>👑</div>
        <div style={{fontSize:48,fontWeight:900,color:G.gold}}>{winner.name}</div>
        <div style={{fontSize:24,color:G.textLight}}>{winner.score} POINTS</div>
      </div>
    </div>
  );
}

function App(){
  const isNada = window.location.search.includes("nada");
  const [mode,setMode]=useState(isNada ? "nada" : "welcome");

  if(mode==="welcome") return(
    <div style={{height:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",background:G.bg,gap:20}}>
      <Logo s={40}/>
      <button onClick={()=>setMode("setup")} style={{padding:"15px 40px",background:G.gold,color:"#FFF",border:"none",borderRadius:50,fontWeight:900,cursor:"pointer",boxShadow:"0 10px 20px rgba(212,175,55,0.3)"}}>CONFIGURER UNE SESSION</button>
      <button onClick={()=>setMode("public")} style={{padding:"15px 40px",background:"#FFF",color:G.gold,border:`2px solid ${G.gold}`,borderRadius:50,fontWeight:900,cursor:"pointer"}}>ÉCRAN PUBLIC (ZOOM)</button>
    </div>
  );

  if(mode==="setup") return <Setup onStart={(c,q)=>{
    const state = {idx:0, phase:"play", hintShown:0, consultants:c, questions:q};
    save(state);
    setMode("public");
  }}/>;

  if(mode==="nada" || isNada) return <ControlPanel/>;
  return <PublicScreen/>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
