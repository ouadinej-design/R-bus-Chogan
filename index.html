const LS_STATE = "rebus_state_v3";
const LS_ROOM  = "rebus_room_v3";
const DEFAULT_Q = [

  {id:6,cat:"HUILES ESSENTIELLES",hints:["Extrait liquide hautement concentré et 100% pur.","Peut être diffusé dans l'air ou mélangé à une huile végétale.","Je suis connue pour mes propriétés relaxantes.","Mon odeur rappelle les champs du sud de la France.","Je suis l'huile essentielle de Lavande Officinale."],answer:"Huile Essentielle de Lavande",img:""},

/* ── UI HELPERS ── */
const card  = (e={}) => ({background:G.white,borderRadius:16,boxShadow:G.shadow,border:`1px solid ${G.border}`,...e});
const pill  = (p=true,e={}) => ({padding:"10px 22px",borderRadius:999,border:"none",cursor:"pointer",fontFamily:"inherit",fontWeight:700,fontSize:13,transition:"all .2s",background:p?G.grad:"rgba(0,0,0,.06)",color:p?G.white:G.dark,boxShadow:p?G.shadowG:"none",...e});
const field = (e={}) => ({background:"rgba(0,0,0,.03)",border:`1.5px solid ${G.border}`,borderRadius:10,padding:"8px 12px",color:G.dark,outline:"none",width:"100%",fontSize:13,...e});
const gold  = (e={}) => ({background:G.grad,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",backgroundClip:"text",...e});

/* ── STORAGE ── */
const lsSave  = (k,v) => { try{localStorage.setItem(k,JSON.stringify(v));}catch(e){} };
const lsLoad  = (k)   => { try{const r=localStorage.getItem(k);return r?JSON.parse(r):null;}catch(e){return null;} };
const lsDel   = (k)   => { try{localStorage.removeItem(k);}catch(e){} };

/* ── ROOM CODE ── */
const getRoom = () => {
  // Nada's phone: ?room=CODE in URL
  const p = new URLSearchParams(window.location.search);
  if (p.get("room")) return p.get("room");
  // Computer: stored or generated
  let r = lsLoad(LS_ROOM);
  if (!r) { r="REBUS-"+Math.random().toString(36).slice(2,7).toUpperCase(); lsSave(LS_ROOM,r); }
  return r;
};

/* ── NTFY SYNC ── */
const ntfyPub = async (room, state) => {
  // Strip images to stay under ntfy 4KB limit
  const slim = {...state, questions:(state.questions||[]).map(q=>({...q,img:""}))};
  try {
    await fetch("https://ntfy.sh/"+room, {
      method:"POST",
      headers:{"Content-Type":"application/json","Priority":"urgent","Cache-Control":"no-cache"},
      body: JSON.stringify(slim),
    });
  } catch(e) {}
};

/* ── GAME STATE ── */
const makeGame = (players,questions) => ({
  phase:"play", idx:0, hints:0,
  players: players.map(p=>({...p,score:0})),
  questions, results:{}, revealed:[], sel:null, flash:null,
});

/* ══════════════════════════════════════
   TIMER HOOK + COMPOSANT
   Style "Une question pour un champion"
══════════════════════════════════════ */
const TIMER_DURATION = 30; // secondes

function useTimer(active) {
  const [time, setTime]     = useState(TIMER_DURATION);
  const [running, setRunning] = useState(false);
  const intervalRef = useRef(null);

  const start = useCallback(() => { setTime(TIMER_DURATION); setRunning(true); }, []);
  const stop  = useCallback(() => { setRunning(false); clearInterval(intervalRef.current); }, []);
  const reset = useCallback(() => { stop(); setTime(TIMER_DURATION); }, [stop]);

  useEffect(() => {
    if (running) {
      intervalRef.current = setInterval(() => {
        setTime(t => {
          if (t <= 1) { clearInterval(intervalRef.current); setRunning(false); return 0; }
          return t - 1;
        });
      }, 1000);
    }
    return () => clearInterval(intervalRef.current);
  }, [running]);

  // Reset when question changes
  useEffect(() => { reset(); }, [active, reset]);

  return { time, running, start, stop, reset };
}

function CircleTimer({ time, running, onStart, onReset }) {
  const R = 44;
  const circ = 2 * Math.PI * R; // ≈ 276
  const progress = time / TIMER_DURATION;
  const offset   = circ * (1 - progress);
  const pct      = Math.round(progress * 100);
  const color    = time > 10 ? "#D4A017" : time > 5 ? "#E67E22" : "#E05050";
  const isUrgent = time <= 10 && running;

  return (
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:6}}>
      <div style={{position:"relative",width:100,height:100,animation:isUrgent?"timerPulse .6s infinite":"none"}}>
        <svg width="100" height="100" style={{transform:"rotate(-90deg)"}}>
          {/* Piste fond */}
          <circle cx="50" cy="50" r={R} fill="none" stroke="#f0f0f0" strokeWidth="7"/>
          {/* Arc progression */}
          <circle cx="50" cy="50" r={R} fill="none"
            stroke={color} strokeWidth="7"
            strokeDasharray={circ}
            strokeDashoffset={offset}
            strokeLinecap="round"
            style={{transition:"stroke-dashoffset .9s linear, stroke .3s"}}
          />
        </svg>
        {/* Chiffre central */}
        <div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
          <div style={{fontSize:26,fontWeight:900,fontFamily:"'Playfair Display',serif",color,lineHeight:1,transition:"color .3s"}}>{time}</div>
          <div style={{fontSize:8,color:"#aaa",letterSpacing:1,fontWeight:600}}>SEC</div>
        </div>
      </div>
      {/* Boutons */}
      <div style={{display:"flex",gap:6}}>
        {!running
          ? <button onClick={onStart} style={{padding:"5px 14px",borderRadius:999,border:"none",cursor:"pointer",fontFamily:"inherit",fontWeight:700,fontSize:11,background:"linear-gradient(135deg,#D4A017,#F5C842,#B8860B)",color:"white",boxShadow:"0 3px 10px rgba(212,160,23,.3)"}}>▶ Démarrer</button>
          : <button onClick={onReset} style={{padding:"5px 14px",borderRadius:999,border:"none",cursor:"pointer",fontFamily:"inherit",fontWeight:700,fontSize:11,background:"rgba(0,0,0,.07)",color:"#555"}}>↺ Reset</button>
        }
      </div>
    </div>
  );
}

  const addQ      = () => { const id=Date.now(); setQs(p=>[...p,{id,cat:"",hints:["","","","",""],answer:"",img:""}]); setEditId(id); };
  const upHint    = (qid,i,v) => setQs(p=>p.map(q=>q.id===qid?{...q,hints:q.hints.map((h,j)=>j===i?v:h)}:q));

  return (
    <div style={{minHeight:"100vh",background:G.pearl,display:"flex",flexDirection:"column",alignItems:"center",padding:"28px 16px",overflowY:"auto"}}>

                    <div style={{width:34,height:34,borderRadius:"50%",background:p.color,display:"flex",alignItems:"center",justifyContent:"center",color:"white",fontWeight:800,fontSize:14,flexShrink:0}}>{p.name[0]?.toUpperCase()}</div>

                      {COLORS.map(c=><option key={c} value={c}>■ {c}</option>)}
                    </select>
                    <button onClick={()=>setPlayers(p=>p.filter(x=>x.id!==p.id))} style={{background:"rgba(224,80,80,.1)",border:"none",color:G.red,cursor:"pointer",borderRadius:999,padding:"6px 10px",fontWeight:700}}>✕</button>

          {tab==="q" && (
            <div>

                      <button onClick={()=>setQs(p=>p.filter(x=>x.id!==q.id))} style={{background:"rgba(224,80,80,.1)",border:"none",color:G.red,cursor:"pointer",borderRadius:999,padding:"4px 9px",fontWeight:700,fontSize:12}}>✕</button>

                      <div><label style={{color:G.light,fontSize:10,letterSpacing:1,display:"block",marginBottom:3,fontWeight:600,textTransform:"uppercase"}}>Réponse</label>
                        <input value={q.answer} onChange={e=>setQs(p=>p.map(x=>x.id===q.id?{...x,answer:e.target.value}:x))} placeholder="Réponse attendue…" style={field({background:G.white})}/></div>
                      <div><label style={{color:G.light,fontSize:10,letterSpacing:1,display:"block",marginBottom:5,fontWeight:600,textTransform:"uppercase"}}>Image produit</label>
                        <input ref={el=>imgRefs.current[q.id]=el} type="file" accept="image/*" onChange={e=>upImg(q.id,e)} style={{display:"none"}}/>
                        <button onClick={()=>imgRefs.current[q.id]?.click()} style={pill(false,{padding:"7px 14px",fontSize:11})}>📷 Choisir image</button>
                        {q.img&&<img src={q.img} style={{marginTop:7,height:60,borderRadius:8,objectFit:"contain"}} alt="ap"/>}
                      </div>
                    </div>
                  )}
                </div>
              ))}
              <button onClick={addQ} style={pill(false,{width:"100%",padding:"11px",borderRadius:12})}>+ Nouvelle question</button>
            </div>
          )}
        </div>

        <div style={{padding:"14px 18px",borderTop:`1px solid ${G.border}`,display:"flex",justifyContent:"space-between",alignItems:"center",background:G.pearl}}>

        </div>
      </div>

  );

              <div style={{fontSize:10,fontWeight:700,color:G.gold,wordBreak:"break-all",lineHeight:1.5}}>{nadaUrl}</div>
              <div style={{marginTop:8,color:G.green,fontSize:11,fontWeight:600}}>✅ Sync instantané via internet</div>
            </div>
          </div>
        </div>

        {/* Reconfigurer */}
        <button onClick={()=>{ lsDel(LS_STATE); setState(null); }} style={{background:"none",border:"none",color:"#ccc",fontSize:11,cursor:"pointer",textDecoration:"underline",padding:"2px"}}>
          ✏ Reconfigurer le jeu
        </button>

      </div>
    </div>
  );
}

/* ══════════════════════════════════════
   PUBLIC SCREEN
══════════════════════════════════════ */
function PublicScreen({onBack}) {
  const [gs,setGs] = useState(()=>lsLoad(LS_STATE));
  const room = getRoom();

  useEffect(()=>{
    // Lire le localStorage d'abord
    const local = lsLoad(LS_STATE);
    if(local) setGs(local);

    // BroadcastChannel (même navigateur)
    let bc; try { bc=new BroadcastChannel("rebus_v3"); bc.onmessage=e=>{if(e.data?.phase)setGs(e.data);}; } catch(e){}

    // ntfy.sh SSE (cross-device)
    let es;
    try {
      es = new EventSource("https://ntfy.sh/"+room+"/sse");
      es.onmessage = e => {
        try {
          const d = JSON.parse(e.data);
          const msg = d.message ? JSON.parse(d.message) : null;
          if(msg?.phase) {
            // Re-inject local images (not sent via ntfy to save space)
            const local2 = lsLoad(LS_STATE);
            if(local2?.questions) msg.questions = msg.questions.map((q,i)=>({...q,img:local2.questions[i]?.img||""}));
            setGs(msg);
            lsSave(LS_STATE, {...msg, questions: local2?.questions||msg.questions});
          }
        } catch(err){}
      };
    } catch(e){}

    // Polling 1s (filet de sécurité)
    const t = setInterval(()=>{ const s=lsLoad(LS_STATE); if(s) setGs(s); }, 1000);

    return ()=>{ if(bc)bc.close(); if(es)es.close(); clearInterval(t); };
  },[room]);

  if(!gs) return (
    <div style={{height:"100vh",background:G.pearl,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:20}}>
      <Logo sz={24}/>
      <div style={{color:G.light,fontSize:13,letterSpacing:3,fontWeight:600,animation:"pulse 2s infinite"}}>EN ATTENTE DU DÉMARRAGE…</div>
      <button onClick={onBack} style={pill(true,{fontSize:13})}>← Retour</button>
    </div>
  );

  if(gs.phase==="final") return <FinalScreen gs={gs} onBack={onBack}/>;

  const q       = gs.questions[gs.idx];
  const imgSrc  = q?.img||"";
  const filter  = gs.phase==="validate" ? BLUR[5] : BLUR[gs.hints||0];
  const pts     = PTS[Math.max(1,gs.hints||0)]||10;
  const maxSc   = Math.max(1,...gs.players.map(p=>p.score));

  // Timer côté écran public — se remet à zéro à chaque nouvelle question
  const { time, running, start:startTimer, reset:resetTimer } = useTimer(gs.idx + "-" + gs.hints);

  return (
    <div style={{height:"100vh",background:G.pearl,display:"flex",flexDirection:"column",overflow:"hidden"}}>
      {/* Header */}
      <div style={{background:G.white,borderBottom:`1px solid ${G.border}`,padding:"11px 28px",display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0,boxShadow:"0 2px 12px rgba(0,0,0,.05)"}}>
        <Logo sz={18}/>
        <h1 style={{fontFamily:"'Playfair Display',serif",fontSize:28,fontWeight:900,letterSpacing:10,...gold()}}>RÉBUS</h1>
        <div style={{textAlign:"right"}}>
          <div style={{color:G.light,fontSize:9,letterSpacing:3,fontWeight:700}}>QUESTION</div>
          <div style={{fontFamily:"'Playfair Display',serif",fontSize:20,fontWeight:900,...gold()}}>{gs.idx+1}<span style={{fontSize:11,WebkitTextFillColor:G.light}}>/{gs.questions.length}</span></div>
        </div>
      </div>

      <div style={{flex:1,display:"flex",overflow:"hidden"}}>
        {/* Scores */}
        <div style={{width:195,padding:"13px 10px",borderRight:`1px solid ${G.border}`,background:G.white,display:"flex",flexDirection:"column",gap:7,overflowY:"auto",flexShrink:0}}>
          <div style={{fontSize:9,letterSpacing:3,color:G.light,fontWeight:700,textAlign:"center",textTransform:"uppercase",marginBottom:3}}>Classement</div>
          {[...gs.players].sort((a,b)=>b.score-a.score).map((p,i)=>(
            <div key={p.id} style={{...card({borderRadius:13,padding:"10px 12px"}),border:gs.flash===p.id?`1.5px solid ${G.goldL}`:`1px solid ${G.border}`,animation:gs.flash===p.id?"flash 1s ease":"none",transition:"all .4s"}}>
              <div style={{display:"flex",alignItems:"center",gap:7}}>
                <span style={{fontSize:16,flexShrink:0}}>{i===0&&p.score>0?"👑":i===1?"🥈":i===2?"🥉":"·"}</span>
                <div style={{flex:1,fontWeight:700,fontSize:12,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{p.name}</div>
                <div style={{fontFamily:"'Playfair Display',serif",fontSize:18,fontWeight:900,...gold()}}>{p.score}</div>
              </div>
              <div style={{marginTop:6,height:3,background:"#f0f0f0",borderRadius:99}}>
                <div style={{height:"100%",borderRadius:99,width:`${Math.max(4,(p.score/maxSc)*100)}%`,background:G.grad,transition:"width .7s"}}/>
              </div>
            </div>
          ))}
          {/* Barème */}
          <div style={{marginTop:"auto",...card({borderRadius:12,padding:"10px 12px"})}}>
            <div style={{fontSize:9,letterSpacing:3,color:G.light,fontWeight:700,textAlign:"center",textTransform:"uppercase",marginBottom:6}}>Barème</div>
            {Object.entries(PTS).map(([k,v])=>(
              <div key={k} style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
                <div style={{display:"flex",alignItems:"center",gap:5}}>
                  <div style={{width:16,height:16,borderRadius:"50%",background:Number(k)<=gs.hints?G.grad:"#f0f0f0",display:"flex",alignItems:"center",justifyContent:"center",fontSize:7,color:Number(k)<=gs.hints?"white":G.light,fontWeight:700}}>{k}</div>
                  <span style={{fontSize:10,color:G.light}}>Indice {k}</span>
                </div>
                <span style={{fontSize:10,fontWeight:800,color:Number(k)===gs.hints?G.gold:Number(k)<gs.hints?"#ccc":G.mid}}>{v} pts</span>
              </div>
            ))}
          </div>
        </div>

        {/* Centre */}
        <div style={{flex:1,padding:"16px 20px",display:"flex",flexDirection:"column",gap:12,overflowY:"auto"}}>
          {/* Image */}
          <div style={{flex:1,...card({borderRadius:20,overflow:"hidden",position:"relative",minHeight:200,display:"flex",alignItems:"center",justifyContent:"center"})}}>
            {imgSrc ? (
              <>
                <img src={imgSrc} style={{maxHeight:"100%",maxWidth:"100%",objectFit:"contain",filter,transition:"filter 1.5s ease",width:"100%",height:"100%"}} alt="produit"/>
                {gs.hints>0&&gs.phase==="play"&&(
                  <div style={{position:"absolute",top:12,right:12,background:G.grad,borderRadius:12,padding:"9px 14px",textAlign:"center",animation:"glow 2.5s infinite"}}>
                    <div style={{color:"white",fontFamily:"'Playfair Display',serif",fontSize:24,fontWeight:900,lineHeight:1}}>{pts}</div>
                    <div style={{color:"rgba(255,255,255,.8)",fontSize:8,letterSpacing:2,fontWeight:700}}>POINTS</div>
                  </div>
                )}
                <div style={{position:"absolute",bottom:12,left:"50%",transform:"translateX(-50%)",display:"flex",gap:5,background:"rgba(255,255,255,.9)",borderRadius:99,padding:"5px 10px",boxShadow:"0 2px 10px rgba(0,0,0,.08)"}}>
                  {[1,2,3,4,5].map(n=>(
                    <div key={n} style={{width:8,height:8,borderRadius:"50%",background:n<=gs.hints?G.grad:"#ddd",boxShadow:n<=gs.hints?G.shadowG:undefined,transition:"all .4s"}}/>
                  ))}
                </div>
              </>
            ):(
              <div style={{textAlign:"center",opacity:.3}}>
                <div style={{fontSize:60,marginBottom:8}}>🧴</div>
                <div style={{color:G.light,fontSize:12}}>Image à venir…</div>
              </div>
            )}
          </div>

          {/* Indices — SANS catégorie */}
          {(gs.hints||0)===0 && gs.phase==="play" && (
            <div style={{textAlign:"center",padding:10}}>
              <div style={{color:"#ccc",fontSize:12,letterSpacing:4,fontWeight:600,textTransform:"uppercase",animation:"pulse 2s infinite"}}>En attente du premier indice…</div>
            </div>
          )}

          {/* Timer — visible après le 1er indice */}
          {(gs.hints||0)>0 && gs.phase==="play" && (
            <div style={{display:"flex",justifyContent:"center",paddingBottom:4}}>
              <CircleTimer time={time} running={running} onStart={startTimer} onReset={resetTimer}/>
            </div>
          )}
          {(gs.hints||0)>0 && q?.hints?.slice(0,gs.hints).map((h,i)=>(
            <div key={i} style={{...card({borderRadius:14,padding:"12px 16px",border:i===gs.hints-1?`1.5px solid ${G.goldL}`:`1px solid ${G.border}`}),display:"flex",gap:12,animation:i===gs.hints-1?"fadeIn .5s ease":"none"}}>
              <div style={{width:26,height:26,borderRadius:"50%",background:G.grad,display:"flex",alignItems:"center",justifyContent:"center",color:"white",fontWeight:800,fontSize:11,flexShrink:0,boxShadow:G.shadowG}}>{i+1}</div>
              <div style={{color:G.dark,fontSize:14,lineHeight:1.6,fontWeight:i===gs.hints-1?600:400}}>{h}</div>
            </div>
          ))}

          {/* Résultat */}
          {gs.phase==="validate" && (
            <div style={{...card({borderRadius:16,padding:"16px 20px",border:`1.5px solid ${gs.results?.[gs.idx]&&!gs.results[gs.idx].skipped?G.goldL:"#fcc"}`,background:gs.results?.[gs.idx]&&!gs.results[gs.idx].skipped?"linear-gradient(135deg,#FFFBF0,#FFF8E7)":"#FFF5F5"}),textAlign:"center",animation:"fadeIn .4s ease"}}>
              {gs.results?.[gs.idx]&&!gs.results[gs.idx].skipped ? (
                <div style={{fontFamily:"'Playfair Display',serif",fontSize:20,fontWeight:700,...gold()}}>
                  🎉 Bravo {gs.players.find(p=>p.id===gs.results[gs.idx].pid)?.name} ! +{gs.results[gs.idx].pts} points
                </div>
              ):(
                <div style={{color:G.mid,fontSize:15}}>La réponse était : <strong style={{color:G.dark,fontFamily:"'Playfair Display',serif"}}>{q?.answer}</strong></div>
              )}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════
   PANNEAU NADA — téléphone
══════════════════════════════════════ */
function NadaPanel() {
  const [gs,setGs]   = useState(()=>lsLoad(LS_STATE));
  const [status,setStatus] = useState("⏳ Connexion…");
  const room = getRoom();

  // Sauvegarde et sync
  const save = useCallback(next => {
    setGs(next);
    lsSave(LS_STATE, next);
    // BroadcastChannel
    try { const bc=new BroadcastChannel("rebus_v3"); bc.postMessage(next); setTimeout(()=>bc.close(),100); } catch(e){}
    // ntfy.sh
    ntfyPub(room, next).then(()=>setStatus("✅ Synchro OK")).catch(()=>setStatus("⚠️ Erreur réseau"));
  },[room]);

  // Écoute les mises à jour (si quelqu'un d'autre modifie)
  useEffect(()=>{
    const local = lsLoad(LS_STATE);
    if(local) setGs(local);

    let es;
    try {
      es = new EventSource("https://ntfy.sh/"+room+"/sse");
      es.onopen = ()=>setStatus("✅ Connecté");
      es.onerror = ()=>setStatus("⚠️ Reconnexion…");
      es.onmessage = e => {
        try { const d=JSON.parse(e.data); const msg=d.message?JSON.parse(d.message):null; if(msg?.phase){setGs(msg);lsSave(LS_STATE,msg);} } catch(err){}
      };
    } catch(e){}
    return ()=>{ if(es)es.close(); };
  },[room]);

  if(!gs) return (
    <div style={{height:"100vh",background:"#111",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:14,padding:20}}>
      <div style={{fontSize:40}}>🔐</div>
      <div style={{color:"#888",fontSize:13,textAlign:"center"}}>Aucun jeu configuré.<br/>Configure le jeu sur l'ordinateur d'abord.</div>
      <div style={{color:"#666",fontSize:11}}>{status}</div>
    </div>
  );

  if(gs.phase==="final") return (
    <div style={{minHeight:"100vh",background:"#111",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:20,gap:12}}>
      <div style={{fontSize:50}}>🏆</div>
      <div style={{color:G.gold,fontFamily:"'Playfair Display',serif",fontSize:24,fontWeight:900,textAlign:"center"}}>Fin du jeu !</div>
      {[...gs.players].sort((a,b)=>b.score-a.score).map((p,i)=>(
        <div key={p.id} style={{color:"white",fontSize:14,fontWeight:700}}>{i===0?"👑":i===1?"🥈":"🥉"} {p.name} — {p.score} pts</div>
      ))}
    </div>
  );

  const q    = gs.questions[gs.idx];
  const isLast = gs.idx===gs.questions.length-1;
  const pts  = PTS[Math.max(1,gs.hints||0)]||10;
  const res  = gs.results?.[gs.idx];

  // Timer Nada
  const { time:nTime, running:nRunning, start:nStart, reset:nReset } = useTimer(gs.idx + "-" + gs.hints);

  const reveal = () => {
    if((gs.hints||0)>=q.hints.length) return;
    save({...gs, hints:(gs.hints||0)+1});
  };

  const award = pid => {
    const p = PTS[Math.max(1,gs.hints||0)]||10;
    const newPlayers = gs.players.map(pl=>pl.id===pid?{...pl,score:pl.score+p}:pl);
    const newResults = {...gs.results,[gs.idx]:{pid,pts:p}};
    const newRevealed = [...new Set([...(gs.revealed||[]),gs.idx])];
    const next = {...gs,players:newPlayers,results:newResults,revealed:newRevealed,phase:"validate",flash:pid,sel:null};
    save(next);
    setTimeout(()=>save({...next,flash:null}),1200);
  };

  const skip = () => {
    const newResults = {...gs.results,[gs.idx]:{skipped:true}};
    const newRevealed = [...new Set([...(gs.revealed||[]),gs.idx])];
    save({...gs,results:newResults,revealed:newRevealed,phase:"validate",sel:null});
  };

  const next = () => {
    if(isLast){save({...gs,phase:"final"});return;}
    save({...gs,idx:gs.idx+1,hints:0,phase:"play",sel:null,flash:null});
  };

  const goTo = i => save({...gs,idx:i,hints:0,phase:(gs.revealed||[]).includes(i)?"validate":"play",sel:null,flash:null});

  /* couleurs panel sombre */
  const N = {bg:"#0d0d0d",card:"rgba(255,255,255,.06)",border:"rgba(212,160,23,.25)",gold:G.gold,goldL:G.goldL,cream:"#F0EDE8",light:"#777"};
  const nc  = (e={}) => ({background:N.card,borderRadius:11,border:`1px solid ${N.border}`,padding:"10px 13px",...e});
  const np  = (p=true,e={}) => ({padding:"8px 16px",borderRadius:999,border:"none",cursor:"pointer",fontFamily:"inherit",fontWeight:700,fontSize:12,background:p?G.grad:"rgba(255,255,255,.08)",color:p?"white":N.cream,...e});

  return (
    <div style={{minHeight:"100vh",background:N.bg,color:N.cream,fontFamily:"'Montserrat',sans-serif",display:"flex",flexDirection:"column",overflow:"hidden"}}>
      {/* Header */}
      <div style={{padding:"10px 14px",borderBottom:`1px solid ${N.border}`,background:"rgba(0,0,0,.5)",display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0}}>
        <div>
          <div style={{fontWeight:800,fontSize:12,letterSpacing:2,...gold()}}>🔐 PANNEAU NADA</div>
          <div style={{color:N.light,fontSize:9,letterSpacing:1,marginTop:1}}>Contrôles privés</div>
        </div>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          <div style={{color:status.includes("✅")?"#3A9960":"#E6B420",fontSize:10,fontWeight:600}}>{status}</div>
          <div style={{color:N.light,fontSize:10}}>Q{gs.idx+1}/{gs.questions.length}</div>
        </div>
      </div>

      <div style={{flex:1,overflowY:"auto",padding:12,display:"flex",flexDirection:"column",gap:10}}>

        {/* Navigation rapide */}
        <div style={nc()}>
          <div style={{color:N.light,fontSize:9,letterSpacing:2,textTransform:"uppercase",fontWeight:700,marginBottom:7}}>Questions</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
            {gs.questions.map((_,i)=>(
              <button key={i} onClick={()=>goTo(i)} style={{padding:"4px 10px",borderRadius:999,border:`1px solid ${i===gs.idx?N.gold:N.border}`,background:i===gs.idx?`${N.gold}22`:"rgba(255,255,255,.03)",color:i===gs.idx?N.gold:N.cream,cursor:"pointer",fontFamily:"inherit",fontSize:11,fontWeight:700}}>
                {(gs.revealed||[]).includes(i)?"✓":""}Q{i+1}
              </button>
            ))}
          </div>
        </div>

        {/* Catégorie + Réponse */}
        <div style={nc({display:"flex",gap:12,flexWrap:"wrap"})}>
          <div style={{flex:1}}><div style={{color:N.light,fontSize:9,letterSpacing:2,textTransform:"uppercase",fontWeight:700,marginBottom:3}}>Catégorie</div><div style={{color:N.goldL,fontWeight:700,fontSize:13}}>{q.cat||"—"}</div></div>
          <div style={{flex:1}}><div style={{color:N.light,fontSize:9,letterSpacing:2,textTransform:"uppercase",fontWeight:700,marginBottom:3}}>Réponse</div><div style={{color:"#7ecba1",fontWeight:800,fontSize:13,fontFamily:"'Playfair Display',serif"}}>{q.answer}</div></div>
        </div>

        {/* Script */}
        <div style={nc()}>
          <div style={{color:N.light,fontSize:9,letterSpacing:2,textTransform:"uppercase",fontWeight:700,marginBottom:8}}>Script — à lire à voix haute</div>
          {q.hints.map((h,i)=>(
            <div key={i} style={{display:"flex",gap:8,marginBottom:6,padding:"7px 9px",borderRadius:8,background:i<(gs.hints||0)?`${N.gold}0f`:i===(gs.hints||0)?"rgba(255,255,255,.04)":"rgba(0,0,0,.2)",border:`1px solid ${i<(gs.hints||0)?N.gold+"33":"transparent"}`,opacity:i>(gs.hints||0)?.4:1,transition:"all .3s"}}>
              <div style={{width:19,height:19,borderRadius:"50%",background:i<(gs.hints||0)?G.grad:"rgba(255,255,255,.1)",display:"flex",alignItems:"center",justifyContent:"center",color:i<(gs.hints||0)?"white":N.cream,fontWeight:900,fontSize:8,flexShrink:0}}>{i+1}</div>
              <div style={{flex:1}}>
                <div style={{color:i<(gs.hints||0)?N.cream:i===(gs.hints||0)?N.goldL:`${N.cream}55`,fontSize:12,lineHeight:1.4}}>{h||"—"}</div>
                <div style={{color:`${N.gold}44`,fontSize:9,marginTop:1}}>{PTS[i+1]} pts</div>
              </div>
              {i<(gs.hints||0)&&<div style={{color:"#7ecba1",fontSize:9,fontWeight:700,alignSelf:"center"}}>✓</div>}
              {i===(gs.hints||0)&&gs.phase==="play"&&<div style={{color:N.gold,fontSize:8,fontWeight:700,alignSelf:"center",animation:"pulse 1s infinite"}}>→ SUIVANT</div>}
            </div>
          ))}
        </div>

        {/* Contrôles */}
        {gs.phase==="play" && (
          <div style={nc()}>
            <div style={{color:N.light,fontSize:9,letterSpacing:2,textTransform:"uppercase",fontWeight:700,marginBottom:10}}>Contrôles</div>

            {/* Chrono */}
            {(gs.hints||0)>0 && (
              <div style={{display:"flex",justifyContent:"center",marginBottom:12,padding:"8px",borderRadius:10,background:"rgba(0,0,0,.2)"}}>
                <div style={{textAlign:"center"}}>
                  <div style={{color:N.light,fontSize:9,letterSpacing:2,textTransform:"uppercase",fontWeight:700,marginBottom:6}}>⏱ Chronomètre</div>
                  <CircleTimer time={nTime} running={nRunning} onStart={nStart} onReset={nReset}/>
                </div>
              </div>
            )}
            <div style={{marginBottom:10}}>
              <div style={{color:N.light,fontSize:10,marginBottom:6}}>Qui a trouvé ?</div>
              <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
                {gs.players.map(p=>(
                  <button key={p.id} onClick={()=>save({...gs,sel:p.id===gs.sel?null:p.id})}
                    style={{padding:"5px 13px",borderRadius:999,border:`2px solid ${p.id===gs.sel?p.color:p.color+"44"}`,background:p.id===gs.sel?p.color+"22":"transparent",color:p.id===gs.sel?p.color:`${p.color}77`,cursor:"pointer",fontFamily:"inherit",fontSize:12,fontWeight:700}}>
                    {p.name}
                  </button>
                ))}
              </div>
            </div>
            <div style={{display:"grid",gap:7}}>
              {(gs.hints||0)<q.hints.length&&(
                <button onClick={reveal} style={np(false,{width:"100%",padding:"9px",background:`${N.gold}14`,border:`1px solid ${N.gold}44`,color:N.gold})}>
                  💡 Révéler indice {(gs.hints||0)+1} → {PTS[(gs.hints||0)+1]} pts
                </button>
              )}
              <button onClick={()=>gs.sel&&award(gs.sel)} disabled={!gs.sel} style={np(true,{width:"100%",padding:"10px",opacity:gs.sel?1:.4})}>
                ✓ Bonne réponse ({pts} pts)
              </button>
              <button onClick={skip} style={np(false,{width:"100%",padding:"8px",background:"rgba(224,80,80,.1)",border:"1px solid rgba(224,80,80,.3)",color:"#e87a7a"})}>
                ✗ Passer
              </button>
            </div>
          </div>
        )}

        {gs.phase==="validate" && (
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            <div style={nc({textAlign:"center"})}>
              {res&&!res.skipped
                ?<div style={{color:N.gold,fontWeight:700,fontSize:13}}>✅ {gs.players.find(p=>p.id===res.pid)?.name} · +{res.pts} pts</div>
                :<div style={{color:`${N.cream}66`,fontSize:12}}>❌ Réponse : {q.answer}</div>}
            </div>
            <button onClick={next} style={np(true,{width:"100%",padding:"12px",letterSpacing:1,textTransform:"uppercase"})}>
              {isLast?"🏆 Résultats finaux":"Question suivante →"}
            </button>
          </div>
        )}

        {/* Scores */}
        <div style={nc()}>
          <div style={{color:N.light,fontSize:9,letterSpacing:2,textTransform:"uppercase",fontWeight:700,marginBottom:7}}>Scores</div>
          {[...gs.players].sort((a,b)=>b.score-a.score).map((p,i)=>(
            <div key={p.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:5,padding:"5px 7px",borderRadius:7,background:"rgba(0,0,0,.2)"}}>
              <div style={{display:"flex",alignItems:"center",gap:6}}><span style={{fontSize:11}}>{i===0?"👑":i===1?"🥈":"🥉"}</span><span style={{color:p.color,fontWeight:700,fontSize:12}}>{p.name}</span></div>
              <span style={{fontWeight:900,fontSize:13,...gold()}}>{p.score} pts</span>
            </div>
          ))}
        </div>

      </div>
    </div>
  );
}

/* ══════════════════════════════════════
   APP ROOT
══════════════════════════════════════ */
function App() {
  const isNada  = window.location.search.includes("room=") && !window.location.pathname.includes("public");
  const [mode,setMode] = useState(()=>isNada?"nada":"welcome");

  if(mode==="nada"||isNada) return <NadaPanel/>;
  if(mode==="public") return <PublicScreen onBack={()=>setMode("welcome")}/>;
  return <Welcome setMode={setMode}/>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
