<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Rébus Chogan - Limitless Team</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Lato:wght@300;400;700&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#FAFAFA;font-family:'Lato',sans-serif;color:#2C2C2C}
    input,textarea,select{font-family:'Lato',sans-serif}
    input::placeholder{color:rgba(44,44,44,0.35)}
    ::-webkit-scrollbar{width:4px}
    ::-webkit-scrollbar-thumb{background:#D4AF37;border-radius:4px}
    @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef,useCallback}=React;

const G={dark:"#FFFFFF",green:"#F9F9F9",gold:"#D4AF37",goldL:"#E5C05B",cream:"#2C2C2C",red:"#e87a7a"};
const POINTS={1:50,2:40,3:30,4:20,5:10};
const BLUR={0:"blur(28px) grayscale(1)",1:"blur(22px) grayscale(0.8)",2:"blur(15px) grayscale(0.4)",3:"blur(9px)",4:"blur(3px)",5:"blur(0px)"};
const COLORS=["#D4AF37","#C5A028","#B8860B","#966F33","#E5C05B","#F2D482","#DAA520","#A67C00","#8B6508","#B89B3C"];
const STORAGE_KEY="rebus_chogan_state";

const DEFAULT_Q=[
  {id:1,categorie:"PARFUMERIE",indices:["Je suis une fragrance classée « Extrait de Parfum ».","Ma composition contient 0% d'eau ajoutée.","Je possède une concentration de 30% d'essence de parfum.","Mon flacon est sobre, élégant et identifié par un numéro.","Je suis une création inspirée d'une grande marque mondiale, sans fixateur chimique."],reponse:"Parfum Chogan (Traditionnel ou Luxury)",image:""},
  {id:2,categorie:"SOINS VISAGE",indices:["Je suis un soin cosmétique naturel de la gamme Aurodhea.","Je suis efficace contre les taches cutanées et les cicatrices.","Ma formule est riche en collagène, élastine et acide glycolique.","Je suis l'allié numéro 1 contre le vieillissement prématuré.","Mon ingrédient principal est extrait d'un petit animal à coquille."],reponse:"Crème à la bave d'escargot",image:""},
  {id:3,categorie:"HYGIÈNE",indices:["Je suis un produit de la routine d'hygiène quotidienne.","Je n'utilise aucun agent de blanchiment chimique agressif.","J'élimine les taches de café et de nicotine en douceur.","Ma couleur est surprenante et totalement opposée au blanc habituel.","Je tire mes bienfaits purifiants du charbon actif."],reponse:"Dentifrice Black Power",image:""},
  {id:4,categorie:"ENTRETIEN",indices:["Je fais partie de la gamme de nettoyage écologique et puissante.","Je suis efficace sur bois, acier, textile et même moteurs.","Je suis la solution radicale contre les graisses les plus tenaces.","Ma formule est hautement concentrée pour une utilisation professionnelle.","On m'appelle le « Degreaser Plus »."],reponse:"Dégraissant Chogan Plus",image:""},
  {id:5,categorie:"BIEN-ÊTRE",indices:["Allié quotidien pour booster l'organisme de l'intérieur.","Utilisé lors des cures de changement de saison.","Je purifie le sang et aide à la détoxification du foie.","Ma saveur est naturellement amère mais mes bienfaits sont immenses.","Je suis le jus de plante le plus célèbre, souvent consommé pur ou dilué."],reponse:"Jus d'Aloe Vera à boire",image:""},
  {id:6,categorie:"HUILES ESSENTIELLES",indices:["Extrait liquide hautement concentré et 100% pur.","Peut être diffusé dans l'air ou mélangé à une huile végétale.","Je suis connue pour mes propriétés relaxantes.","Mon odeur rappelle les champs du sud de la France.","Je suis l'huile essentielle de Lavande Officinale."],reponse:"Huile Essentielle de Lavande",image:""},
];

const inp=(e={})=>({background:"#FFFFFF",border:`1px solid ${G.gold}44`,borderRadius:8,padding:"8px 11px",color:G.cream,width:"100%",fontSize:13,...e});
const Btn=(p=true,e={})=>({padding:"9px 18px",borderRadius:8,border:"none",cursor:"pointer",fontFamily:"inherit",fontWeight:700,background:p?`linear-gradient(135deg,${G.gold},${G.goldL})`:"rgba(0,0,0,0.05)",color:p?"#FFFFFF":G.cream,fontSize:13,...e});

const makeState=(cons,qs)=>({ phase:"play", idx:0, hintShown:0, results:{}, revealed:[], consultants:cons.map(c=>({...c,score:0})), questions:qs });
function saveState(s){ try{localStorage.setItem(STORAGE_KEY,JSON.stringify(s));}catch(e){} }
function loadState(){ try{const r=localStorage.getItem(STORAGE_KEY);return r?JSON.parse(r):null;}catch(e){return null;} }

const Logo=({size=22})=>(
  <div style={{display:"flex",alignItems:"center",gap:10}}>
    <div style={{width:38,height:38,background:`linear-gradient(135deg,${G.gold},${G.goldL})`,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,color:"#FFF",fontWeight:900}}>✿</div>
    <div>
      <div style={{fontFamily:"'Playfair Display',serif",fontSize:size,fontWeight:700,letterSpacing:4,color:G.gold,lineHeight:1}}>CHOGAN</div>
      <div style={{fontSize:9,color:`${G.cream}55`,letterSpacing:3}}>LIMITLESS TEAM</div>
    </div>
  </div>
);

function Setup({onStart}){
  const [cons,setCons]=useState([{id:1,name:"Marie",color:COLORS[0]},{id:2,name:"Sophie",color:COLORS[1]},{id:3,name:"Léa",color:COLORS[2]}]);
  const [qs,setQs]=useState(DEFAULT_Q);
  const [name,setName]=useState("");
  const [tab,setTab]=useState("c");

  return(
    <div style={{minHeight:"100vh",background:`#FAFAFA`,display:"flex",flexDirection:"column",alignItems:"center",padding:"40px 16px"}}>
      <Logo size={26}/>
      <h1 style={{fontFamily:"'Playfair Display',serif",fontSize:30,margin:"12px 0",letterSpacing:6}}>RÉBUS</h1>
      <div style={{width:"100%",maxWidth:600,background:"#FFF",borderRadius:16,boxShadow:"0 10px 30px rgba(0,0,0,0.05)",padding:20}}>
        <div style={{display:"flex",gap:10,marginBottom:20}}>
          <input value={name} onChange={e=>setName(e.target.value)} placeholder="Nom du participant..." style={inp()}/>
          <button onClick={()=>{if(name.trim()){setCons([...cons,{id:Date.now(),name:name.trim(),color:COLORS[cons.length%COLORS.length]}]);setName("");}}} style={Btn(true)}>+ Ajouter</button>
        </div>
        <div style={{display:"grid",gap:10,marginBottom:20}}>
          {cons.map(c=>(<div key={c.id} style={{padding:10,background:"#F9F9F9",borderRadius:8,borderLeft:`4px solid ${c.color}`}}>{c.name}</div>))}
        </div>
        <button onClick={()=>onStart(cons,qs)} style={Btn(true,{width:"100%",padding:15})}>LANCER LE JEU</button>
      </div>
    </div>
  );
}

function PublicScreen(){
  const [gs,setGs]=useState(null);
  useEffect(()=>{
    const sync=()=>{const s=loadState();if(s)setGs(s);}; sync();
    window.addEventListener("storage",sync); const t=setInterval(sync,500);
    return()=>{window.removeEventListener("storage",sync);clearInterval(t);};
  },[]);

  if(!gs) return null;
  const q=gs.questions[gs.idx];

  return(
    <div style={{height:"100vh",background:"#FAFAFA",display:"flex",flexDirection:"column"}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"14px 32px",background:"#FFF",borderBottom:`1px solid ${G.gold}22`}}>
        <Logo size={20}/><h1 style={{fontFamily:"'Playfair Display',serif",fontSize:34,color:G.gold,letterSpacing:10}}>RÉBUS</h1>
        <div style={{fontSize:22,color:G.gold,fontWeight:900}}>{gs.idx+1}/{gs.questions.length}</div>
      </div>
      <div style={{flex:1,display:"flex",padding:20,gap:20}}>
        <div style={{width:200,display:"flex",flexDirection:"column",gap:7}}>
          {gs.consultants.map(c=>(
            <div key={c.id} style={{padding:12,background:"#FFF",borderRadius:10,borderLeft:`4px solid ${c.color}`}}>
              <div style={{fontWeight:700}}>{c.name}</div>
              <div style={{fontSize:20,fontWeight:900,color:G.gold}}>{c.score}</div>
            </div>
          ))}
        </div>
        <div style={{flex:1,display:"flex",flexDirection:"column",gap:15}}>
          <div style={{flex:1,background:"#FFF",borderRadius:18,display:"flex",alignItems:"center",justifyContent:"center",border:`1px solid ${G.gold}18`}}>
            {q?.image && <img src={q.image} style={{maxHeight:"90%",maxWidth:"90%",filter:gs.phase==="validate"?"":BLUR[gs.hintShown]}}/>}
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {q.indices.slice(0,gs.hintShown).map((ind,i)=>(<div key={i} style={{padding:15,background:"#FFF",borderRadius:10,border:`1px solid ${G.gold}22`}}><b>{i+1}.</b> {ind}</div>))}
          </div>
          {gs.phase==="validate" && <div style={{padding:20,background:G.gold,color:"#FFF",borderRadius:12,textAlign:"center",fontSize:24,fontWeight:900}}>{q.reponse}</div>}
        </div>
      </div>
    </div>
  );
}

function NadaPanel(){
  const [gs,setGs]=useState(null);
  useEffect(()=>{const s=loadState();if(s)setGs(s);},[]);
  if(!gs) return <div style={{padding:40}}>Aucune partie en cours. Lancez le jeu d'abord.</div>;
  const q=gs.questions[gs.idx];
  const update=(p)=>{const n={...gs,...p};setGs(n);saveState(n);};

  return(
    <div style={{padding:20,maxWidth:600,margin:"auto"}}>
      <Logo size={20}/><h2 style={{margin:"20px 0"}}>CONTRÔLE NADA</h2>
      <div style={{background:"#EEE",padding:15,borderRadius:10,marginBottom:20}}>RÉPONSE : <b>{q.reponse}</b></div>
      <div style={{display:"grid",gap:10,marginBottom:20}}>
        {q.indices.map((ind,i)=><button key={i} onClick={()=>update({hintShown:i+1})} style={Btn(i<gs.hintShown)}>{i+1}. {ind}</button>)}
      </div>
      {gs.phase==="play" && (
        <div style={{display:"flex",flexWrap:"wrap",gap:10}}>
          {gs.consultants.map(c=><button key={c.id} onClick={()=>{
            const nc=gs.consultants.map(x=>x.id===c.id?{...x,score:x.score+(POINTS[gs.hintShown]||10)}:x);
            update({consultants:nc,phase:"validate"});
          }} style={Btn(false,{borderColor:c.color,color:c.color})}>{c.name}</button>)}
        </div>
      )}
      {gs.phase==="validate" && <button onClick={()=>{if(gs.idx < gs.questions.length-1) update({idx:gs.idx+1,hintShown:0,phase:"play"});}} style={Btn(true,{width:"100%",marginTop:20})}>SUIVANT ➔</button>}
      <button onClick={()=>window.location.href="?"} style={{display:"block",marginTop:40,color:G.gold,background:"none",border:"none"}}>⬅ Retour à l'accueil</button>
    </div>
  );
}

function App(){
  const [mode,setMode]=useState("welcome");
  if(window.location.search.includes("nada")) return <NadaPanel/>;
  if(mode==="welcome") return (
    <div style={{height:"100vh",background:"#FAFAFA",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:20}}>
      <Logo size={32}/>
      <button onClick={()=>setMode("setup")} style={Btn(true)}>CONFIGURER LE JEU</button>
      <button onClick={()=>setMode("public")} style={Btn(false)}>ÉCRAN PUBLIC (ZOOM)</button>
      <button onClick={()=>window.location.search="?nada"} style={{position:"fixed",bottom:20,left:20,opacity:0.5,fontSize:10,background:"none",border:"none"}}>🔑 PANNEAU NADA</button>
    </div>
  );
  if(mode==="setup") return <Setup onStart={(c,q)=>{saveState(makeState(c,q));setMode("public");}}/>;
  return <PublicScreen/>;
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
