<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Rébus Chogan — Limitless Team</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Lato:wght@300;400;700&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#0d3826;font-family:'Lato',sans-serif;overflow:hidden}
    input,textarea,select{font-family:'Lato',sans-serif}
    input::placeholder,textarea::placeholder{color:rgba(245,236,215,0.35)}
    ::-webkit-scrollbar{width:4px}
    ::-webkit-scrollbar-thumb{background:#c9a84c44;border-radius:4px}
    @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    @keyframes fadeUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
    @keyframes flash{0%,100%{transform:scale(1)}50%{transform:scale(1.07)}}
    @keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
    @keyframes glow{0%,100%{box-shadow:0 0 10px #c9a84c33}50%{box-shadow:0 0 24px #c9a84c77}}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useRef,useEffect} = React;

const G={dark:"#0d3826",green:"#1a5c3a",gold:"#c9a84c",goldL:"#e8c97a",cream:"#f5ecd7",red:"#e87a7a"};
const POINTS_MAP={1:50,2:40,3:30,4:20,5:10};
const BLUR_MAP={0:"blur(28px) brightness(0.45)",1:"blur(22px) brightness(0.55)",2:"blur(15px) brightness(0.65)",3:"blur(9px) brightness(0.75)",4:"blur(3px) brightness(0.9)",5:"blur(0px) brightness(1)"};
const COLORS=["#e8c97a","#7ecba1","#e87a7a","#87c8e8","#c87ae8","#f0a070","#a0d080","#80b8f0","#f08090","#b0d870"];

const DEFAULT_Q=[
  {id:1,categorie:"PARFUMERIE",indices:["Je suis une fragrance classée « Extrait de Parfum ».","Ma composition contient 0% d'eau ajoutée.","Je possède une concentration de 30% d'essence de parfum.","Mon flacon est sobre, élégant et identifié par un numéro.","Je suis une création inspirée d'une grande marque mondiale, sans fixateur chimique."],reponse:"Parfum Chogan (Traditionnel ou Luxury)",image:"",imageUrl:""},
  {id:2,categorie:"SOINS VISAGE",indices:["Je suis un soin cosmétique naturel de la gamme Aurodhea.","Je suis efficace contre les taches cutanées et les cicatrices.","Ma formule est riche en collagène, élastine et acide glycolique.","Je suis l'allié numéro 1 contre le vieillissement prématuré.","Mon ingrédient principal est extrait d'un petit animal à coquille."],reponse:"Crème à la bave d'escargot",image:"",imageUrl:""},
  {id:3,categorie:"HYGIÈNE",indices:["Je suis un produit de la routine d'hygiène quotidienne.","Je n'utilise aucun agent de blanchiment chimique agressif.","J'élimine les taches de café et de nicotine en douceur.","Ma couleur est surprenante et totalement opposée au blanc habituel.","Je tire mes bienfaits purifiants du charbon actif."],reponse:"Dentifrice Black Power",image:"",imageUrl:""},
  {id:4,categorie:"ENTRETIEN",indices:["Je fais partie de la gamme de nettoyage écologique et puissante.","Je suis efficace sur bois, acier, textile et même moteurs.","Je suis la solution radicale contre les graisses les plus tenaces.","Ma formule est hautement concentrée pour une utilisation professionnelle.","On m'appelle le « Degreaser Plus »."],reponse:"Dégraissant Chogan Plus",image:"",imageUrl:""},
  {id:5,categorie:"BIEN-ÊTRE",indices:["Allié quotidien pour booster l'organisme de l'intérieur.","Utilisé lors des cures de changement de saison.","Je purifie le sang et aide à la détoxification du foie.","Ma saveur est naturellement amère mais mes bienfaits sont immenses.","Je suis le jus de plante le plus célèbre, souvent consommé pur ou dilué."],reponse:"Jus d'Aloe Vera à boire",image:"",imageUrl:""},
  {id:6,categorie:"HUILES ESSENTIELLES",indices:["Extrait liquide hautement concentré et 100% pur.","Peut être diffusé dans l'air ou mélangé à une huile végétale.","Je suis connue pour mes propriétés relaxantes.","Mon odeur rappelle les champs du sud de la France.","Je suis l'huile essentielle de Lavande Officinale."],reponse:"Huile Essentielle de Lavande",image:"",imageUrl:""},
];

const inp=(e={})=>({background:"rgba(255,255,255,0.07)",border:`1px solid ${G.gold}44`,borderRadius:8,padding:"8px 11px",color:G.cream,outline:"none",width:"100%",fontSize:13,...e});
const btn=(p=true,e={})=>({padding:"9px 18px",borderRadius:8,border:"none",cursor:"pointer",fontFamily:"inherit",fontWeight:700,background:p?`linear-gradient(135deg,${G.gold},${G.goldL})`:"rgba(255,255,255,0.08)",color:p?G.dark:G.cream,fontSize:13,transition:"all 0.2s",...e});

const Logo=()=>(
  <div style={{display:"flex",alignItems:"center",gap:10}}>
    <div style={{width:40,height:40,background:`linear-gradient(135deg,${G.gold},${G.goldL})`,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,color:G.dark,fontWeight:900}}>✿</div>
    <div>
      <div style={{fontFamily:"'Playfair Display',serif",fontSize:22,fontWeight:700,letterSpacing:4,color:G.gold,lineHeight:1}}>CHOGAN</div>
      <div style={{fontSize:9,color:`${G.gold}77`,letterSpacing:3}}>LIMITLESS TEAM</div>
    </div>
  </div>
);

// ══════════════════════════════════════
// SETUP SCREEN
// ══════════════════════════════════════
function Setup({onStart}){
  const [cons,setCons]=useState([{id:1,name:"Marie",color:COLORS[0]},{id:2,name:"Sophie",color:COLORS[1]},{id:3,name:"Léa",color:COLORS[2]}]);
  const [qs,setQs]=useState(DEFAULT_Q);
  const [name,setName]=useState("");
  const [tab,setTab]=useState("c");
  const [editQ,setEditQ]=useState(null);
  const fileRefs=useRef({});

  const addC=()=>{if(!name.trim())return;setCons(p=>[...p,{id:Date.now(),name:name.trim(),color:COLORS[p.length%COLORS.length]}]);setName("");};
  const addQ=()=>{const id=Date.now();setQs(p=>[...p,{id,categorie:"",indices:["","","","",""],reponse:"",image:"",imageUrl:""}]);setEditQ(id);};
  const handleImg=(qid,e)=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>setQs(p=>p.map(q=>q.id===qid?{...q,image:ev.target.result}:q));r.readAsDataURL(f);};
  const upInd=(qid,i,v)=>setQs(p=>p.map(q=>q.id===qid?{...q,indices:q.indices.map((x,j)=>j===i?v:x)}:q));

  const tabS=(t)=>({flex:1,padding:"13px 6px",border:"none",cursor:"pointer",fontFamily:"inherit",fontSize:11,fontWeight:700,letterSpacing:2,textTransform:"uppercase",background:tab===t?`${G.gold}18`:"transparent",color:tab===t?G.gold:`${G.cream}55`,borderBottom:tab===t?`2px solid ${G.gold}`:"2px solid transparent"});

  return(
    <div style={{minHeight:"100vh",background:`linear-gradient(160deg,${G.dark},#071a10)`,display:"flex",flexDirection:"column",alignItems:"center",padding:"28px 16px",overflowY:"auto"}}>
      <div style={{marginBottom:24,textAlign:"center"}}><Logo/>
        <h1 style={{color:G.cream,fontFamily:"'Playfair Display',serif",fontSize:30,margin:"12px 0 4px",letterSpacing:6}}>RÉBUS</h1>
        <p style={{color:`${G.gold}88`,fontSize:11,letterSpacing:3}}>CONFIGURATION — FORMATRICE NADA</p>
      </div>

      <div style={{width:"100%",maxWidth:680,background:"rgba(255,255,255,0.035)",borderRadius:16,border:`1px solid ${G.gold}22`,overflow:"hidden"}}>
        <div style={{display:"flex",borderBottom:`1px solid ${G.gold}22`}}>
          <button style={tabS("c")} onClick={()=>setTab("c")}>👥 Participants ({cons.length})</button>
          <button style={tabS("q")} onClick={()=>setTab("q")}>📋 Questions ({qs.length})</button>
        </div>

        <div style={{padding:18,maxHeight:460,overflowY:"auto"}}>
          {tab==="c"&&(
            <div>
              <div style={{display:"flex",gap:8,marginBottom:14}}>
                <input value={name} onChange={e=>setName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addC()} placeholder="Nom du participant..." style={inp()}/>
                <button onClick={addC} style={btn(true,{whiteSpace:"nowrap",padding:"8px 14px"})}>+ Ajouter</button>
              </div>
              <div style={{display:"grid",gap:7}}>
                {cons.map(c=>(
                  <div key={c.id} style={{display:"flex",alignItems:"center",gap:9,padding:"9px 12px",background:"rgba(255,255,255,0.04)",borderRadius:9,border:`1px solid ${c.color}22`}}>
                    <div style={{width:32,height:32,borderRadius:"50%",background:c.color,display:"flex",alignItems:"center",justifyContent:"center",color:"#111",fontWeight:900,fontSize:14,flexShrink:0}}>{c.name[0]?.toUpperCase()}</div>
                    <input value={c.name} onChange={e=>setCons(p=>p.map(x=>x.id===c.id?{...x,name:e.target.value}:x))} style={{...inp(),flex:1,width:"auto"}}/>
                    <select value={c.color} onChange={e=>setCons(p=>p.map(x=>x.id===c.id?{...x,color:e.target.value}:x))} style={{background:"rgba(0,0,0,0.3)",border:`1px solid ${G.gold}33`,borderRadius:6,color:G.cream,padding:"5px",cursor:"pointer"}}>
                      {COLORS.map(col=><option key={col} value={col} style={{background:"#0d3826"}}>■ {col}</option>)}
                    </select>
                    <button onClick={()=>setCons(p=>p.filter(x=>x.id!==c.id))} style={{background:"rgba(255,80,80,0.15)",border:"none",color:G.red,cursor:"pointer",borderRadius:6,padding:"6px 9px"}}>✕</button>
                  </div>
                ))}
              </div>
            </div>
          )}

          {tab==="q"&&(
            <div>
              {qs.map((q,i)=>(
                <div key={q.id} style={{background:"rgba(255,255,255,0.04)",borderRadius:11,padding:13,marginBottom:10,border:`1px solid ${editQ===q.id?G.gold+"55":G.gold+"18"}`}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:editQ===q.id?12:0}}>
                    <div>
                      <span style={{color:G.gold,fontWeight:700,fontSize:11,letterSpacing:2}}>Q{i+1}</span>
                      <span style={{color:`${G.cream}55`,fontSize:11,marginLeft:8}}>{q.reponse||"Sans réponse"}</span>
                    </div>
                    <div style={{display:"flex",gap:5}}>
                      <button onClick={()=>setEditQ(editQ===q.id?null:q.id)} style={btn(false,{padding:"4px 9px",fontSize:10})}>{editQ===q.id?"▲":"✏"}</button>
                      <button onClick={()=>setQs(p=>p.filter(x=>x.id!==q.id))} style={{background:"rgba(255,80,80,0.12)",border:"none",color:G.red,cursor:"pointer",borderRadius:6,padding:"4px 7px",fontSize:11}}>✕</button>
                    </div>
                  </div>
                  {editQ===q.id&&(
                    <div style={{display:"grid",gap:9,animation:"fadeIn 0.2s ease"}}>
                      <div>
                        <label style={{color:`${G.gold}77`,fontSize:10,letterSpacing:1,display:"block",marginBottom:3}}>CATÉGORIE (usage interne uniquement)</label>
                        <input value={q.categorie} onChange={e=>setQs(p=>p.map(x=>x.id===q.id?{...x,categorie:e.target.value}:x))} placeholder="ex: PARFUMERIE (non visible par les participants)" style={inp()}/>
                      </div>
                      <div>
                        <label style={{color:`${G.gold}77`,fontSize:10,letterSpacing:1,display:"block",marginBottom:6}}>5 INDICES (script de lecture)</label>
                        {q.indices.map((ind,j)=>(
                          <div key={j} style={{display:"flex",gap:6,marginBottom:5,alignItems:"center"}}>
                            <div style={{width:20,height:20,borderRadius:"50%",background:`${G.gold}22`,border:`1px solid ${G.gold}44`,display:"flex",alignItems:"center",justifyContent:"center",color:G.gold,fontSize:9,fontWeight:700,flexShrink:0}}>{j+1}</div>
                            <input value={ind} onChange={e=>upInd(q.id,j,e.target.value)} placeholder={`Indice ${j+1}...`} style={inp()}/>
                          </div>
                        ))}
                      </div>
                      <div>
                        <label style={{color:`${G.gold}77`,fontSize:10,letterSpacing:1,display:"block",marginBottom:3}}>RÉPONSE</label>
                        <input value={q.reponse} onChange={e=>setQs(p=>p.map(x=>x.id===q.id?{...x,reponse:e.target.value}:x))} placeholder="Réponse attendue..." style={inp()}/>
                      </div>
                      <div>
                        <label style={{color:`${G.gold}77`,fontSize:10,letterSpacing:1,display:"block",marginBottom:5}}>IMAGE PRODUIT</label>
                        <div style={{display:"flex",gap:7,alignItems:"center",flexWrap:"wrap"}}>
                          <input ref={el=>fileRefs.current[q.id]=el} type="file" accept="image/*" onChange={e=>handleImg(q.id,e)} style={{display:"none"}}/>
                          <button onClick={()=>fileRefs.current[q.id]?.click()} style={btn(false,{padding:"6px 12px",fontSize:11})}>📷 Upload</button>
                          <span style={{color:`${G.cream}44`,fontSize:10}}>ou</span>
                          <input value={q.imageUrl||""} onChange={e=>setQs(p=>p.map(x=>x.id===q.id?{...x,imageUrl:e.target.value}:x))} placeholder="URL de l'image..." style={{...inp(),flex:1,fontSize:11}}/>
                        </div>
                        {(q.image||q.imageUrl)&&<div style={{marginTop:7,borderRadius:7,overflow:"hidden",height:70,background:"rgba(0,0,0,0.3)",display:"flex",alignItems:"center",justifyContent:"center"}}>
                          <img src={q.image||q.imageUrl} style={{maxHeight:70,maxWidth:"100%",objectFit:"contain"}} alt="ap" onError={e=>e.target.style.display="none"}/>
                        </div>}
                      </div>
                    </div>
                  )}
                </div>
              ))}
              <button onClick={addQ} style={btn(false,{width:"100%",padding:"11px"})}>+ Nouvelle question</button>
            </div>
          )}
        </div>

        <div style={{padding:"14px 18px",borderTop:`1px solid ${G.gold}22`,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <span style={{color:`${G.cream}33`,fontSize:11}}>{cons.length} participant(s) · {qs.length} question(s)</span>
          <button onClick={()=>onStart(cons,qs)} disabled={cons.length===0||qs.length===0}
            style={btn(true,{padding:"12px 32px",fontSize:13,letterSpacing:3,textTransform:"uppercase",opacity:cons.length===0||qs.length===0?.4:1})}>
            🎮 LANCER LE JEU
          </button>
        </div>
      </div>
    </div>
  );
}

// ══════════════════════════════════════
// GAME SCREEN — ECRAN PUBLIC + PANNEAU NADA
// ══════════════════════════════════════
function Game({consultants:initC,questions,onReset}){
  const [cons,setCons]=useState(initC.map(c=>({...c,score:0})));
  const [idx,setIdx]=useState(0);
  const [hintShown,setHintShown]=useState(0);
  const [results,setResults]=useState({});
  const [revealed,setRevealed]=useState([]);
  const [phase,setPhase]=useState("play"); // play | validate | final
  const [selC,setSelC]=useState(null);
  const [flash,setFlash]=useState(null);
  const [panelOpen,setPanelOpen]=useState(false);
  const [imgOverride,setImgOverride]=useState({});
  const fileRef=useRef();
  const panelRef=useRef();

  const q=questions[idx];
  const isLast=idx===questions.length-1;
  const imgSrc=imgOverride[q.id]||q.image||q.imageUrl||"";
  const blurFilter=phase==="validate"?BLUR_MAP[5]:BLUR_MAP[hintShown];
  const currentPts=POINTS_MAP[Math.max(1,hintShown)]||10;

  const revealHint=()=>{if(hintShown<q.indices.length)setHintShown(h=>h+1);};

  const award=(cid)=>{
    const pts=currentPts;
    setCons(p=>p.map(c=>c.id===cid?{...c,score:c.score+pts}:c));
    setFlash(cid);setTimeout(()=>setFlash(null),1200);
    setResults(p=>({...p,[idx]:{cid,pts}}));
    setRevealed(p=>[...p,idx]);
    setPhase("validate");
  };

  const skip=()=>{setResults(p=>({...p,[idx]:{skipped:true}}));setRevealed(p=>[...p,idx]);setPhase("validate");};

  const next=()=>{
    if(isLast){setPhase("final");return;}
    setIdx(i=>i+1);setHintShown(0);setSelC(null);setPhase("play");
  };

  const handleImg=(e)=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>setImgOverride(p=>({...p,[q.id]:ev.target.result}));r.readAsDataURL(f);};

  if(phase==="final") return <Final consultants={[...cons].sort((a,b)=>b.score-a.score)} onReset={onReset}/>;

  // ── ÉCRAN PUBLIC (ce que voient les participants) ──
  return(
    <div style={{height:"100vh",background:`linear-gradient(160deg,${G.dark} 0%,#071a10 100%)`,display:"flex",flexDirection:"column",position:"relative",overflow:"hidden"}}>

      {/* HEADER PUBLIC */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"14px 32px",borderBottom:`1px solid ${G.gold}22`,background:"rgba(0,0,0,0.3)",flexShrink:0}}>
        <Logo/>
        <h1 style={{fontFamily:"'Playfair Display',serif",fontSize:36,color:G.gold,letterSpacing:10,textShadow:`0 0 30px ${G.gold}55`}}>RÉBUS</h1>
        <div style={{color:`${G.gold}66`,fontSize:13,textAlign:"right"}}>
          <div style={{fontSize:11,letterSpacing:2,marginBottom:2}}>QUESTION</div>
          <div style={{fontFamily:"'Playfair Display',serif",fontSize:22,color:G.gold}}>{idx+1}<span style={{fontSize:14,color:`${G.gold}66`}}>/{questions.length}</span></div>
        </div>
      </div>

      {/* CORPS PUBLIC */}
      <div style={{flex:1,display:"flex",gap:0,overflow:"hidden"}}>

        {/* COLONNE GAUCHE — Scores publics */}
        <div style={{width:200,padding:"16px 12px",borderRight:`1px solid ${G.gold}18`,display:"flex",flexDirection:"column",gap:8,overflowY:"auto",flexShrink:0}}>
          <div style={{color:`${G.gold}77`,fontSize:9,letterSpacing:3,textTransform:"uppercase",marginBottom:4,textAlign:"center"}}>CLASSEMENT</div>
          {[...cons].sort((a,b)=>b.score-a.score).map((c,i)=>(
            <div key={c.id} style={{padding:"11px 12px",borderRadius:11,background:flash===c.id?`${c.color}28`:"rgba(255,255,255,0.04)",border:`1px solid ${i===0&&c.score>0?c.color+"55":G.gold+"15"}`,animation:flash===c.id?"flash 1s ease":"none",transition:"background 0.4s"}}>
              <div style={{display:"flex",alignItems:"center",gap:7}}>
                <span style={{fontSize:16,flexShrink:0}}>{i===0&&c.score>0?"👑":i===1?"🥈":i===2?"🥉":"·"}</span>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{color:c.color,fontWeight:700,fontSize:13,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{c.name}</div>
                </div>
                <div style={{color:G.gold,fontFamily:"'Playfair Display',serif",fontSize:20,fontWeight:900}}>{c.score}</div>
              </div>
              <div style={{marginTop:6,height:3,background:"rgba(255,255,255,0.07)",borderRadius:2}}>
                <div style={{height:"100%",borderRadius:2,width:`${Math.max(4,(c.score/Math.max(1,...cons.map(x=>x.score)))*100)}%`,background:c.color,transition:"width 0.6s ease"}}/>
              </div>
            </div>
          ))}
          {/* Barème visible */}
          <div style={{marginTop:"auto",padding:"10px 11px",borderRadius:9,background:"rgba(0,0,0,0.2)",border:`1px solid ${G.gold}15`}}>
            <div style={{color:`${G.gold}77`,fontSize:9,letterSpacing:2,marginBottom:6,textAlign:"center"}}>BARÈME</div>
            {Object.entries(POINTS_MAP).map(([k,v])=>(
              <div key={k} style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
                <span style={{color:`${G.cream}44`,fontSize:10}}>Indice {k}</span>
                <span style={{color:hintShown===Number(k)?G.gold:`${G.gold}55`,fontWeight:hintShown===Number(k)?900:400,fontSize:10}}>{v} pts</span>
              </div>
            ))}
          </div>
        </div>

        {/* CENTRE — Zone principale (ce que voient les participants) */}
        <div style={{flex:1,display:"flex",flexDirection:"column",padding:"20px 24px",gap:16,overflowY:"auto"}}>

          {/* Image produit */}
          <div style={{flex:1,background:"rgba(0,0,0,0.25)",borderRadius:18,border:`1px solid ${G.gold}18`,display:"flex",alignItems:"center",justifyContent:"center",position:"relative",overflow:"hidden",minHeight:240}}>
            {imgSrc?(
              <>
                <img src={imgSrc} style={{maxHeight:"100%",maxWidth:"100%",objectFit:"contain",filter:blurFilter,transition:"filter 1.2s ease"}} alt="produit"/>
                {/* Indicateur flou */}
                <div style={{position:"absolute",top:12,left:12,display:"flex",gap:5}}>
                  {[1,2,3,4,5].map(n=>(
                    <div key={n} style={{width:10,height:10,borderRadius:"50%",background:n<=hintShown?G.gold:"rgba(255,255,255,0.15)",boxShadow:n<=hintShown?`0 0 8px ${G.gold}`:undefined,transition:"all 0.3s"}}/>
                  ))}
                </div>
                {/* Points en jeu */}
                <div style={{position:"absolute",top:12,right:12,background:"rgba(0,0,0,0.6)",borderRadius:10,padding:"8px 14px",border:`1px solid ${G.gold}44`,textAlign:"center",animation:"glow 2s infinite"}}>
                  <div style={{color:G.gold,fontFamily:"'Playfair Display',serif",fontSize:26,fontWeight:900,lineHeight:1}}>{hintShown>0?currentPts:"?"}</div>
                  <div style={{color:`${G.gold}77`,fontSize:9,letterSpacing:2}}>POINTS</div>
                </div>
              </>
            ):(
              <div style={{textAlign:"center",opacity:.5}}>
                <div style={{fontSize:64,marginBottom:8}}>🧴</div>
                <div style={{color:G.cream,fontSize:13}}>En attente de l'image…</div>
              </div>
            )}
          </div>

          {/* Indices révélés — SANS catégorie */}
          {hintShown>0&&(
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              {q.indices.slice(0,hintShown).map((ind,i)=>(
                <div key={i} style={{display:"flex",gap:12,padding:"13px 16px",background:`${G.gold}0c`,borderRadius:11,border:`1px solid ${G.gold}22`,animation:i===hintShown-1?"fadeIn 0.4s ease":"none"}}>
                  <div style={{width:26,height:26,borderRadius:"50%",background:`linear-gradient(135deg,${G.gold},${G.goldL})`,display:"flex",alignItems:"center",justifyContent:"center",color:G.dark,fontWeight:900,fontSize:11,flexShrink:0}}>{i+1}</div>
                  <div style={{color:G.cream,fontSize:15,lineHeight:1.5,fontWeight:i===hintShown-1?500:400}}>{ind}</div>
                </div>
              ))}
            </div>
          )}

          {hintShown===0&&(
            <div style={{textAlign:"center",padding:"18px 0"}}>
              <div style={{color:`${G.gold}55`,fontSize:14,letterSpacing:3,textTransform:"uppercase"}}>En attente du premier indice…</div>
            </div>
          )}

          {/* Message validation */}
          {phase==="validate"&&(
            <div style={{padding:"14px 20px",borderRadius:11,background:results[idx]&&!results[idx].skipped?`${G.gold}14`:"rgba(255,80,80,0.08)",border:`1px solid ${results[idx]&&!results[idx].skipped?G.gold+"44":"rgba(255,80,80,0.25)"}`,textAlign:"center",animation:"fadeIn 0.4s ease"}}>
              {results[idx]&&!results[idx].skipped?(
                <div style={{color:G.gold,fontFamily:"'Playfair Display',serif",fontSize:20,fontWeight:700}}>
                  🎉 Bravo {cons.find(c=>c.id===results[idx].cid)?.name} ! +{results[idx].pts} points
                </div>
              ):(
                <div style={{color:`${G.cream}88`,fontSize:16}}>Réponse : <strong style={{color:G.cream}}>{q.reponse}</strong></div>
              )}
            </div>
          )}
        </div>
      </div>

      {/* ════════════════════════════════════
          BOUTON NADA — discret, coin bas droit
      ════════════════════════════════════ */}
      <button onClick={()=>setPanelOpen(o=>!o)}
        style={{position:"fixed",bottom:20,right:20,width:52,height:52,borderRadius:"50%",border:`2px solid ${G.gold}55`,background:"rgba(13,56,38,0.95)",cursor:"pointer",fontSize:22,boxShadow:"0 4px 20px rgba(0,0,0,0.5)",zIndex:1000,transition:"all 0.2s",display:"flex",alignItems:"center",justifyContent:"center"}}>
        {panelOpen?"✕":"🔐"}
      </button>

      {/* ════════════════════════════════════
          PANNEAU FORMATRICE NADA (overlay)
      ════════════════════════════════════ */}
      {panelOpen&&(
        <div ref={panelRef} style={{position:"fixed",top:0,right:0,bottom:0,width:380,background:`linear-gradient(180deg,#0a2010,#051508)`,borderLeft:`2px solid ${G.gold}44`,zIndex:999,display:"flex",flexDirection:"column",animation:"slideIn 0.3s ease",boxShadow:"-8px 0 40px rgba(0,0,0,0.7)"}}>

          {/* Header panneau */}
          <div style={{padding:"14px 16px",borderBottom:`1px solid ${G.gold}22`,background:"rgba(0,0,0,0.3)",flexShrink:0}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
              <div>
                <div style={{color:G.gold,fontWeight:700,fontSize:13,letterSpacing:2}}>🔐 PANNEAU NADA</div>
                <div style={{color:`${G.cream}55`,fontSize:10,marginTop:2}}>Non visible par les participants</div>
              </div>
              <div style={{color:G.gold,fontSize:11,textAlign:"right"}}>
                <div style={{color:`${G.cream}44`,fontSize:9,letterSpacing:1}}>QUESTION</div>
                <div style={{fontFamily:"'Playfair Display',serif",fontSize:18,fontWeight:900}}>{idx+1}/{questions.length}</div>
              </div>
            </div>
          </div>

          <div style={{flex:1,overflowY:"auto",padding:14,display:"flex",flexDirection:"column",gap:12}}>

            {/* Catégorie & réponse (privé) */}
            <div style={{padding:"11px 14px",borderRadius:10,background:"rgba(255,255,255,0.04)",border:`1px solid ${G.gold}22`}}>
              <div style={{color:`${G.gold}77`,fontSize:9,letterSpacing:2,marginBottom:5}}>CATÉGORIE (privé)</div>
              <div style={{color:G.goldL,fontWeight:700,fontSize:13}}>{q.categorie||"—"}</div>
              <div style={{height:1,background:`${G.gold}22`,margin:"8px 0"}}/>
              <div style={{color:`${G.gold}77`,fontSize:9,letterSpacing:2,marginBottom:4}}>RÉPONSE CORRECTE</div>
              <div style={{color:"#7ecba1",fontWeight:700,fontSize:15,fontFamily:"'Playfair Display',serif"}}>{q.reponse}</div>
            </div>

            {/* Script indices */}
            <div style={{padding:"11px 14px",borderRadius:10,background:"rgba(255,255,255,0.04)",border:`1px solid ${G.gold}22`}}>
              <div style={{color:`${G.gold}77`,fontSize:9,letterSpacing:2,marginBottom:8}}>SCRIPT — INDICES À LIRE</div>
              {q.indices.map((ind,i)=>(
                <div key={i} style={{display:"flex",gap:8,marginBottom:7,padding:"8px 10px",borderRadius:8,background:i<hintShown?`${G.gold}12`:i===hintShown?"rgba(255,255,255,0.05)":"rgba(0,0,0,0.2)",border:`1px solid ${i<hintShown?G.gold+"33":"transparent"}`,opacity:i>hintShown?.5:1}}>
                  <div style={{width:20,height:20,borderRadius:"50%",background:i<hintShown?`${G.gold}`:"rgba(255,255,255,0.1)",display:"flex",alignItems:"center",justifyContent:"center",color:i<hintShown?G.dark:G.cream,fontWeight:900,fontSize:9,flexShrink:0}}>{i+1}</div>
                  <div>
                    <div style={{color:i<hintShown?G.cream:`${G.cream}77`,fontSize:12,lineHeight:1.4}}>{ind||"—"}</div>
                    <div style={{color:`${G.gold}55`,fontSize:9,marginTop:2}}>{POINTS_MAP[i+1]} pts si réponse ici</div>
                  </div>
                </div>
              ))}
            </div>

            {/* Navigation questions */}
            <div style={{padding:"11px 14px",borderRadius:10,background:"rgba(255,255,255,0.04)",border:`1px solid ${G.gold}22`}}>
              <div style={{color:`${G.gold}77`,fontSize:9,letterSpacing:2,marginBottom:8}}>NAVIGATION</div>
              <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
                {questions.map((qu,i)=>(
                  <button key={qu.id} onClick={()=>{setIdx(i);setHintShown(0);setSelC(null);setPhase(revealed.includes(i)?"validate":"play");}}
                    style={{padding:"5px 10px",borderRadius:7,border:`1px solid ${i===idx?G.gold+"88":G.gold+"22"}`,background:i===idx?`${G.gold}22`:"rgba(255,255,255,0.04)",color:i===idx?G.gold:`${G.cream}55`,cursor:"pointer",fontSize:11,fontWeight:i===idx?700:400}}>
                    {revealed.includes(i)?"✓":""} Q{i+1}
                  </button>
                ))}
              </div>
            </div>

            {/* Contrôles */}
            {phase==="play"&&(
              <div style={{padding:"11px 14px",borderRadius:10,background:"rgba(255,255,255,0.04)",border:`1px solid ${G.gold}22`}}>
                <div style={{color:`${G.gold}77`,fontSize:9,letterSpacing:2,marginBottom:10}}>CONTRÔLES</div>

                {/* Sélection participant */}
                <div style={{marginBottom:10}}>
                  <div style={{color:`${G.cream}55`,fontSize:10,marginBottom:6}}>Qui a répondu ?</div>
                  <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
                    {cons.map(c=>(
                      <button key={c.id} onClick={()=>setSelC(c.id===selC?null:c.id)}
                        style={{padding:"5px 12px",borderRadius:20,border:`2px solid ${c.id===selC?c.color:c.color+"44"}`,background:c.id===selC?c.color+"22":"transparent",color:c.id===selC?c.color:`${c.color}77`,cursor:"pointer",fontFamily:"inherit",fontSize:12,fontWeight:700}}>
                        {c.name}
                      </button>
                    ))}
                  </div>
                </div>

                <div style={{display:"grid",gap:7}}>
                  {hintShown<q.indices.length&&(
                    <button onClick={revealHint} style={btn(false,{width:"100%",padding:"10px",background:`${G.gold}14`,border:`1px solid ${G.gold}44`,color:G.gold,fontSize:12})}>
                      💡 Révéler indice {hintShown+1} → {POINTS_MAP[hintShown+1]} pts
                    </button>
                  )}
                  <button onClick={()=>selC&&award(selC)} disabled={!selC}
                    style={btn(true,{width:"100%",padding:"10px",opacity:selC?1:.4,fontSize:12})}>
                    ✓ Bonne réponse ({currentPts} pts)
                  </button>
                  <button onClick={skip}
                    style={btn(false,{width:"100%",padding:"8px",background:"rgba(255,80,80,0.1)",border:"1px solid rgba(255,80,80,0.25)",color:G.red,fontSize:12})}>
                    ✗ Passer cette question
                  </button>
                </div>
              </div>
            )}

            {phase==="validate"&&(
              <div style={{display:"flex",flexDirection:"column",gap:8}}>
                <div style={{padding:"11px 14px",borderRadius:10,background:"rgba(255,255,255,0.04)",border:`1px solid ${G.gold}22`,textAlign:"center"}}>
                  {results[idx]&&!results[idx].skipped?(
                    <div style={{color:G.gold,fontWeight:700,fontSize:13}}>✅ {cons.find(c=>c.id===results[idx].cid)?.name} · +{results[idx].pts} pts</div>
                  ):(
                    <div style={{color:`${G.cream}66`,fontSize:12}}>❌ Réponse : {q.reponse}</div>
                  )}
                </div>
                <button onClick={next} style={btn(true,{width:"100%",padding:"12px",fontSize:13,letterSpacing:2,textTransform:"uppercase"})}>
                  {isLast?"🏆 Résultats finaux":"Question suivante →"}
                </button>
              </div>
            )}

            {/* Upload image */}
            <div style={{padding:"11px 14px",borderRadius:10,background:"rgba(255,255,255,0.04)",border:`1px solid ${G.gold}22`}}>
              <div style={{color:`${G.gold}77`,fontSize:9,letterSpacing:2,marginBottom:8}}>IMAGE PRODUIT</div>
              <input ref={fileRef} type="file" accept="image/*" onChange={handleImg} style={{display:"none"}}/>
              <button onClick={()=>fileRef.current?.click()} style={btn(false,{width:"100%",padding:"8px",fontSize:11})}>📷 Changer l'image</button>
            </div>

            {/* Bouton config */}
            <button onClick={onReset} style={btn(false,{width:"100%",padding:"8px",fontSize:11,marginTop:4})}>
              ⚙ Revenir à la configuration
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

// ══════════════════════════════════════
// FINAL SCREEN
// ══════════════════════════════════════
function Final({consultants,onReset}){
  const w=consultants[0];
  return(
    <div style={{minHeight:"100vh",background:`radial-gradient(ellipse at center,${G.green},${G.dark} 55%,#050f08)`,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:28,fontFamily:"'Lato',sans-serif"}}>
      <div style={{textAlign:"center",marginBottom:32,animation:"fadeUp 0.8s ease"}}>
        <div style={{fontSize:64,marginBottom:10}}>🏆</div>
        <h1 style={{color:G.gold,fontFamily:"'Playfair Display',serif",fontSize:44,margin:"0 0 6px"}}>FIN DU JEU</h1>
        <p style={{color:`${G.cream}66`,fontSize:12,letterSpacing:4}}>RÉBUS CHOGAN — LIMITLESS TEAM</p>
      </div>
      {w&&w.score>0&&(
        <div style={{textAlign:"center",marginBottom:28,animation:"fadeUp 0.8s ease 0.15s both"}}>
          <div style={{display:"inline-block",padding:"20px 40px",borderRadius:16,background:`${G.gold}14`,border:`2px solid ${G.gold}55`}}>
            <div style={{fontSize:32,marginBottom:6}}>👑</div>
            <div style={{color:G.gold,fontFamily:"'Playfair Display',serif",fontSize:28,fontWeight:900}}>{w.name}</div>
            <div style={{color:`${G.cream}77`,fontSize:12,marginTop:4}}>GAGNANT(E) — {w.score} POINTS</div>
          </div>
        </div>
      )}
      <div style={{display:"flex",gap:10,flexWrap:"wrap",justifyContent:"center",marginBottom:36}}>
        {consultants.map((c,i)=>(
          <div key={c.id} style={{padding:"16px 22px",borderRadius:12,background:i===0?`${c.color}14`:"rgba(255,255,255,0.04)",border:`1px solid ${i===0?c.color+"44":G.gold+"15"}`,textAlign:"center",minWidth:120,animation:`fadeUp 0.5s ease ${0.3+i*0.07}s both`}}>
            <div style={{fontSize:22,marginBottom:5}}>{i===0?"🥇":i===1?"🥈":i===2?"🥉":`${i+1}.`}</div>
            <div style={{color:c.color,fontWeight:700,fontSize:14,marginBottom:3}}>{c.name}</div>
            <div style={{color:G.gold,fontFamily:"'Playfair Display',serif",fontSize:28,fontWeight:900}}>{c.score}</div>
            <div style={{color:`${G.cream}44`,fontSize:10}}>pts</div>
          </div>
        ))}
      </div>
      <button onClick={onReset} style={btn(true,{padding:"13px 36px",fontSize:14,letterSpacing:3,textTransform:"uppercase"})}>
        🔄 NOUVELLE PARTIE
      </button>
    </div>
  );
}

// ══════════════════════════════════════
// APP ROOT
// ══════════════════════════════════════
function App(){
  const [phase,setPhase]=useState("setup");
  const [data,setData]=useState(null);
  const start=(c,q)=>{setData({c,q});setPhase("game");};
  const reset=()=>{setData(null);setPhase("setup");};
  if(phase==="setup") return <Setup onStart={start}/>;
  return <Game consultants={data.c} questions={data.q} onReset={reset}/>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
